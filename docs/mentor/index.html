<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor IA — Empreendedorismo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #0f172a;
            min-height: 100vh;
            color: #e2e8f0;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .header p { color: #94a3b8; font-size: 14px; }
        
        /* Mode Selector */
        .mode-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .mode-btn {
            flex: 1;
            max-width: 250px;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #1e293b;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .mode-btn:hover { border-color: #8b5cf6; transform: translateY(-2px); }
        .mode-btn .icon { font-size: 30px; margin-bottom: 10px; }
        .mode-btn h3 { font-size: 16px; margin-bottom: 5px; }
        .mode-btn p { font-size: 12px; color: #94a3b8; }
        
        /* Chat Container */
        .chat-container {
            display: none;
            flex-direction: column;
            height: calc(100vh - 250px);
            background: #1e293b;
            border-radius: 16px;
            border: 1px solid #334155;
            overflow: hidden;
        }
        .chat-container.active { display: flex; }
        
        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .message.bot .message-avatar { background: #8b5cf6; }
        .message.user .message-avatar { background: #06b6d4; }
        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }
        .message.bot .message-content {
            background: #334155;
            border-bottom-left-radius: 4px;
        }
        .message.user .message-content {
            background: #8b5cf6;
            border-bottom-right-radius: 4px;
        }
        
        /* Input Area */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #0f172a;
            border-top: 1px solid #334155;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 25px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
        }
        .input-area input:focus { outline: none; border-color: #8b5cf6; }
        .input-area button {
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .input-area button:hover { transform: scale(1.05); }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Typing Indicator */
        .typing {
            display: flex;
            gap: 12px;
            padding: 10px 20px;
        }
        .typing .message-avatar { background: #8b5cf6; }
        .typing .dots {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #334155;
            border-radius: 12px;
        }
        .typing .dots span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing .dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing .dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }
        
        /* Back Button */
        .back-btn {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .back-btn:hover { background: #334155; }
        
        @media (max-width: 600px) {
            .mode-selector { flex-direction: column; }
            .message { max-width: 95%; }
            .header h1 { font-size: 22px; }
            .mode-btn { padding: 15px; }
            .mode-btn .icon { font-size: 24px; }
            .chat-container { height: calc(100vh - 200px); border-radius: 12px; }
            .input-area { padding: 10px; gap: 8px; }
            .input-area input { padding: 10px 14px; font-size: 14px; }
            .input-area button { padding: 10px 18px; font-size: 13px; }
            .back-btn { top: 10px; left: 10px; padding: 8px 15px; font-size: 12px; }
        }
        @media (max-width: 400px) {
            .header { padding: 20px 15px; border-radius: 12px; }
            .header h1 { font-size: 20px; }
            .header p { font-size: 12px; }
            .mode-btn h3 { font-size: 14px; }
            .mode-btn p { font-size: 11px; }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="resetChat()">← Voltar</button>
    
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🧠 Mentor IA</h1>
            <p>Seu assistente de empreendedorismo. Tire dúvidas sobre aulas, projetos ou ideias!</p>
        </div>
        
        <!-- Mode Selector -->
        <div class="mode-selector" id="modeSelector">
            <button class="mode-btn" onclick="startMode('criar')">
                <div class="icon">💡</div>
                <h3>Criar Negócio</h3>
                <p>Tenha ajuda para desenvolver sua ideia</p>
            </button>
            <button class="mode-btn" onclick="startMode('avaliar')">
                <div class="icon">📊</div>
                <h3>Avaliar Negócio</h3>
                <p>Receba feedback sobre seu projeto</p>
            </button>
        </div>
        
        <!-- API Key Config -->
        <div style="text-align: center; margin-top: 15px;">
            <button onclick="showApiKeyPrompt()" style="background: transparent; border: 1px solid #334155; color: #94a3b8; padding: 8px 16px; border-radius: 20px; font-size: 12px; cursor: pointer;">
                ⚙️ Configurar API Key
            </button>
            <span id="api-status" style="color: #94a3b8; font-size: 11px; margin-left: 10px;"></span>
        </div>
        
        <!-- Chat -->
        <div class="chat-container" id="chatContainer">
            <div class="messages" id="messages">
                <!-- Messages will appear here -->
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter')sendMessage()">
                <button id="sendBtn" onclick="sendMessage()">Enviar</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentMode = '';
        let isLoading = false;
        
        // Show API status on load
        document.addEventListener('DOMContentLoaded', () => {
            const statusEl = document.getElementById('api-status');
            if (AI_CONFIG.apiKey) {
                statusEl.textContent = '✓ IA configurada';
                statusEl.style.color = '#16a34a';
            } else {
                statusEl.textContent = 'Modo offline';
            }
        });
        
        const PROMPTS = {
            criar: `Você é o Mentor IA do programa "Empreendedores Exponenciais".

SEU MÉTODO:
1. Nunca dê a resposta completa - faça perguntas instigadoras
2. Use linguagem simples e direta
3. Incentive a ação - "Que tal testar isso?"
4. Referencie conceitos de: Inovação, Finanças, Marketing, Projetos

Comece se apresentando e perguntando sobre a ideia ou dúvida do aluno.`,

            avaliar: `Você é o Mentor IA do programa "Empreendedores Exponenciais".

SEU MÉTODO:
1. Faça críticas construtivas
2. Sugira melhorias específicas  
3. Pergunte sobre métricas e resultados
4. Ajude a identificar pontos fortes e fracos

Comece perguntando qual projeto ou ideia será avaliada.`
        };
        
        function startMode(mode) {
            currentMode = mode;
            document.getElementById('modeSelector').style.display = 'none';
            document.getElementById('chatContainer').classList.add('active');
            document.querySelector('.header').style.display = 'none';
            document.querySelector('.back-btn').style.display = 'block';
            
            document.getElementById('messages').innerHTML = '';
            
            const modeNames = {
                criar: 'Criar Negócio',
                avaliar: 'Avaliar Negócio'
            };
            
            addBotMessage(`Olá! Estou pronto para ajudar no modo "${modeNames[mode]}".\n\nComo posso ajudar hoje?`);
        }
        
        // AI Configuration (set your OpenAI API key here)
        const AI_CONFIG = {
            apiKey: localStorage.getItem('openai_api_key') || '',
            model: 'gpt-3.5-turbo'
        };
        
        let chatHistory = [];
        
        function showApiKeyPrompt() {
            const apiKey = prompt('Digite sua chave da API OpenAI (obtenha em https://platform.openai.com/api-keys):\n\nOu clique OK para usar modo simulado.');
            if (apiKey) {
                AI_CONFIG.apiKey = apiKey;
                localStorage.setItem('openai_api_key', apiKey);
            }
        }
        
        async function sendMessage() {
            if (isLoading) return;
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            
            addUserMessage(text);
            input.value = '';
            showTyping();
            
            chatHistory.push({ role: 'user', content: text });
            
            try {
                if (AI_CONFIG.apiKey) {
                    await generateAIResponse(text);
                } else {
                    await generateResponse(text);
                }
            } catch (error) {
                removeTyping();
                addBotMessage('😅 Ops! Algo deu errado. Tente novamente ou configure uma API key.');
            }
        }
        
        async function generateAIResponse(userMessage) {
            removeTyping();
            
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${AI_CONFIG.apiKey}`
                    },
                    body: JSON.stringify({
                        model: AI_CONFIG.model,
                        messages: [
                            { role: 'system', content: PROMPTS[currentMode] },
                            ...chatHistory.slice(-10)
                        ],
                        max_tokens: 500,
                        temperature: 0.8
                    })
                });
                
                const data = await response.json();
                if (data.choices && data.choices[0]) {
                    const botResponse = data.choices[0].message.content;
                    chatHistory.push({ role: 'assistant', content: botResponse });
                    addBotMessage(botResponse);
                } else {
                    throw new Error('Resposta inválida');
                }
            } catch (error) {
                console.error('AI Error:', error);
                addBotMessage('😅 Não consegui conectar com a IA. Usando modo offline.\n\n' + generateFallbackResponse(userMessage));
            }
        }
        
        function generateResponse(userMessage) {
            removeTyping();
            
            const response = generateFallbackResponse(userMessage);
            addBotMessage(response);
        }
        
        function generateFallbackResponse(userMessage) {
            const responses = {
                criar: [
                    `Que interessante! 🤔\n\nPara me ajudar melhor, me conta: **qual problema do mundo você quer resolver?**`,
                    `Ótimo! 💡\n\nUma pergunta importante: **como você sabe que as pessoas realmente querem isso?**`,
                    `Entendi! 📊\n\n**Qual seria o primeiro passo** que você daria para testar essa ideia?`,
                    `Boa ideia! 🚀\n\nMe conta: **o que você já fez até agora** para validar isso?`,
                    `Interessante! 🤔\n\n**Quem seria seu primeiro cliente** e quanto ele pagaria?`
                ],
                avaliar: [
                    `Ótimo! Vamos avaliar juntos. 📊\n\n**Qual é o diferencial** do seu projeto em relação ao que já existe?`,
                    `Me conta mais! 🧐\n\n**Quais são os números** - clientes, receita, custos?`,
                    `Entendi. 📈\n\n**O que está dando mais trabalho** pra fazer funcionar?`,
                    `Boa iniciativa! 💪\n\n**Qual parte do projeto** você quer que eu avalie primeiro?`,
                    `Perfeito! 🎯\n\n**Qual é o principal desafio** que você enfrenta agora?`
                ]
            };
            
            const modeResponses = responses[currentMode] || responses.criar;
            
            if (userMessage.toLowerCase().includes('duvida') || userMessage.toLowerCase().includes('?')) {
                return `Ótima pergunta! 🤔\n\nDeixe-me pensar...\n\n**Sugiro** que você revise a aula sobre esse tema e tente aplicar na prática.\n\n**Que tal testar isso agora?**`;
            }
            
            if (userMessage.toLowerCase().includes('ajuda') || userMessage.toLowerCase().includes('preciso')) {
                return `Estou aqui para ajudar! 🙋\n\n**Me conta mais** sobre o que você precisa. Quanto mais detalhes, melhor posso orientar!\n\nQual é o contexto?`;
            }
            
            if (userMessage.toLowerCase().includes('api') || userMessage.toLowerCase().includes('key')) {
                return `Para usar a IA real, clique no ícone ⚙️ e digite sua API key da OpenAI.\n\nObtenha uma key em: https://platform.openai.com/api-keys`;
            }
            
            return modeResponses[Math.floor(Math.random() * modeResponses.length)];
        }
        
        function addUserMessage(text) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `
                <div class="message-avatar">👤</div>
                <div class="message-content">${escapeHTML(text)}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function addBotMessage(text) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = `
                <div class="message-avatar">🧠</div>
                <div class="message-content">${formatText(text)}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function showTyping() {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typing-indicator';
            div.innerHTML = `
                <div class="message-avatar">🧠</div>
                <div class="dots">
                    <span></span><span></span><span></span>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function removeTyping() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }
        
        function resetChat() {
            if (!confirm('Tem certeza que deseja voltar?')) return;
            currentMode = '';
            document.getElementById('modeSelector').style.display = 'flex';
            document.getElementById('chatContainer').classList.remove('active');
            document.querySelector('.header').style.display = 'block';
            document.querySelector('.back-btn').style.display = 'none';
            document.getElementById('messages').innerHTML = '';
        }
        
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        function formatText(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
