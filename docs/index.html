<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empreendedores Exponenciais — CSM</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --green: #16a34a;
            --green-light: #22c55e;
            --yellow: #f59e0b;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --teal: #0d9488;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--green), var(--yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: var(--text-muted);
            font-size: 16px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-align: center;
        }
        .perfil-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 40px;
        }
        .perfil-btn {
            background: var(--bg-card);
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 25px 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .perfil-btn:hover {
            border-color: var(--green);
            transform: translateY(-2px);
        }
        .perfil-btn.selected {
            border-color: var(--green);
            background: rgba(22, 197, 74, 0.1);
        }
        .perfil-btn .icon {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .perfil-btn h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        .perfil-btn p {
            font-size: 13px;
            color: var(--text-muted);
        }
        .ano-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .ano-btn {
            background: var(--bg-card);
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 20px 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .ano-btn:hover {
            border-color: var(--blue);
        }
        .ano-btn.selected {
            border-color: var(--blue);
            background: rgba(59, 130, 246, 0.1);
        }
        .ano-btn .label {
            font-size: 28px;
            font-weight: 700;
            display: block;
            margin-bottom: 5px;
        }
        .ano-btn .desc {
            font-size: 12px;
            color: var(--text-muted);
        }
        .continuar-btn {
            width: 100%;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.2s;
        }
        .continuar-btn:hover {
            background: var(--green-light);
        }
        .continuar-btn:disabled {
            background: #334155;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }
        .footer p {
            font-size: 12px;
            color: var(--text-muted);
        }
        @media (max-width: 500px) {
            .perfil-grid { grid-template-columns: 1fr; }
            .ano-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Empreendedores Exponenciais</h1>
            <p>Colégio Santa Mônica | Limoeiro/PE</p>
        </div>

        <div class="section">
            <div class="section-title">Quem é você?</div>
            <div class="perfil-grid">
                <div class="perfil-btn" onclick="selecionarPerfil('aluno')" id="btn-aluno">
                    <div class="icon">🎒</div>
                    <h3>Aluno</h3>
                    <p>Conteúdo das aulas</p>
                </div>
                <div class="perfil-btn" onclick="selecionarPerfil('professor')" id="btn-professor">
                    <div class="icon">🎓</div>
                    <h3>Professor</h3>
                    <p>Guias + Ferramentas</p>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Selecione o Ano</div>
            <div class="ano-grid">
                <div class="ano-btn" onclick="selecionarAno('6ano')" id="btn-6ano">
                    <span class="label">6º</span>
                    <span class="desc">Ensino Fundamental</span>
                </div>
                <div class="ano-btn" onclick="selecionarAno('7ano')" id="btn-7ano">
                    <span class="label">7º</span>
                    <span class="desc">Ensino Fundamental</span>
                </div>
                <div class="ano-btn" onclick="selecionarAno('8ano')" id="btn-8ano">
                    <span class="label">8º</span>
                    <span class="desc">Ensino Fundamental</span>
                </div>
                <div class="ano-btn" onclick="selecionarAno('9ano')" id="btn-9ano">
                    <span class="label">9º</span>
                    <span class="desc">Ensino Fundamental</span>
                </div>
            </div>
        </div>

        <button class="continuar-btn" onclick="continuar()" id="btn-continuar" disabled>
            Continuar →
        </button>

        <div class="footer">
            <p>Programa Empreendedores Exponenciais | CSM 2026</p>
        </div>
    </div>

    <script>
        let perfilSelecionado = null;
        let anoSelecionado = null;

        // Verificar se já tem escolha salva
        window.onload = function() {
            const savedPerfil = sessionStorage.getItem('perfil');
            const savedAno = localStorage.getItem('ultimo_ano');
            
            if (savedPerfil) {
                perfilSelecionado = savedPerfil;
                document.getElementById('btn-' + savedPerfil).classList.add('selected');
            }
            if (savedAno) {
                anoSelecionado = savedAno;
                document.getElementById('btn-' + savedAno).classList.add('selected');
            }
            verificarContinuar();
        }

        function selecionarPerfil(perfil) {
            perfilSelecionado = perfil;
            sessionStorage.setItem('perfil', perfil);
            
            // Atualizar visual
            document.querySelectorAll('.perfil-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('btn-' + perfil).classList.add('selected');
            
            verificarContinuar();
        }

        function selecionarAno(ano) {
            anoSelecionado = ano;
            localStorage.setItem('ultimo_ano', ano);
            
            // Atualizar visual
            document.querySelectorAll('.ano-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('btn-' + ano).classList.add('selected');
            
            verificarContinuar();
        }

        function verificarContinuar() {
            const btn = document.getElementById('btn-continuar');
            if (perfilSelecionado && anoSelecionado) {
                btn.disabled = false;
                btn.textContent = 'Entrar no ' + anoSelecionado.toUpperCase() + ' →';
            } else {
                btn.disabled = true;
                btn.textContent = 'Selecione perfil e ano';
            }
        }

        function continuar() {
            if (!perfilSelecionado || !anoSelecionado) return;
            
            // Redirecionar conforme escolha
            if (perfilSelecionado === 'professor') {
                window.location.href = 'professor/' + anoSelecionado + '/index.html';
            } else {
                window.location.href = 'cursos/' + anoSelecionado + '/index.html';
            }
        }
    </script>
</body>
</html>
