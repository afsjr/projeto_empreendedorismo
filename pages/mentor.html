<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor IA — Empreendedores Exponenciais</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">

    <!-- CSS Base -->
    <link rel="stylesheet" href="../css/styles.css">

    <style>
        :root {
            /* Cores padrão mentor (Modern Dark CSM) */
            --mentor-bg: #0a0a0f;
            --mentor-surface: #12121a;
            --mentor-accent: #E8B800;
            /* CSM Gold */
            --mentor-text: #eee8d5;
            --mentor-border: rgba(232, 184, 0, 0.2);
            --user-bubble: #1e3a5f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--mentor-bg);
            color: var(--mentor-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease;
            overflow-x: hidden;
        }

        /* HEADER PREMIUM */
        .header {
            background: rgba(18, 18, 26, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--mentor-border);
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-size: 2rem;
            text-shadow: 0 0 15px var(--mentor-accent);
        }

        .header-text h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--mentor-accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        .header-text p {
            font-size: 0.75rem;
            opacity: 0.6;
            margin: 0;
        }

        .header-btn {
            margin-left: auto;
            color: var(--mentor-accent);
            text-decoration: none;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            border: 1px solid var(--mentor-border);
            cursor: pointer;
        }

        /* MODO NEOBRUTALISTA */
        body.neo-mode {
            background-color: var(--bg-primary) !important;
            color: var(--text) !important;
        }

        body.neo-mode .header {
            background: var(--bg-surface) !important;
            border-bottom: 5px solid var(--border-color) !important;
            box-shadow: 0 4px 0px var(--shadow-color) !important;
        }

        body.neo-mode.dark-neo {
            background-color: #0A0A0A !important;
        }

        /* SELETOR DE MODO */
        .mode-selector {
            padding: 3rem;
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeUp 0.6s ease;
        }

        .mode-selector.hidden {
            display: none;
        }

        .mode-card {
            flex: 1;
            max-width: 380px;
            min-width: 280px;
            background: var(--mentor-surface);
            border: 2px solid var(--mentor-border);
            padding: 2.5rem;
            border-radius: 24px;
            cursor: pointer;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mode-card:hover {
            transform: translateY(-10px);
            border-color: var(--mentor-accent);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        body.neo-mode .mode-card {
            border: 4px solid var(--neo-black) !important;
            border-radius: 0 !important;
            box-shadow: 8px 8px 0px var(--shadow-color) !important;
            background: white !important;
            color: #121212 !important;
        }

        /* CHAT CONTAINER */
        .chat-container {
            flex: 1;
            display: none;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 0 2rem;
            animation: fadeIn 0.4s ease;
        }

        .chat-container.active {
            display: flex;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding: 2rem 0;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 85%;
            animation: fadeUp 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-content {
            padding: 1.2rem 1.5rem;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.6;
            background: var(--mentor-surface);
            border: 1px solid var(--mentor-border);
            color: var(--mentor-text);
        }

        .message.user .message-content {
            background: var(--user-bubble);
        }

        body.neo-mode .message .message-content {
            border: 3px solid var(--neo-black) !important;
            box-shadow: 6px 6px 0px var(--neo-black) !important;
            border-radius: 0 !important;
            background: white !important;
            color: #121212 !important;
        }

        /* INPUT BAR */
        .input-bar {
            padding: 1.5rem 0;
            background: var(--mentor-bg);
            border-top: 1px solid var(--mentor-border);
            position: sticky;
            bottom: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 1rem;
            max-width: 900px;
            margin: 0 auto;
        }

        textarea {
            flex: 1;
            background: var(--mentor-surface);
            border: 2px solid var(--mentor-border);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            resize: none;
            min-height: 56px;
            max-height: 150px;
            outline: none;
            font-size: 1rem;
        }

        .send-btn {
            padding: 0 2rem;
            background: var(--mentor-accent);
            border: none;
            border-radius: 16px;
            color: #000;
            font-weight: 900;
            cursor: pointer;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .reset-btn {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 1000;
            font-size: 0.8rem;
        }

        /* RESPONSIVIDADE GERAL E NEO */
        @media (max-width: 768px) {
            .header {
                padding: 1rem;
                gap: 1rem;
            }

            .header-logo {
                font-size: 1.50rem;
            }

            .header-text h1 {
                font-size: 1rem;
            }

            .mode-selector {
                padding: 1.5rem;
                gap: 1rem;
            }

            .mode-card {
                padding: 1.5rem;
                min-width: 100%;
            }

            .chat-container {
                padding: 0 1rem;
            }

            .message {
                max-width: 92%;
            }

            .message-content {
                font-size: 0.95rem;
                padding: 1rem;
            }

            .input-bar {
                padding: 1rem;
            }

            .input-wrapper {
                gap: 0.5rem;
            }

            .send-btn {
                padding: 0 1.2rem;
                font-size: 0.8rem;
            }

            /* Ajustes Específicos Neo no Mobile */
            body.neo-mode .mode-card {
                box-shadow: 4px 4px 0px var(--shadow-color) !important;
                margin-bottom: 0.5rem;
            }

            body.neo-mode .input-bar {
                border-width: 3px !important;
                margin: 10px !important;
            }

            body.neo-mode .header {
                border-bottom-width: 4px !important;
            }
        }

        @media (max-width: 480px) {
            .header-text p {
                display: none;
            }

            .mode-card h3 {
                font-size: 1.1rem;
            }

            .mode-card p {
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-logo">🧠</div>
        <div class="header-text">
            <h1>Mentor IA</h1>
            <p>Empreendedores Exponenciais — CSM</p>
        </div>
        <a id="exitProject" class="header-btn">Sair 🏠</a>
    </div>

    <div class="mode-selector active" id="modeSelector">
        <div class="mode-card" id="modeCriar">
            <span style="font-size: 3.5rem; display: block; margin-bottom: 1rem;">🚀</span>
            <h3>Quero criar um negócio</h3>
            <p>Transforme sua ideia em um plano estruturado e receba orientação passo a passo.</p>
        </div>
        <div class="mode-card" id="modeAvaliar">
            <span style="font-size: 3.5rem; display: block; margin-bottom: 1rem;">📊</span>
            <h3>Avaliar meu negócio</h3>
            <p>Faça um diagnóstico completo das suas finanças, mercado e diferencial competitivo.</p>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="messages" id="messages"></div>
        <div class="input-bar">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Digite sua resposta..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn">ENVIAR ➤</button>
            </div>
        </div>
    </div>

    <button class="reset-btn" id="resetBtn" title="Reiniciar conversa">Reiniciar ↺</button>

    <!-- Scripts (Carregar de CDN mais seguro) -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- Validação de dados (deve vir antes do supabase-config.js) -->
    <script src="../validacao-dados.js"></script>
    <script src="../supabase-config.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/mentor.js"></script>

    <!-- Script de Segurança para CSP -->
    <script>
        // Gerenciador de saída compatível com CSP
        document.addEventListener('DOMContentLoaded', () => {
            const exitBtn = document.getElementById('exitProject');
            if (exitBtn) {
                exitBtn.addEventListener('click', () => {
                    window.location.href = '../index.html';
                });
            }
        });
    </script>

</body>

</html>
