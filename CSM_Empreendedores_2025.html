<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Pedagógico — Colégio Santa Mônica</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0f;--surface:#16161a;--surface2:#1e1e24;--surface3:#26262e;
  --text:#e8e6e3;--text-dim:#9a9a9e;--text-muted:#5a5a60;
  --radius:14px;--radius-sm:8px;
  --grade-accent:#f97316;--grade-glow:rgba(249,115,22,.12);
  --grade-surface:rgba(249,115,22,.06);
  --module-accent:#f97316;
  --transition:all .3s cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth;font-size:15px}
body{
  font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;line-height:1.6;overflow-x:hidden;
}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:10px}

/* HEADER */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(12,12,15,.85);backdrop-filter:blur(20px) saturate(1.8);
  border-bottom:1px solid rgba(255,255,255,.04);
  padding:0 2rem;height:64px;display:flex;align-items:center;gap:1.5rem;
}
.logo{
  font-weight:800;font-size:1.15rem;letter-spacing:-.03em;
  background:linear-gradient(135deg,var(--grade-accent),#fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;
}
.logo span{font-weight:400;opacity:.6;-webkit-text-fill-color:var(--text-dim)}
.grade-tabs{display:flex;gap:4px;margin-left:auto}
.grade-tab{
  padding:8px 18px;border-radius:100px;border:none;cursor:pointer;
  font-family:inherit;font-weight:600;font-size:.82rem;
  background:transparent;color:var(--text-dim);transition:var(--transition);
  letter-spacing:.01em;position:relative;
}
.grade-tab:hover{color:var(--text);background:var(--surface2)}
.grade-tab.active{
  color:#fff;background:var(--grade-accent);
  box-shadow:0 2px 16px var(--grade-glow);
}

/* LAYOUT */
.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 64px)}
@media(max-width:900px){.app{grid-template-columns:1fr}}

/* SIDEBAR */
.sidebar{
  background:var(--surface);border-right:1px solid rgba(255,255,255,.04);
  padding:1.5rem 1rem;overflow-y:auto;height:calc(100vh - 64px);position:sticky;top:64px;
}
@media(max-width:900px){
  .sidebar{display:none;position:fixed;left:0;top:64px;width:300px;z-index:99;height:calc(100vh - 64px);box-shadow:8px 0 30px rgba(0,0,0,.5)}
  .sidebar.open{display:block}
}
.module-section{margin-bottom:1.5rem}
.module-header{
  display:flex;align-items:center;gap:.6rem;padding:.6rem .8rem;
  border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);
  font-weight:600;font-size:.85rem;color:var(--text-dim);
}
.module-header:hover{background:var(--surface2);color:var(--text)}
.module-header.active{color:var(--module-accent);background:var(--grade-surface)}
.module-icon{font-size:1.1rem}
.module-lessons{padding-left:.4rem;margin-top:.25rem;display:none}
.module-lessons.open{display:block}
.lesson-item{
  display:flex;align-items:center;gap:.6rem;
  padding:.5rem .8rem .5rem 2rem;border-radius:var(--radius-sm);
  cursor:pointer;transition:var(--transition);font-size:.82rem;color:var(--text-muted);
  border-left:2px solid transparent;margin-left:.4rem;
}
.lesson-item:hover{color:var(--text);background:var(--surface2)}
.lesson-item.active{
  color:var(--grade-accent);border-left-color:var(--grade-accent);
  background:var(--grade-surface);font-weight:500;
}
.lesson-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:6px;font-size:.7rem;font-weight:700;
  background:var(--surface3);color:var(--text-dim);flex-shrink:0;
}
.lesson-item.active .lesson-num{background:var(--grade-accent);color:#fff}

/* MOBILE MENU TOGGLE */
.mobile-toggle{
  display:none;background:none;border:none;color:var(--text);cursor:pointer;
  font-size:1.4rem;padding:4px;
}
@media(max-width:900px){.mobile-toggle{display:block}}

/* MAIN CONTENT */
.main{padding:2rem 2.5rem;overflow-y:auto}
@media(max-width:900px){.main{padding:1.5rem 1rem}}

.grade-banner{
  border-radius:var(--radius);padding:2.5rem 3rem;margin-bottom:2rem;
  background:linear-gradient(135deg,var(--grade-surface),transparent 70%);
  border:1px solid rgba(255,255,255,.04);position:relative;overflow:hidden;
}
.grade-banner::before{
  content:'';position:absolute;top:-60%;right:-10%;width:300px;height:300px;
  background:radial-gradient(circle,var(--grade-glow),transparent 70%);
  pointer-events:none;
}
.grade-banner h1{
  font-family:'Source Serif 4',serif;font-size:2rem;font-weight:700;
  letter-spacing:-.03em;margin-bottom:.4rem;
}
.grade-banner p{color:var(--text-dim);font-size:.95rem}

/* CONTENT CARD */
.content-card{
  background:var(--surface);border:1px solid rgba(255,255,255,.04);
  border-radius:var(--radius);padding:2rem 2.5rem;margin-bottom:1.5rem;
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.content-card h2{
  font-family:'Source Serif 4',serif;font-size:1.5rem;font-weight:700;
  margin-bottom:.3rem;letter-spacing:-.02em;
}
.content-card .page-ref{
  font-size:.78rem;color:var(--text-muted);margin-bottom:1.5rem;
  display:inline-flex;align-items:center;gap:.3rem;
  background:var(--surface2);padding:3px 10px;border-radius:100px;
}

/* TABS */
.content-tabs{display:flex;gap:4px;margin-bottom:1.5rem;flex-wrap:wrap}
.content-tab{
  padding:8px 16px;border-radius:100px;border:1px solid var(--surface3);
  background:transparent;color:var(--text-dim);cursor:pointer;
  font-family:inherit;font-size:.8rem;font-weight:500;transition:var(--transition);
}
.content-tab:hover{border-color:var(--text-muted);color:var(--text)}
.content-tab.active{
  background:var(--grade-accent);border-color:var(--grade-accent);color:#fff;
  box-shadow:0 2px 12px var(--grade-glow);
}
.tab-panel{display:none}
.tab-panel.active{display:block}
.tab-panel{
  font-size:.92rem;line-height:1.7;color:var(--text-dim);
}
.tab-panel b{color:var(--text);font-weight:600}
.tab-panel h3{color:var(--text);margin-top:1.2rem;margin-bottom:.5rem;font-size:1rem}
.tab-panel ul{margin-left:1.2rem;margin-top:.4rem;margin-bottom:.6rem}
.tab-panel li{margin-bottom:.3rem}
.tab-panel p{margin-bottom:.7rem}
.tab-panel i{font-style:italic;opacity:.85}

/* QUIZ VIEW */
.quiz-card{
  background:var(--surface);border:1px solid rgba(255,255,255,.04);
  border-radius:var(--radius);padding:2rem 2.5rem;margin-bottom:1rem;
  animation:fadeUp .4s ease;
}
.quiz-card h3{font-size:1rem;margin-bottom:1rem}
.quiz-option{
  display:block;width:100%;text-align:left;
  padding:.8rem 1rem;margin-bottom:.5rem;border-radius:var(--radius-sm);
  border:1px solid var(--surface3);background:var(--surface2);
  color:var(--text-dim);cursor:pointer;font-family:inherit;font-size:.88rem;
  transition:var(--transition);
}
.quiz-option:hover{border-color:var(--grade-accent);color:var(--text)}
.quiz-option.correct{border-color:#22c55e;background:rgba(34,197,94,.1);color:#4ade80}
.quiz-option.wrong{border-color:#ef4444;background:rgba(239,68,68,.08);color:#f87171}
.quiz-hint{
  margin-top:.8rem;padding:.8rem 1rem;border-radius:var(--radius-sm);
  background:rgba(249,115,22,.06);border-left:3px solid var(--grade-accent);
  font-size:.85rem;color:var(--text-dim);display:none;
}

/* EMPTY STATE */
.empty-state{
  text-align:center;padding:4rem 2rem;color:var(--text-muted);
}
.empty-state .icon{font-size:3rem;margin-bottom:1rem;opacity:.4}
.empty-state p{font-size:.95rem}


/* MODULE ILLUSTRATIONS */
.banner-illust{position:absolute;right:2rem;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
.banner-illust svg{width:140px;height:140px}
@media(max-width:900px){.banner-illust{right:1rem;opacity:.22}.banner-illust svg{width:90px;height:90px}}
.lesson-illust{float:right;margin:0 0 1rem 1.5rem;opacity:.85}
.lesson-illust svg{width:110px;height:110px}
@media(max-width:600px){.lesson-illust{display:none}}

/* FOOTER */
.footer{
  text-align:center;padding:2rem;font-size:.75rem;color:var(--text-muted);
  border-top:1px solid rgba(255,255,255,.03);margin-top:2rem;
}

/* GRADE THEMES */
.theme-orange{--grade-accent:#f97316;--grade-glow:rgba(249,115,22,.12);--grade-surface:rgba(249,115,22,.06)}
.theme-red{--grade-accent:#ef4444;--grade-glow:rgba(239,68,68,.12);--grade-surface:rgba(239,68,68,.06)}
.theme-blue{--grade-accent:#3b82f6;--grade-glow:rgba(59,130,246,.12);--grade-surface:rgba(59,130,246,.06)}
.theme-purple{--grade-accent:#a855f7;--grade-glow:rgba(168,85,247,.12);--grade-surface:rgba(168,85,247,.06)}

/* MODULE COLORS */
.mod-orange{--module-accent:#f97316}
.mod-red{--module-accent:#ef4444}
.mod-blue{--module-accent:#3b82f6}
.mod-purple{--module-accent:#a855f7}
.mod-emerald{--module-accent:#10b981}
.mod-amber{--module-accent:#f59e0b}
.mod-rose{--module-accent:#f43f5e}
.mod-cyan{--module-accent:#06b6d4}
.mod-indigo{--module-accent:#6366f1}


/* QUESTION BOX */
.question-box{
  background:var(--surface);border:1px solid rgba(255,255,255,.06);
  border-radius:var(--radius);padding:1.5rem 2rem;margin-top:1.5rem;
  animation:fadeUp .4s ease;
}
.question-box h3{font-size:1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.question-box .qb-form{display:flex;flex-direction:column;gap:.8rem}
.question-box input,.question-box textarea{
  background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);
  padding:.7rem 1rem;color:var(--text);font-family:inherit;font-size:.88rem;
  outline:none;transition:var(--transition);resize:vertical;
}
.question-box input:focus,.question-box textarea:focus{border-color:var(--grade-accent)}
.question-box textarea{min-height:80px}
.question-box .qb-context{
  font-size:.75rem;color:var(--text-muted);background:var(--surface2);
  padding:.4rem .8rem;border-radius:100px;display:inline-block;margin-bottom:.3rem;
}
.question-box .qb-send{
  align-self:flex-end;padding:.6rem 1.5rem;border-radius:100px;border:none;
  background:var(--grade-accent);color:#fff;font-family:inherit;font-weight:600;
  font-size:.85rem;cursor:pointer;transition:var(--transition);
}
.question-box .qb-send:hover{opacity:.85;transform:translateY(-1px)}
.question-box .qb-send:disabled{opacity:.4;cursor:not-allowed;transform:none}
.qb-success{
  padding:.8rem 1rem;border-radius:var(--radius-sm);background:rgba(34,197,94,.1);
  border:1px solid rgba(34,197,94,.2);color:#4ade80;font-size:.88rem;display:none;
  text-align:center;
}
.qb-success.show{display:block}

/* TEACHER PANEL BUTTON */
.teacher-btn{
  padding:6px 14px;border-radius:100px;border:1px solid var(--surface3);
  background:transparent;color:var(--text-dim);cursor:pointer;
  font-family:inherit;font-size:.78rem;font-weight:500;transition:var(--transition);
  white-space:nowrap;margin-left:8px;
}
.teacher-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--text-muted)}
.teacher-btn.active{background:var(--grade-accent);color:#fff;border-color:var(--grade-accent)}

/* TEACHER PANEL */
.teacher-panel{
  display:none;position:fixed;inset:0;z-index:200;
  background:var(--bg);overflow-y:auto;
}
.teacher-panel.open{display:block}
.teacher-panel .tp-header{
  position:sticky;top:0;z-index:201;
  background:rgba(12,12,15,.92);backdrop-filter:blur(20px);
  padding:1rem 2rem;border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
}
.teacher-panel .tp-header h2{font-size:1.2rem;font-weight:700;flex:1}
.tp-close{
  background:none;border:1px solid var(--surface3);color:var(--text);
  padding:6px 16px;border-radius:100px;cursor:pointer;font-family:inherit;
  font-size:.82rem;transition:var(--transition);
}
.tp-close:hover{background:var(--surface2)}
.tp-body{padding:1.5rem 2rem;max-width:900px;margin:0 auto}
.tp-stats{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;
  margin-bottom:2rem;
}
.tp-stat{
  background:var(--surface);border:1px solid rgba(255,255,255,.04);
  border-radius:var(--radius);padding:1rem 1.2rem;text-align:center;
}
.tp-stat .num{font-size:1.8rem;font-weight:800;color:var(--grade-accent)}
.tp-stat .label{font-size:.75rem;color:var(--text-muted);margin-top:.2rem}
.tp-filters{
  display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;
}
.tp-filter{
  padding:5px 12px;border-radius:100px;border:1px solid var(--surface3);
  background:transparent;color:var(--text-dim);cursor:pointer;
  font-family:inherit;font-size:.78rem;transition:var(--transition);
}
.tp-filter:hover{border-color:var(--text-muted);color:var(--text)}
.tp-filter.active{background:var(--grade-accent);border-color:var(--grade-accent);color:#fff}
.tp-search{
  flex:1;min-width:180px;padding:6px 12px;border-radius:100px;
  border:1px solid var(--surface3);background:var(--surface2);
  color:var(--text);font-family:inherit;font-size:.82rem;outline:none;
}
.tp-search:focus{border-color:var(--grade-accent)}
.tp-question{
  background:var(--surface);border:1px solid rgba(255,255,255,.04);
  border-radius:var(--radius);padding:1.2rem 1.5rem;margin-bottom:.8rem;
  transition:var(--transition);
}
.tp-question:hover{border-color:rgba(255,255,255,.08)}
.tp-question .tp-q-header{
  display:flex;align-items:center;gap:.8rem;margin-bottom:.6rem;flex-wrap:wrap;
}
.tp-question .tp-q-name{font-weight:600;font-size:.92rem;color:var(--text)}
.tp-question .tp-q-badge{
  font-size:.68rem;padding:2px 8px;border-radius:100px;font-weight:500;
}
.tp-question .tp-q-badge.b-6{background:rgba(249,115,22,.15);color:#fb923c}
.tp-question .tp-q-badge.b-7{background:rgba(239,68,68,.15);color:#f87171}
.tp-question .tp-q-badge.b-8{background:rgba(59,130,246,.15);color:#60a5fa}
.tp-question .tp-q-badge.b-9{background:rgba(168,85,247,.15);color:#c084fc}
.tp-question .tp-q-module{
  font-size:.7rem;padding:2px 8px;border-radius:100px;
  background:var(--surface2);color:var(--text-muted);
}
.tp-question .tp-q-date{font-size:.7rem;color:var(--text-muted);margin-left:auto}
.tp-question .tp-q-text{font-size:.9rem;color:var(--text-dim);line-height:1.6}
.tp-question .tp-q-lesson{font-size:.78rem;color:var(--text-muted);margin-top:.5rem;font-style:italic}
.tp-empty{text-align:center;padding:3rem;color:var(--text-muted)}
.tp-empty .icon{font-size:2.5rem;margin-bottom:.8rem;opacity:.3}
.tp-actions{display:flex;gap:.5rem;margin-top:.8rem}
.tp-action-btn{
  padding:4px 12px;border-radius:100px;border:1px solid var(--surface3);
  background:transparent;color:var(--text-dim);cursor:pointer;
  font-family:inherit;font-size:.72rem;transition:var(--transition);
}
.tp-action-btn:hover{background:var(--surface2);color:var(--text)}
.tp-action-btn.done{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.2);color:#4ade80}
.tp-export{
  padding:6px 16px;border-radius:100px;border:none;
  background:var(--surface2);color:var(--text-dim);cursor:pointer;
  font-family:inherit;font-size:.78rem;transition:var(--transition);
}
.tp-export:hover{background:var(--surface3);color:var(--text)}


/* LIGHT MODE */
body.light{
  --bg:#f5f5f7;--surface:#ffffff;--surface2:#eeeef0;--surface3:#dddde0;
  --text:#1a1a2e;--text-dim:#555566;--text-muted:#888899;
}
body.light .header{background:rgba(245,245,247,.88);border-bottom-color:rgba(0,0,0,.06)}
body.light .sidebar{background:#fff;border-right-color:rgba(0,0,0,.06)}
body.light .grade-banner{border-color:rgba(0,0,0,.06)}
body.light .content-card,body.light .question-box,body.light .quiz-card{border-color:rgba(0,0,0,.06);background:#fff}
body.light .logo{background:linear-gradient(135deg,var(--grade-accent),#1a1a2e);-webkit-background-clip:text}
body.light .logo span{-webkit-text-fill-color:var(--text-dim)}
body.light ::-webkit-scrollbar-thumb{background:#ccc}
body.light .content-tab{border-color:#ddd}
body.light .lesson-item{border-left-color:transparent}
body.light .lesson-item.active{border-left-color:var(--grade-accent)}
body.light .question-box input,body.light .question-box textarea{background:#f0f0f2;border-color:#ddd;color:#1a1a2e}
body.light .tp-question{background:#fff;border-color:rgba(0,0,0,.06)}
body.light .tp-stat{background:#fff;border-color:rgba(0,0,0,.06)}
body.light .quiz-option{background:#f5f5f7;border-color:#ddd;color:#555}
body.light .overlay{background:rgba(0,0,0,.3)}
body.light .teacher-panel{background:var(--bg)}

/* THEME TOGGLE */
.theme-toggle{
  width:36px;height:36px;border-radius:50%;border:1px solid var(--surface3);
  background:transparent;color:var(--text-dim);cursor:pointer;
  font-size:1.1rem;display:flex;align-items:center;justify-content:center;
  transition:var(--transition);flex-shrink:0;
}
.theme-toggle:hover{background:var(--surface2);color:var(--text);border-color:var(--text-muted)}

/* =====================================================================
   RESPONSIVE ENHANCEMENTS
   ===================================================================== */

/* SMALL TABLETS (max 900px) */
@media(max-width:900px){
  .header{padding:0 1rem;gap:.8rem;height:56px}
  .logo{font-size:1rem}
  .logo span{display:none}
  .grade-tabs{gap:2px}
  .grade-tab{padding:6px 12px;font-size:.75rem}
  .teacher-btn{padding:5px 10px;font-size:.72rem}
  .theme-toggle{width:32px;height:32px;font-size:.95rem}
  .main{padding:1.2rem 1rem}
  .grade-banner{padding:1.5rem;margin-bottom:1.2rem}
  .grade-banner h1{font-size:1.4rem}
  .content-card{padding:1.2rem 1.2rem}
  .content-card h2{font-size:1.2rem}
  .question-box{padding:1.2rem}
  .tp-body{padding:1rem}
}

/* PHONES (max 600px) */
@media(max-width:600px){
  .header{padding:0 .7rem;gap:.5rem;height:50px}
  .logo{font-size:.9rem}
  .grade-tabs{gap:1px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .grade-tabs::-webkit-scrollbar{display:none}
  .grade-tab{padding:5px 10px;font-size:.7rem;white-space:nowrap}
  .teacher-btn{padding:4px 8px;font-size:.68rem}
  .teacher-btn span.label{display:none}
  .theme-toggle{width:30px;height:30px;font-size:.9rem}
  
  .main{padding:1rem .8rem}
  .grade-banner{padding:1.2rem;margin-bottom:1rem;border-radius:10px}
  .grade-banner h1{font-size:1.15rem}
  .grade-banner p{font-size:.8rem}
  
  .content-card{padding:1rem;border-radius:10px}
  .content-card h2{font-size:1.1rem}
  .content-card .page-ref{font-size:.7rem}
  .content-tabs{gap:3px}
  .content-tab{padding:6px 10px;font-size:.72rem}
  .tab-panel{font-size:.85rem}
  .tab-panel ul{margin-left:.8rem}
  
  .question-box{padding:1rem;border-radius:10px}
  .question-box h3{font-size:.9rem}
  .question-box input,.question-box textarea{padding:.6rem .8rem;font-size:.82rem}
  .question-box .qb-send{padding:.5rem 1.2rem;font-size:.8rem}
  
  .sidebar.open{width:260px}
  .module-header{font-size:.8rem;padding:.5rem .6rem}
  .lesson-item{font-size:.78rem;padding:.4rem .6rem .4rem 1.5rem}
  
  .quiz-card{padding:1rem}
  .quiz-option{padding:.65rem .8rem;font-size:.82rem}
  
  .footer{font-size:.68rem;padding:1.5rem .8rem}
  
  /* Teacher panel mobile */
  .tp-header{padding:.8rem 1rem;gap:.6rem}
  .tp-header h2{font-size:1rem}
  .tp-stats{grid-template-columns:repeat(2,1fr);gap:.6rem}
  .tp-stat{padding:.7rem}

              <p><b>Evidência vs. Inferência:</b> Evidência é uma informação concreta que podemos observar (Ex: "O chão está molhado"). Inferência é a conclusão que tiramos (Ex: "Deve ter chovido"). É crucial distinguir o que é fato do que é interpretação.</p>
              
              <p><b>Empatia:</b> É a capacidade de se colocar no lugar do outro, compreendendo seus sentimentos e perspectivas. Para empreendedores, a empatia é essencial para entender as reais necessidades dos clientes e criar soluções que realmente ajudem.</p>

              <p><b>Atividade 3: Projeto de Liderança</b><br/>
              Cada grupo identifica um pequeno problema da escola (pode ser: desperdício de água, falta de organização, briga no recreio, etc.) e cria um plano de ação proativo com 3 passos concretos que ELES MESMOS podem liderar para melhorar a situação.</p>
            </div>`,
            homework: `<div class="space-y-2">

            title: "Trabalho em equipe",

            content: `<div class="space-y-4">
              <h3 class="font-bold text-lg">🎯 Teoria Aprofundada</h3>
              <p><b>Trabalho em Equipe:</b> É a capacidade de colaborar com outras pessoas em direção a um objetivo comum, respeitando diferenças, compartilhando responsabilidades e potencializando os talentos individuais. O todo é maior que a soma das partes!</p>
              
              <p><b>Sinergia:</b> Quando 1 + 1 = 3. É o resultado m��gico que acontece quando pessoas colaboram bem: o resultado coletivo é superior ao que cada um faria sozinho. Exemplo: uma orquestra produz uma música que nenhum músico sozinho conseguiria.</p>
              
              <p><b>Papéis em uma Equipe:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>O Criativo:</b> Gera ideias inovadoras</li>
                <li><b>O Organizador:</b> Planeja e mantém tudo nos trilhos</li>
                <li><b>O Executor:</b> Coloca as ideias em prática</li>
                <li><b>O Comunicador:</b> Mantém todos alinhados</li>
                <li><b>O Analítico:</b> Avalia riscos e benefícios</li>
                <li><b>O Motivador:</b> Mantém o ânimo da equipe</li>
              </ul>
              <p>Uma equipe forte tem diversos perfis complementares!</p>
              
              <h3 class="font-bold text-lg mt-4">📚 Caso Prático Real</h3>
              <p><b>Missão Apollo 11 (1969):</b> Levar o homem à Lua não foi obra de uma pessoa genial, mas de mais de 400.000 pessoas trabalhando em equipe! Engenheiros, cientistas, técnicos, matemáticos (incluindo mulheres negras como Katherine Johnson), cada um com seu papel essencial. Um erro de qualquer pessoa poderia causar tragédia.</p>
              
              <p><b>Google e a Equipe Perfeita:</b> O Projeto Aristóteles do Google estudou centenas de equipes para descobrir o que torna algumas excepcionais. Conclusão: não é ter os membros mais inteligentes, mas sim "segurança psicológica" - um ambiente onde todos se sentem à vontade para contribuir, errar e serem ouvidos.</p>
              
              <p><b>Exemplo Esportivo:</b> No futebol, ter 11 craques individualistas perde para um time com jogadores medianos que se complementam e trabalham juntos. A Seleção Brasileira de 1982 era tecnicamente superior, mas a Itália venceu pelo trabalho coletivo.</p>

            title: "Inovação e criatividade", 
            page: 22, 
            content: `<div class="space-y-4">
              <h3 class="font-bold text-lg">🎯 Teoria Aprofundada</h3>
              <p><b>Criatividade:</b> É a capacidade de gerar ideias novas, originais e úteis. Não é um dom que algumas pessoas têm e outras não - é uma habilidade que pode ser desenvolvida através de prática, curiosidade e liberdade para experimentar.</p>
              
              <p><b>Inovação:</b> É transformar uma ideia criativa em algo concreto que gera valor. Nem toda criatividade vira inovação, e nem toda inovação precisa ser algo nunca visto. Às vezes, inovar é combinar coisas existentes de forma nova ou melhorar significativamente algo que já existe (inovação incremental).</p>
              
              <p><b>Bloqueios da Criatividade:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li>Medo de errar ou ser julgado</li>
                <li>Pensar que existe apenas "uma resposta certa"</li>
                <li>Falta de tempo para imaginar e experimentar</li>
                <li>Ambientes rígidos que não permitem falhas</li>
                <li>Excesso de regras sem espaço para testar</li>
              </ul>
              
              <p><b>Técnicas para Estimular Criatividade:</b> Brainstorming (quantidade antes de qualidade), SCAMPER (Substituir, Combinar, Adaptar, Modificar, Propor outros usos, Eliminar, Reorganizar), Pensamento Lateral (fugir do óbvio), Observação de Padrões da Natureza.</p>
              
              <h3 class="font-bold text-lg mt-4">📚 Caso Prático Real</h3>
              <p><b>Post-it (3M):</b> Foi criado por ACIDENTE! Spencer Silver tentava criar uma super cola, mas criou uma cola fraca que grudava e desgrudava. Anos depois, Arthur Fry usou essa "falha" para marcar páginas de hinários da igreja. Resultado: um dos produtos mais vendidos do mundo! A inovação veio de ver valor em um "erro".</p>
              
              <p><b>Instagram:</b> Começou como Burbn (app de check-in). Os criadores OBSERVARAM que as pessoas só usavam a função de fotos. Tiveram a criatividade de eliminar tudo exceto as fotos e filtros. O Instagram nasceu dessa simplificação inovadora.</p>
              
              <p><b>Caneta BIC Cristal:</b> Antes de 1950, canetas vazavam muito. Marcel Bich inovou criando uma caneta barata, confiável e descartável. Não inventou a caneta, mas MELHOROU radicalmente (inovação incremental), tornando a escrita acessível a todos.</p>
              
              <p><b>Exemplo Escolar de Inovação:</b> Um aluno criou uma "régua flexível" usando material emborrachado pois tinha dificuldade para desenhar curvas. Não inventou a régua nem a borracha, mas COMBINOU de forma inovadora!</p>
            </div>`,
            exercise: `<div class="space-y-3">
              <h3 class="font-bold">Proposta de Trabalho em Sala:</h3>
              <p><b>Atividade 1: Desafio dos 30 Círculos</b><br/>

              <p><b>Atividade 2: Inovação de Objetos do Cotidiano</b><br/>
              Em grupos, escolham um objeto escolar comum (mochila, estojo, caderno, cadeira). Usando a técnica SCAMPER, listem 10 formas de melhorar ou dar novos usos para esse objeto. Exemplo: Estojo → E se ele fosse TRANSPARENTE para encontrar coisas mais rápido? E se DOBRASSE para economizar espaço? E se VIRASSE uma caixa de som?</p>

            </div>`,

{ id: 1, title: "Mindset Financeiro", page: 26,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>O que é Mindset Financeiro?</b> <i>Mindset</i> é uma palavra inglesa que significa mentalidade. Refere-se à forma como uma pessoa encara diferentes situações na vida — como sua mente age (ou reage) diante do que acontece. Ter um <b>mindset financeiro</b> é, portanto, a maneira como você pensa e age em relação ao dinheiro e às suas finanças.</p>
    <p><b>Por que isso importa?</b> Quem desenvolve um mindset financeiro saudável consegue reconhecer os desafios que a organização das finanças traz, entende a importância do controle financeiro e cria costumes saudáveis como poupar, não ter gastos excessivos e saber administrar o dinheiro de fato.</p>
    <p><b>Exemplo prático:</b> Matheus recebe R$30,00 por semana dos pais. Ao querer comprar um jogo de R$69,90, levou lanche de casa por duas semanas e juntou R$60,00. Seus pais completaram o valor, mas descontaram da semana seguinte. Resultado: Matheus precisou se planejar com apenas R$20,10 na semana seguinte, mesmo precisando de R$30 para lanchar.</p>
    <p><b>Lição:</b> Mesmo em situações simples do dia a dia, nossas decisões financeiras têm consequências. Pensar antes de gastar é o primeiro passo do mindset financeiro.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade 1:</b> Resolver a situação-problema do Matheus: o que você faria no lugar dele? Como organizaria os R$20,10 para a semana?</p>
    <p><b>Atividade 2:</b> Calcular: se um sorvete aumentou de R$2,00 para R$2,70 e a mesada subiu de R$25 para R$32, quem ganhou mais — o aumento da mesada ou o aumento do preço? Quantos sorvetes você comprava antes e quantos compra agora?</p>
  </div>`,

{ id: 2, title: "O que eu tenho a ver com meu dinheiro?", page: 28,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Consumo Excessivo:</b> É quando gastamos mais do que precisamos ou mais do que podemos. Segundo a Pesquisa de Endividamento da Confederação Nacional do Comércio, quase 78% da população está endividada no Brasil — ou seja, dentre 212,6 milhões de brasileiros, 165,8 milhões estão endividados!</p>
    <p><b>Meu consumo semanal:</b> Saber exatamente quanto você ganha e quanto gasta é o primeiro passo para ter controle financeiro. Quando registramos nossos gastos, conseguimos identificar onde estamos gastando demais e onde podemos economizar.</p>
    <p><b>Exercício de consciência:</b> Pergunte a si mesmo: "Houve algum consumo excessivo esta semana? O que eu poderia ter feito diferente?"</p>
  </div>`,

{ id: 3, title: "Eu sou o que consumo", page: 30,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Consumo Consciente vs. Consumo Excessivo:</b> Consumir é natural e necessário. O problema é quando consumimos sem pensar — comprando por impulso, por status ou por pressão dos outros. Consumo consciente significa pensar antes de comprar: "Eu realmente preciso disso? Posso esperar?"</p>
    <p><b>Necessidade vs. Desejo:</b></p>
    <ul>
      <li><b>Necessidade:</b> Tudo que precisamos para viver com dignidade — moradia, saúde, alimentação, transporte, educação</li>
      <li><b>Desejo:</b> Aquilo que queremos, mas que não é indispensável — o celular de última geração, o tênis de marca, o videogame novo</li>
    </ul>
    <p><b>Dinâmica de sala:</b> O professor coloca no quadro nomes de produtos consumidos por muitas pessoas (iPhone, PC Gamer, câmera fotográfica, bicicleta) com seus preços. Cada aluno recebe um saldo fictício e precisa decidir o que comprar. Ao final, revela-se que os preços são reais — e os alunos refletem sobre suas escolhas.</p>
  </div>`,
  exercise: `<div class="space-y-3">

    <p><b>Atividade 2:</b> Com um saldo fictício, escolha itens para comprar de uma lista com preços reais. Some o total gasto e subtraia do saldo. Sobrou? Faltou? O que aprendeu?</p>

{ id: 4, title: "Poupar para quê?", page: 32,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>A importância de poupar:</b> Poupar dinheiro é guardar uma parte do que ganhamos para usar no futuro. Não importa o valor — o que importa é a constância e a disciplina. Quem poupa está pensando no longo prazo, possibilitando um futuro mais tranquilo financeiramente.</p>
    <p><b>Reserva de emergência:</b> É o dinheiro guardado para imprevistos (doença, conserto urgente, perda de emprego). Ter uma reserva evita que você precise se endividar quando algo inesperado acontece.</p>
    <p><b>Palavra-cruzada financeira:</b> Encontre as palavras SAUDÁVEL, PLANCHAR, OBJETIVO (as palavras-chave da poupança estão escondidas!)</p>
    <p><b>Construção do cofrinho:</b> Usando materiais recicláveis (caixa de leite, caixa de sapato), cada aluno constrói seu próprio cofrinho. A meta: definir o que quer comprar, colar uma etiqueta com o objetivo, e começar a poupar. Não importa quanto valor é depositado — importa a constância e a disciplina!</p>
  </div>`,
  exercise: `<div class="space-y-3">

    <p><b>Atividade 2:</b> Construção do cofrinho com materiais recicláveis. Defina sua meta e cole uma etiqueta com o objetivo. Estabeleça um prazo para a abertura do cofrinho.</p>
  </div>`,

{ id: 5, title: "Como investir bem", page: 34,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>O que é investir?</b> Investir é aplicar seu dinheiro (ou tempo, ou esforço) em algo que vai gerar retorno no futuro. Existem diferentes tipos de "capital" que podemos investir:</p>
    <ul>
      <li><b>Capital Financeiro:</b> Dinheiro investido (poupança, ações, negócio próprio)</li>
      <li><b>Capital Intelectual:</b> Conhecimento investido (estudos, cursos, leitura)</li>
      <li><b>Capital Social:</b> Relacionamentos investidos (amizades, networking, família)</li>
      <li><b>Capital de Saúde:</b> Saúde investida (exercícios, alimentação, sono)</li>
    </ul>
    <p><b>Juros compostos — a mágica do tempo:</b> Se você investir R$3.000 por ano com rendimento de 5% ao ano: Ano 1 = R$3.575 | Ano 2 = R$6.875 | Ano 3 = R$10.175 | Ano 4 = R$13.475 | Ano 5 = R$16.775. O dinheiro cresce cada vez mais rápido porque os juros incidem sobre juros anteriores!</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade 1:</b> Mapa dos Investimentos: em cartolina, crie um mapa visual dos 4 tipos de capital (financeiro, intelectual, social, saúde) e dê exemplos de como investir em cada um.</p>
    <p><b>Atividade 2:</b> Calcule quanto teria em 5 anos investindo valores diferentes por ano. Compare os resultados com os colegas.</p>
  </div>`,
  homework: `<div class="space-y-2">

{ id: 6, title: "Ué, preciso me planejar?", page: 36,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Planejamento financeiro é como arrumar a mochila:</b> Assim como você precisa organizar a mochila no dia anterior para não esquecer nada na escola, um bom planejamento financeiro exige que você saiba previamente quanto vai ganhar, quanto vai gastar e como vai distribuir seu dinheiro.</p>
    <p><b>Analogia com o professor:</b> Para dar uma boa aula, o professor precisa planejá-la previamente — saber qual conteúdo vai ministrar, que atividades fazer. Na vida financeira é igual: para uma vida saudável, é necessário planejar.</p>
    <p><b>Que atividades exigem planejamento?</b> Vir à escola, viagens, jogar com amigos, planejamento da rotina de estudos. Toda atividade bem-sucedida tem planejamento por trás. O mesmo vale para suas finanças!</p>
  </div>`,
  exercise: `<div class="space-y-3">

{ id: 7, title: "1 + 1 = 3!", page: 38,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Rentabilidade:</b> É o grau de sucesso de um investimento econômico, calculado a partir do percentual de remuneração alcançado ao longo de dias, meses e anos. Quando investimos bem, 1 + 1 pode virar 3! O dinheiro trabalha para você.</p>
    <p><b>Sustentabilidade financeira:</b> Uma empresa (ou pessoa) sustentável financeiramente consegue: manter seus custos sob controle, planejar investimentos, ter rentabilidade e não depender de empréstimos para sobreviver.</p>
    <p><b>Atividade prática:</b> Os alunos são chamados para auxiliar uma empresa fictícia que deseja começar a investir seu dinheiro. Antes disso, ela precisa cortar alguns gastos e manter sustentabilidade financeira — para assim conseguir se planejar, investir e ter rentabilidade sobre o dinheiro economizado.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Ajude a empresa fictícia: analise a lista de gastos, identifique quais podem ser cortados ou reduzidos, sugira produtos para serem retirados do catálogo e justifique suas escolhas. Calcule quanto a empresa economizaria com os cortes.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Observe em casa: há gastos que poderiam ser reduzidos? Converse com a família sobre sustentabilidade financeira — sem cobrar, apenas compartilhando o que aprendeu.</p>
  </div>` },
{ id: 8, title: "Ponto de equilíbrio", page: 40,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>O que é ponto de equilíbrio?</b> É o momento em que os produtos/serviços que a empresa oferece cobrem todos os custos necessários — o "break-even point". A empresa "se paga" e a partir dali, começa a lucrar.</p>
    <p><b>Exemplo prático:</b> Uma franquia de fast food custa R$500.000,00 de investimento. O faturamento mensal é de R$120.000,00 e o custo mensal fixo é de R$70.000,00 — ou seja, lucra R$50.000,00 por mês. Ponto de equilíbrio: R$500.000 ÷ R$50.000 = 10 meses para recuperar o investimento.</p>
    <p><b>Estratégias para alcançar o equilíbrio mais rápido:</b> Definir bem as despesas fixas, promover incentivos de vendas, reduzir custos desnecessários e manter a projeção de vendas realista.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Calcule o ponto de equilíbrio de um negócio fictício: uma barraquinha de brigadeiros com custo de R$22 por caixa (3 unidades), vendida a R$3 cada. Qual o lucro por caixa? Quanto precisa vender para pagar o investimento inicial? Desenvolva estratégias para acelerar o equilíbrio.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Pesquise um negócio real do seu bairro (lanchonete, mercadinho, salão). Pergunte ao dono: quanto tempo levou para o negócio "se pagar"? O que fez para alcançar o equilíbrio? Anote as respostas.</p>
  </div>` },

{ id: 1, title: "Liderar é essencial", page: 44,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Liderança e Inovação caminham juntas.</b> Para que um movimento disruptivo e inovador aconteça, a liderança é uma habilidade essencial. Um líder não é apenas quem manda — é quem motiva, inspira e ajuda as pessoas a alcançarem objetivos juntas.</p>
    <p><b>10 Qualidades de um Líder:</b> Visão, comunicação, empatia, coragem, integridade, capacidade de decisão, resiliência, humildade, criatividade e capacidade de inspirar os outros.</p>
    <p><b>Neste módulo:</b> Os alunos serão capazes de compreender os princípios da inovação através do desenvolvimento de um projeto inovador, com uma situação-problema real. A resolução desse problema se dará de forma inovadora e criativa, seguindo um plano de projeto.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade 1:</b> O professor apresenta 10 frases sobre qualidades de um líder. Os alunos classificam cada frase com ✓ (concordo) ou ✗ (discordo) e justificam.</p>
    <p><b>Atividade 2:</b> Pense em um líder que você admira (da escola, da família, da comunidade ou famoso). Que qualidades ele tem? Como ele inspira as pessoas? Apresente para a turma.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Observe líderes ao seu redor durante a semana (na escola, em casa, na TV). Anote 3 atitudes de liderança que presenciou e traga para compartilhar.</p>
  </div>` },
{ id: 2, title: "Como vencer o bloqueio criativo", page: 46,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Criatividade é como um músculo:</b> Quanto mais pratico exercício físico, mais o músculo se desenvolve. Assim é a criatividade — quanto mais eu a coloco em prática nas diferentes situações da vida, mais criativo eu me torno, mais facilmente a criatividade se expressa.</p>
    <p><b>Bloqueio criativo:</b> É aquela falta de inspiração na hora de criar algo. Todo mundo já passou por isso — na hora de escrever uma redação, criar uma estratégia para um jogo, ou pensar numa solução para um problema. A boa notícia: bloqueio criativo se vence com prática!</p>
    <p><b>Identidade visual:</b> É o conjunto de elementos formais que representa visualmente, e de forma sistematizada, um nome, ideia, produto, empresa ou serviço (a marca e as cores dela). Criar uma identidade visual é um exercício de criatividade aplicada.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Criação de Identidade Visual — abra o livro e siga o passo a passo para criar a identidade visual de um produto, empresa ou serviço fictício. Use cores, formas e elementos que representem a marca. Lembre-se: quanto mais praticar, mais criativo será!</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Observe 5 marcas famosas ao seu redor (embalagens, propagandas, lojas). Anote: quais cores usam? Que sensação transmitem? A identidade visual combina com o produto?</p>
  </div>` },
{ id: 3, title: "Solucionando um problema", page: 48,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Inovação começa com um problema.</b> Todo produto ou serviço inovador nasceu porque alguém identificou um problema e decidiu criar uma solução. O Uber nasceu porque era difícil pegar táxi. O iFood nasceu porque pedir comida por telefone era trabalhoso.</p>
    <p><b>Processo de solução:</b></p>
    <ul>
      <li><b>1. Identificar o problema:</b> O que incomoda? O que poderia ser melhor?</li>
      <li><b>2. Pesquisar:</b> Outras pessoas também têm esse problema? Como elas resolvem hoje?</li>
      <li><b>3. Idear:</b> Gerar muitas ideias de solução (brainstorming — sem julgar!)</li>
      <li><b>4. Selecionar:</b> Escolher a ideia mais viável e criativa</li>
    </ul>
    <p><b>O aluno será capaz de solucionar problemas de forma rápida e proativa</b> — uma habilidade essencial tanto para empreendedores quanto para a vida.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Identifique um problema real na escola ou comunidade. Faça brainstorming de pelo menos 5 soluções possíveis. Selecione a mais criativa e viável. Descreva no livro do aluno: qual é o problema, quem é afetado, e qual é sua ideia de solução.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Durante a semana, identifique 3 problemas do dia a dia que poderiam ser resolvidos com inovação. Anote e traga para compartilhar. Lembre: o empreendedor vê oportunidade onde outros veem problema!</p>
  </div>` },
{ id: 4, title: "Inovando diante do problema", page: 50,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Características de ideias inovadoras:</b> Nem toda ideia é inovadora. Uma ideia inovadora tem algumas características especiais:</p>
    <ul>
      <li><b>Otimização:</b> Faz algo de forma mais eficiente</li>
      <li><b>Simplificação:</b> Torna algo complexo mais simples</li>
      <li><b>Funcionamento simples e direto:</b> Qualquer pessoa consegue usar</li>
      <li><b>Benefícios em cima de produtos já existentes:</b> Melhora o que já existe</li>
    </ul>
    <p><b>Perguntas para testar sua ideia:</b> "Minha criação é simples para todos utilizarem? Uma pessoa que não lê manuais consegue utilizar? Qual o diferencial em relação ao que já existe no mercado?"</p>
    <p>Se algum aluno finalizar primeiro, estimule-o a ajudar os colegas — colaboração é parte da inovação!</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Continue desenvolvendo a solução da aula anterior. Agora, aplique os critérios de inovação: sua solução é otimizada? Simples? Direta? Tem diferencial? Refine a ideia com base nessas perguntas e registre no livro.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Pesquise uma inovação brasileira recente (pode ser app, produto, serviço). Analise: ela é otimizada? Simples? Tem diferencial claro? Traga a pesquisa para compartilhar.</p>
  </div>` },
{ id: 5, title: "Validando a solução", page: 52,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Toda inovação depende de validação.</b> Não basta ter uma boa ideia — é preciso verificar se ela realmente funciona e se as pessoas realmente a querem. Validar significa testar a ideia com pessoas reais antes de investir tempo e dinheiro nela.</p>
    <p><b>Como validar:</b></p>
    <ul>
      <li><b>Pesquisa:</b> Pergunte às pessoas se elas têm o problema que você identificou</li>
      <li><b>Checklist:</b> Use critérios objetivos para avaliar se a solução é viável</li>
      <li><b>Feedback:</b> Mostre sua ideia para outras pessoas e ouça opiniões honestas</li>
      <li><b>Iteração:</b> Use o feedback para melhorar a solução</li>
    </ul>
    <p>Os alunos usam o checklist do livro para conduzir pesquisas com colegas de sala — esse é o último passo antes de começar a prototipar.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Siga o passo a passo do livro para validar sua solução. Use o checklist e realize pesquisas com colegas de sala e de outras turmas. Anote os resultados: quantas pessoas disseram que usariam? Que sugestões deram?</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Valide sua ideia com pelo menos 5 pessoas fora da escola (família, vizinhos, amigos). Pergunte: "Você tem esse problema? Usaria essa solução? O que melhoraria?" Traga os resultados.</p>
  </div>` },
{ id: 6, title: "Prototipando I", page: 54,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>O que é um protótipo?</b> É uma versão simplificada da sua solução — um "rascunho funcional". Não precisa ser bonito ou perfeito! O protótipo serve para testar se a ideia funciona na prática antes de investir em uma versão final.</p>
    <p><b>Tipos de protótipo:</b></p>
    <ul>
      <li><b>Protótipo de papel:</b> Desenho ou esboço feito à mão (mais simples e rápido)</li>
      <li><b>Protótipo de baixa fidelidade:</b> Feito com materiais simples (papelão, cola, recortes)</li>
      <li><b>Protótipo digital:</b> Feito no computador ou celular (para apps e sites)</li>
    </ul>
    <p><b>O que está sendo avaliado NÃO é a habilidade de desenho</b> — é a ideia, a estrutura e o pensamento por trás da solução. Erros são normais e fazem parte do processo!</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Comece a construir o protótipo de papel da sua solução. Desenhe de forma coerente, tendo um esboço simplificado que tenha a ideia principal do seu projeto (ou as telas do mesmo). Use exemplos de protótipos de papel disponíveis nos conteúdos de aprofundamento.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Continue desenvolvendo seu protótipo em casa. Pesquise exemplos de protótipos de papel na internet para se inspirar. Traga pronto ou quase pronto para a próxima aula!</p>
  </div>` },
{ id: 7, title: "Prototipando II", page: 56,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Continuação da prototipagem:</b> Nesta aula, os alunos dão continuidade ao que foi feito na aula anterior, refinando e finalizando seus protótipos de baixa resolução.</p>
    <p><b>Testes de usabilidade:</b> Os protótipos de papel podem ser testados através de um teste de usabilidade: o criador do protótipo seleciona algumas pessoas para testar como seria a navegação no protótipo criado, e assim obtém retorno da usabilidade.</p>
    <p><b>Lembre-se:</b> A criação de um protótipo de papel é algo inicial — o que está sendo avaliado ali não é habilidade de desenho, nem de produto como um todo. Erros podem ocorrer, são normais nesse processo. Tranquilize os alunos!</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Finalize o protótipo e realize testes de usabilidade com colegas. Peça para 2-3 pessoas "navegarem" pelo seu protótipo sem explicação. Observe: onde travaram? O que não entenderam? Anote o feedback e faça ajustes.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Mostre seu protótipo finalizado para familiares. Peça feedback honesto: "Você entendeu o que faz? Usaria?" Anote as sugestões de melhoria.</p>
  </div>` },
{ id: 8, title: "Pesquisa final de Validação", page: 58,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Validação final do projeto:</b> Com o protótipo pronto e já testado, agora é hora de fazer uma pesquisa final mais ampla para validar definitivamente se a solução é viável. Esta é a última etapa antes de apresentar o projeto completo.</p>
    <p><b>O que validar:</b></p>
    <ul>
      <li>O problema existe de verdade para outras pessoas?</li>
      <li>A solução proposta resolve o problema?</li>
      <li>As pessoas usariam/comprariam essa solução?</li>
      <li>O que precisa melhorar?</li>
    </ul>
    <p><b>Apresentação:</b> Ao final do módulo, os alunos terão um projeto autoral e inovador criado. Sugere-se criar uma mostra de conhecimentos para mobilizar toda a comunidade escolar a conhecer esses projetos.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Conduza a pesquisa final de validação usando o formulário do livro. Entreviste colegas de outras turmas, professores e funcionários da escola. Compile os resultados e prepare uma breve apresentação do projeto completo: problema → solução → protótipo → validação.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Prepare a versão final da apresentação do seu projeto. Se possível, grave um vídeo de 1 minuto apresentando: o problema, a solução e o protótipo. Esse material pode ser usado para divulgar a mostra de inovação!</p>
  </div>` },

{ id: 1, title: "Conceito de Comunicação", page: 62,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>O que é comunicação?</b> É o processo de troca de informações entre duas ou mais partes. Quem transmite a mensagem é o <b>transmissor</b> (emissor) e quem recebe é o <b>receptor</b>. Toda conversa passa por um <b>canal</b> — no caso de uma conversa pessoal, é pelo ouvido, onde a mensagem é "decodificada" e entendida (ou não!).</p>
    <p><b>Comunicação Verbal:</b> Usa palavras — pode ser falada (conversa, apresentação) ou escrita (texto, mensagem, e-mail). Quando falamos de uma revista ou anúncio, a comunicação pode ser não verbal, através de imagens.</p>
    <p><b>Comunicação Não Verbal:</b> Transmite mensagem sem palavras — gestos, expressões faciais, postura corporal, tom de voz, olhar, distância entre as pessoas.</p>
    <p><b>Neste módulo:</b> Os alunos serão capazes de compreender os estilos comunicacionais, descobrir qual seu próprio estilo e como melhorar sua comunicação com os outros, tornando-a ainda mais eficiente. O papel da comunicação de um líder também será abordado.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade 1:</b> Liste exemplos de comunicação verbal e não verbal do dia a dia. Após as contribuições, classifique cada exemplo.</p>
    <p><b>Atividade 2:</b> Em duplas, um aluno tenta comunicar um sentimento (alegria, tristeza, surpresa, medo) APENAS com expressões faciais e gestos. O colega adivinha. Depois troquem.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Observe uma conversa entre duas pessoas (pode ser na TV). Anote 3 exemplos de comunicação não verbal que percebeu (gestos, expressões, postura). Traga para compartilhar.</p>
  </div>` },
{ id: 2, title: "Estilos Comunicacionais", page: 64,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Cada pessoa tem um estilo de comunicação predominante.</b> Conhecer o seu estilo ajuda a se comunicar melhor e a entender por que às vezes há mal-entendidos.</p>
    <p><b>Os 4 Estilos Comunicacionais:</b></p>
    <ul>
      <li><b>Analítico:</b> Focado em fatos, dados e detalhes. Gosta de informações precisas e prefere análise antes de decidir. Pode parecer frio, mas é confiável e metódico. São "baús de informações".</li>
      <li><b>Funcional:</b> Gosta de comunicar processos, cronogramas, passo a passo e planos bem pensados. Não deixa escapar nenhum detalhe. Diferente do analítico, consegue explicar de onde os fatos vêm.</li>
      <li><b>Intuitivo:</b> Valoriza uma visão ampla da situação. Prefere ir direto ao ponto. Comunicação rápida e direta — não se prende ao excesso de informações quando não acredita ser necessário.</li>
      <li><b>Emocional:</b> Valoriza a linguagem emocional e conexão. Tende a ser pacificador e estabelecer boas relações com todos. Avalia não apenas como as pessoas pensam, mas como elas se sentem sobre os assuntos.</li>
    </ul>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade 1:</b> O professor escreve os 4 estilos no quadro. Lê um por vez e pede que a turma diga características de cada estilo.</p>
    <p><b>Atividade 2:</b> Cada aluno identifica qual estilo comunicacional acredita predominar em sua vida, enumera 3 características que justificam a escolha, e descreve uma situação que ilustra esse estilo. Depois, voluntários leem a situação e a turma adivinha o estilo.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Observe durante a semana os estilos comunicacionais dos seus familiares e amigos. Consiga identificar? Qual estilo predomina em cada pessoa? Anote suas observações.</p>
  </div>` },
{ id: 3, title: "Comunicação Interpessoal", page: 66,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Comunicação Interpessoal</b> é a comunicação verbal ou não verbal entre duas ou mais pessoas. É a forma como nos relacionamos com os outros no dia a dia. Podemos aprender a nos comunicar melhor respeitando o estilo comunicacional de cada pessoa.</p>
    <p><b>Técnica de Rapport:</b> A expressão vem do francês <i>rapporter</i>, que significa "criar uma relação". É estabelecer uma conexão de confiança e harmonia com outra pessoa. Quando há rapport, a comunicação flui naturalmente.</p>
    <p><b>Técnica de Espelhamento:</b> Consiste em observar e sutilmente imitar a linguagem corporal, tom de voz e ritmo de fala da outra pessoa. Isso cria uma sensação inconsciente de sintonia e confiança.</p>
    <p><b>Importante:</b> A comunicação interpessoal é muito importante na relação entre pessoas, mas ainda mais importante é a comunicação <b>intrapessoal</b> — o tema da próxima aula!</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade 1:</b> Em duplas, pratiquem a técnica de Rapport: um aluno conta uma história, e o outro pratica escuta ativa (mantendo contato visual, acenando, fazendo perguntas). Depois troquem.</p>
    <p><b>Atividade 2:</b> Pratiquem Espelhamento: em duplas, um fala e o outro sutilmente acompanha seus gestos e tom de voz. Ao final, discutam: perceberam a diferença quando há espelhamento?</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Durante a semana, pratique rapport com alguém: escuta ativa, contato visual, perguntas genuínas. Anote como a pessoa reagiu — a comunicação ficou melhor?</p>
  </div>` },
{ id: 4, title: "Comunicação Intrapessoal", page: 68,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Comunicação Intrapessoal</b> é popularmente conhecida como "sua voz interior". São os diálogos que você constrói consigo mesmo — por meio de pensamentos, reflexões sobre situações, decisões e emoções.</p>
    <p><b>Por que ela é importante?</b> É através dessa comunicação que conseguimos lidar com nossas emoções, compreender melhor o que queremos e desejamos para nossa vida, nos encorajar diante dos desafios e pensar sobre ações futuras. Sem esse contato consigo mesmo, nossas ações podem ser vistas de forma superficial e rasas.</p>
    <p><b>7 Pontos que a comunicação intrapessoal desenvolve:</b></p>
    <ul>
      <li>1. Você conhecerá melhor os seus sonhos e objetivos</li>
      <li>2. Você aprenderá com seus medos e se fortalecerá</li>
      <li>3. Você aprenderá a se perdoar diante dos erros</li>
      <li>4. Você melhora suas relações interpessoais</li>
      <li>5. Você desenvolverá sua capacidade de empatia</li>
      <li>6. Você irá melhorar seu foco e concentração</li>
      <li>7. Você irá controlar suas pressões cotidianas</li>
    </ul>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> "Como estão meus pensamentos?" — Desenhe o que você tem na cabeça naquele momento, no que está pensando. Não é necessário ser um craque em desenho! O propósito é desenvolver autoconhecimento e capacidade de se ouvir. Depois, pinte o desenho — as cores podem refletir muito sobre os sentimentos dos estudantes.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Reserve 5 minutos antes de dormir para praticar comunicação intrapessoal: "Como foi meu dia? O que senti? O que faria diferente?" Anote em um caderninho. Faça isso por pelo menos 3 dias consecutivos.</p>
  </div>` },
{ id: 5, title: "Técnicas de comunicação", page: 70,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Principais técnicas de comunicação</b> que podem ser usadas em qualquer âmbito da vida:</p>
    <ul>
      <li><b>Oratória:</b> A arte de falar em público com clareza, confiança e impacto. Envolve preparação, prática e controle do nervosismo</li>
      <li><b>Escuta Ativa:</b> Ouvir de verdade — prestando atenção total, sem interromper, fazendo perguntas para entender melhor</li>
      <li><b>Linguagem Corporal:</b> Consciência de como seu corpo comunica — postura, gestos, expressões faciais</li>
      <li><b>Storytelling:</b> Contar histórias envolventes para transmitir uma mensagem de forma memorável</li>
      <li><b>Comunicação Assertiva:</b> Expressar suas opiniões e necessidades de forma clara e respeitosa, sem ser agressivo nem passivo</li>
    </ul>
    <p><b>Comunicação assertiva vs. agressiva vs. passiva:</b> O assertivo diz o que pensa com respeito. O agressivo impõe sua opinião. O passivo não expressa o que sente. O passivo-agressivo expressa frustração de forma indireta.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade 1:</b> "Piloto de Comunicação" — Um aluno é o "piloto" que deve dar instruções verbais para que outro aluno (de olhos vendados) atravesse um percurso com obstáculos na sala. Pratique clareza e escuta ativa!</p>
    <p><b>Atividade 2:</b> Classifique situações como assertiva, agressiva, passiva ou passivo-agressiva. Discuta como cada uma afeta os relacionamentos.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Escolha uma das técnicas aprendidas (oratória, escuta ativa, assertividade) e pratique durante a semana. Anote uma situação onde usou a técnica e como foi o resultado.</p>
  </div>` },
{ id: 6, title: "Trabalho em equipe: Comunicação é essencial", page: 72,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Trabalho em equipe é uma habilidade empreendedora essencial.</b> O mundo é colaborativo, e o futuro será ainda mais! Por isso, é muito importante aprender a colaborar bem no trabalho com outras pessoas.</p>
    <p><b>Equipe vs. Grupo:</b> Um grupo é apenas um conjunto de pessoas. Uma equipe sempre tem um objetivo, uma meta a cumprir — e essa é a característica essencial! Se há um ajuntamento de pessoas, mas não há uma meta em comum, não há uma equipe.</p>
    <p><b>Na equipe:</b> Cada participante contribui com seu tempo, energia e habilidades. Todos devem interagir e cumprir suas responsabilidades. Tendências comportamentais de cada um podem afetar positiva ou negativamente o trabalho.</p>
    <p><b>Proatividade no trabalho em equipe:</b> Intervenha de forma proativa e assertiva em situações de conflito. Comunicação é o que mantém a equipe funcionando!</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Reflita sobre situações de trabalho em equipe onde houve agressividade, passividade ou passivo-agressividade. Como poderia ter intervido de forma proativa e assertiva? Discuta em grupo e registre no livro do aluno.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Observe um trabalho em equipe durante a semana (pode ser na escola, em casa ou na TV). Identifique: quem liderou? Houve conflitos? A comunicação foi eficiente? O que poderia melhorar?</p>
  </div>` },
{ id: 7, title: "Tipos de líderes", page: 74,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Liderança:</b> Líder é aquele que motiva e inspira pessoas de forma positiva. Um bom líder é proativo (toma iniciativa) e não reativo (apenas reage aos acontecimentos).</p>
    <p><b>Proatividade é uma característica dos líderes que se destacam.</b> Quando decidimos agir com proatividade, uma revolução acontece em todas as relações interpessoais. Uma pessoa proativa inspira outras, e acaba influenciando-as positivamente.</p>
    <p><b>A capacidade de inspirar e orientar pessoas</b> é a essência da liderança, que é fundamental quando pensamos em gestão de negócios e equipes de trabalho.</p>
    <p><b>Tipos de líderes:</b> Líder autocrático (decide sozinho), Líder democrático (decide com a equipe), Líder liberal (dá autonomia total), Líder servidor (coloca a equipe em primeiro lugar). Cada estilo tem vantagens e desvantagens dependendo da situação.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade 1:</b> Identifique qual tipo de líder cada personagem é (o professor apresenta cenários). Justifique.</p>
    <p><b>Atividade 2:</b> Identifique líderes que admira e analise: qual estilo de liderança eles usam? São proativos? Como inspiram as pessoas ao redor?</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Pratique liderança durante a semana: tome a iniciativa de ajudar alguém sem que peçam, organize algo para o grupo de amigos, ou sugira uma melhoria na escola. Anote o que fez e como se sentiu.</p>
  </div>` },
{ id: 8, title: "Feedback é essencial!!", page: 76,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>O que é feedback?</b> É um retorno sobre algo que foi feito — pode ser positivo (elogio, reconhecimento) ou construtivo (sugestão de melhoria). Feedback NÃO é crítica destrutiva!</p>
    <p><b>Por que feedback é essencial?</b></p>
    <ul>
      <li>Nos ajuda a melhorar continuamente</li>
      <li>Fortalece a comunicação entre pessoas</li>
      <li>Cria confiança nas relações</li>
      <li>É a base do aprendizado — sem feedback, repetimos os mesmos erros</li>
    </ul>
    <p><b>Como dar bom feedback:</b> Seja específico (não "foi bom", mas "gostei de como você organizou as ideias"), seja respeitoso, foque no comportamento (não na pessoa), e sempre sugira uma melhoria junto com o elogio.</p>
    <p><b>Como receber feedback:</b> Ouça com atenção, não se defenda imediatamente, agradeça a pessoa, reflita sobre o que foi dito e decida o que pode melhorar.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade 1:</b> Em duplas, cada aluno apresenta algo que fez durante o módulo (protótipo, desenho, texto). O colega dá feedback usando a estrutura: "Gostei de... | Sugiro que... | Uma pergunta que tenho é..."</p>
    <p><b>Atividade 2:</b> Reflita sobre o módulo inteiro: qual técnica de comunicação mais gostou de aprender? Em qual aula participou mais ativamente? O que gostaria de aprender mais?</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Pratique dar feedback positivo para 3 pessoas durante a semana (amigo, familiar, professor). Observe a reação deles. Também peça feedback sobre algo que você fez — como é receber? Anote a experiência.</p>
  </div>` },

          { id: 1, title: "Projeto 1 — 1º Semestre", page: 0,
            content: `<div class="space-y-4">
<h3>🚀 Projetos do 1º Semestre — Negócios + Educação Financeira</h3>
<p style="color:var(--text-dim);font-style:italic">Escolha UM dos 3 projetos abaixo para desenvolver em grupo. Todos conectam o que vocês aprenderam sobre empreendedorismo e finanças pessoais.</p>

<div style="border-left:3px solid var(--grade-accent);padding-left:1rem;margin:1.5rem 0">
<h3 style="color:var(--grade-accent)">Opção A — "Feira do Centavo Consciente"</h3>
<p><b>Proposta:</b> Criar e operar uma mini-empresa real durante a Feira, vendendo produtos feitos pelo grupo (brigadeiros, pulseiras, marcadores de livro, slime artesanal, etc.) — mas com uma condição: todo o processo financeiro deve ser registrado e apresentado com transparência total.</p>
<p><b>Objetivo:</b> Vivenciar o ciclo completo de um negócio (investimento inicial, custos, precificação, venda, lucro) e demonstrar mindset financeiro aplicado. O grupo deve provar que sabe a diferença entre necessidade e desejo, e que calculou cada centavo.</p>
<p><b>Sugestões de desenvolvimento:</b></p>
<ul>
<li>Cada grupo recebe um "investimento inicial" fictício de R$50 (ou real, se a escola permitir)</li>
<li>Devem pesquisar fornecedores reais, calcular custo unitário, definir preço de venda e projetar lucro</li>
<li>Criar identidade visual do negócio (nome, logo, embalagem) — aplicando o que aprenderam sobre empreendedorismo</li>
<li>Na Feira, além de vender, apresentam um painel com: DRE simplificado, ponto de equilíbrio, e "lições aprendidas"</li>
<li>Bônus: entrevistar 2 comerciantes de Limoeiro sobre como gerenciam suas finanças e trazer os relatos</li>
</ul>
<p><b>Material do stand:</b> Produtos à venda + cartaz com fluxo financeiro + cofrinhos da Aula 4 como decoração</p>
</div>

<div style="border-left:3px solid var(--grade-accent);padding-left:1rem;margin:1.5rem 0">
<h3 style="color:var(--grade-accent)">Opção B — "Detetives Financeiros de Limoeiro"</h3>
<p><b>Proposta:</b> Investigação jornalística sobre a realidade financeira da comunidade de Limoeiro. Os alunos saem a campo, entrevistam pessoas reais e produzem um documentário curto (vídeo de 3-5 min) ou um jornal impresso sobre educação financeira local.</p>
<p><b>Objetivo:</b> Conectar os conceitos de orçamento, consumo consciente, poupança e investimento à realidade da comunidade, desenvolvendo empatia, pensamento crítico e habilidade de comunicação.</p>
<p><b>Sugestões de desenvolvimento:</b></p>
<ul>
<li>Entrevistar pelo menos 5 pessoas de diferentes perfis (estudante, comerciante, aposentado, jovem trabalhador, mãe de família)</li>
<li>Perguntas-chave: "Você tem orçamento?", "Já se endividou?", "Consegue poupar?", "O que faria diferente?"</li>
<li>Cruzar as respostas com os dados nacionais de endividamento (78% dos brasileiros)</li>
<li>Produzir material final: vídeo editado no celular (CapCut/InShot gratuitos) OU jornal impresso com matérias + infográficos</li>
<li>Na Feira, exibir o vídeo em loop ou distribuir o jornal, com painel de "Dicas Financeiras para Limoeiro"</li>
</ul>
<p><b>Material do stand:</b> TV/notebook com vídeo OU jornais impressos + mural de depoimentos + infográficos</p>
</div>

<div style="border-left:3px solid var(--grade-accent);padding-left:1rem;margin:1.5rem 0">
<h3 style="color:var(--grade-accent)">Opção C — "O Jogo que Ensina a Poupar"</h3>
<p><b>Proposta:</b> Criar um jogo de tabuleiro educativo sobre educação financeira, jogável por crianças de 8 a 14 anos. O jogo deve ensinar conceitos como poupar, investir, diferenciar necessidade de desejo, e lidar com imprevistos financeiros.</p>
<p><b>Objetivo:</b> Traduzir conceitos financeiros em mecânicas de jogo divertidas, exercitando criatividade, planejamento e a capacidade de ensinar o que aprenderam — o nível mais alto de aprendizagem segundo a Taxonomia de Bloom.</p>
<p><b>Sugestões de desenvolvimento:</b></p>
<ul>
<li>Pesquisar jogos de referência (Banco Imobiliário, Jogo da Vida) e identificar o que funciona e o que poderia ser melhor</li>
<li>Definir: tema, regras, número de jogadores, mecânica principal (dados? cartas? tabuleiro?)</li>
<li>Incluir "Cartas de Imprevistos" (carro quebrou, ganhou na loteria, aumento na conta de luz) — situações reais!</li>
<li>Prototipar com papelão, papel colorido e materiais recicláveis. O visual importa!</li>
<li>Testar com colegas de outras turmas e iterar com base no feedback</li>
<li>Na Feira, os visitantes JOGAM — a melhor forma de apresentar é deixar as pessoas experimentarem</li>
</ul>
<p><b>Material do stand:</b> Jogo jogável + cartaz com regras + área para jogar com visitantes</p>
</div>
</div>`,

          { id: 2, title: "Projeto 2 — 2º Semestre", page: 0,
            content: `<div class="space-y-4">
<h3>🚀 Projetos do 2º Semestre — Inovação + Pessoas & Comunicação</h3>
<p style="color:var(--text-dim);font-style:italic">Escolha UM dos 3 projetos. Agora o foco é inovação, prototipagem e comunicação — mostrem o que são capazes de criar!</p>

<p><b>Proposta:</b> Identificar um problema REAL da escola (desperdício de água, organização das mochilas, fila da cantina, acessibilidade, barulho no corredor) e criar um protótipo funcional de solução inovadora — usando o processo completo de inovação aprendido no módulo.</p>

<p><b>Sugestões de desenvolvimento:</b></p>
<ul>
<li>Entrevistar pelo menos 10 pessoas afetadas pelo problema (alunos, professores, funcionários)</li>
<li>Usar brainstorming para gerar pelo menos 10 soluções possíveis antes de escolher uma</li>
<li>Construir protótipo com materiais acessíveis (papelão, PVC, garrafas PET, madeira, eletrônicos simples se houver)</li>
<li>Testar o protótipo com pelo menos 5 pessoas e documentar o feedback</li>
<li>Preparar um pitch de 3 minutos explicando: problema, solução, como funciona, próximos passos</li>
<li>Na Feira, demonstrar o protótipo funcionando + painel com todo o processo (fotos, entrevistas, iterações)</li>

            content: `<div class="space-y-4">
              <h3 class="font-bold text-lg">Teoria Aprofundada</h3>
              <p><b>O que é Geração de Valor?</b> Valor é a percepção de benefício que algo traz para alguém. Gerar valor significa criar produtos, serviços ou soluções que resolvem problemas reais e melhoram a vida das pessoas de forma significativa. Um negócio só sobrevive se gera valor suficiente para que os clientes estejam dispostos a pagar por ele.</p>
              
              <p><b>Tipos de Valor:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>Valor Funcional:</b> Resolve um problema prático (ex: guarda-chuva protege da chuva)</li>
                <li><b>Valor Emocional:</b> Gera sentimento positivo (ex: chocolate traz prazer)</li>
                <li><b>Valor Social:</b> Confere status ou pertencimento (ex: marca de tênis famosa)</li>
                <li><b>Valor Econômico:</b> Economiza dinheiro ou tempo (ex: transporte coletivo)</li>
              </ul>
              
              <p><b>Proposta de Valor:</b> É a promessa clara do benefício que seu negócio entrega. Deve responder: "Por que o cliente escolheria você ao invés da concorrência?" Uma boa proposta de valor é específica, relevante e diferenciada.</p>
              
              <h3 class="font-bold text-lg mt-4">Caso Prático Real</h3>
              <p><b>Uber:</b> Antes do Uber, pegar táxi era difícil (tinha que ligar ou ficar na rua esperando), o preço era incerto, e não havia avaliação do motorista. A proposta de valor do Uber: "Transporte confiável, disponível em minutos, com preço transparente e motoristas avaliados". Geraram valor através de conveniência, transparência e confiança.</p>
              
              <p><b>Nubank:</b> Os bancos tradicionais cobravam tarifas altas, tinham atendimento ruim e processos burocráticos. Proposta de valor do Nubank: "Banco digital sem tarifas, com atendimento humanizado e app intuitivo". Geraram valor através de economia, experiência do cliente e simplicidade.</p>
              
              <p><b>Instituto Chapada:</b> Negócio de impacto social de Pernambuco que capacita jovens da periferia em tecnologia e os conecta com empresas. Gera valor social (inclusão), valor econômico (emprego) e valor funcional (qualificação profissional).</p>
            </div>`,

            content: `<div class="space-y-4">
              <h3 class="font-bold text-lg">Teoria Aprofundada</h3>
              <p><b>O que são as CCEs?</b> São 10 características comportamentais identificadas pela ONU e SEBRAE como essenciais para o sucesso empreendedor. Não são habilidades técnicas, mas atitudes e mentalidades que podem ser desenvolvidas através da prática consciente.</p>
              
              <p><b>As 10 CCEs organizadas por conjunto:</b></p>
              
              <p><b>Conjunto de Realização:</b></p>
              <ul class="list-disc ml-6 space-y-1">

                <li><b>4. Persistência:</b> Enfrentar obstáculos repetidamente, não desistir diante de dificuldades</li>
                <li><b>5. Comprometimento:</b> Assumir responsabilidade total pelos resultados, fazer sacrifícios pessoais para completar tarefas</li>

              <ul class="list-disc ml-6 space-y-1">

            content: `<div class="space-y-4">
              <h3 class="font-bold text-lg">Teoria Aprofundada</h3>
              <p><b>O que é uma Oportunidade de Negócio?</b> É uma situação onde existe uma necessidade não atendida, um problema não resolvido ou uma forma melhor de fazer algo. Oportunidades surgem de observação atenta, experiências pessoais, mudanças no mercado, novas tecnologias ou gaps (lacunas) deixados pela concorrência.</p>
              
              <p><b>Fontes de Oportunidades:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>Problemas Pessoais:</b> Você enfrenta uma dificuldade e cria a solução (ex: fundadores do Airbnb não conseguiam pagar aluguel)</li>
                <li><b>Observação do Dia a Dia:</b> Notar ineficiências ou frustrações recorrentes das pessoas</li>
                <li><b>Tendências e Mudanças:</b> Comportamentos emergentes, novas leis, mudanças demográficas (ex: envelhecimento populacional = oportunidades em saúde)</li>
                <li><b>Novas Tecnologias:</b> Aplicar tecnologia existente a novos contextos (ex: GPS + smartphones = Uber)</li>
                <li><b>Gaps de Mercado:</b> Grupos mal atendidos pela concorrência (ex: público plus size na moda)</li>
              </ul>
              
              <p><b>Diferença entre Ideia e Oportunidade:</b> IDEIA é um conceito, um insight, uma possibilidade. OPORTUNIDADE é uma ideia validada que tem mercado disposto a pagar, é viável de executar e tem potencial de lucro. Nem toda ideia é uma oportunidade!</p>
              
              <p><b>Teste da Oportunidade - 5 Perguntas:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li>1. Existe um problema real e relevante?</li>
                <li>2. Há pessoas dispostas a PAGAR pela solução?</li>
                <li>3. Você consegue criar/entregar essa solução?</li>
                <li>4. O mercado é grande o suficiente?</li>
                <li>5. Você tem vantagem competitiva?</li>
              </ul>
              
              <h3 class="font-bold text-lg mt-4">Caso Prático Real</h3>
              <p><b>99 (App de Transporte):</b> Identificaram que mesmo com Uber no Brasil, havia oportunidade: taxistas estavam insatisfeitos com as condições do Uber e passageiros queriam mais opções. Criaram um modelo que incluiu taxistas E motoristas particulares, com tarifas dinâmicas diferenciadas. Oportunidade veio de observar gaps deixados pelo concorrente.</p>
              
              <p><b>Nubank:</b> Cofundador Cristina Junqueira trabalhava em consultoria financeira e observou diariamente a frustração das pessoas com bancos tradicionais. Oportunidade veio da EXPERIÊNCIA PESSOAL repetida + observação de que milhões tinham o mesmo problema + tecnologia (apps móveis) permitia nova solução.</p>
              
              <p><b>Havaianas:</b> Anos 90, sandálias eram vistas como "calçado de pobre". A marca identificou OPORTUNIDADE ao notar que pessoas de todas as classes usavam em casa/praia mas tinham vergonha. Reposicionaram como produto de moda e estilo, não apenas funcional. Oportunidade veio de observar comportamento x percepção.</p>
              
              <p><b>Exemplo Local:</b> Em Limoeiro, um empreendedor poderia identificar oportunidade observando: "Idosos têm dificuldade de comprar pela internet" = serviço de assistência digital. "Estudantes não têm onde estudar em grupo" = coworking estudantil. "Frutas regionais estragam rápido" = produção de polpas congeladas.</p>
            </div>`,
            exercise: `<div class="space-y-3">
              <h3 class="font-bold">Proposta de Trabalho em Sala:</h3>
