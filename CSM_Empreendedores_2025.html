{ id: 1, title: "Cultura de inovação e técnicas de criatividade", page: 44,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>O que é inovação?</b> É a aplicação prática de uma ideia nova que gera valor. Não é apenas inventar algo novo — é implementar uma solução que funciona e que as pessoas querem usar.</p>
    <p><b>Cultura de inovação:</b> É quando a inovação faz parte do DNA de uma organização — onde errar é permitido, ideias são valorizadas e experimentação é incentivada.</p>
    <p><b>Design Thinking aplicado à criatividade:</b> Os alunos devem conceituar o que é inovação, conhecer e aplicar a técnica de design thinking que potencializa a criatividade. Os 3 pilares (empatia, cocriação, experimentação) são a base para gerar soluções inovadoras.</p>
    <p><b>Neste módulo:</b> Criatividade, tecnologias exponenciais, IA, data science, machine learning, IoT, blockchain, realidade aumentada e virtual, metaverso, biotecnologia, nanotecnologia e fabricação digital.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Brainstorming: "Que tecnologias vocês acreditam que vão mudar o mundo nos próximos 10 anos?" Liste no quadro e classifique por área. Depois, cada aluno escolhe uma e pesquisa brevemente.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise uma empresa que é referência em cultura de inovação (Google, Apple, 3M, Pixar). O que ela faz de diferente? Traga 3 práticas que poderiam ser aplicadas na escola.</p></div>` },
{ id: 2, title: "Tecnologias exponenciais", page: 46,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Tecnologias exponenciais</b> são aquelas que dobram de capacidade ou reduzem pela metade de custo a cada período. Enquanto tecnologias lineares crescem como 1, 2, 3, 4... as exponenciais crescem como 1, 2, 4, 8, 16, 32...</p>
    <p><b>Exemplos:</b></p><ul>
      <li><b>Lei de Moore:</b> A capacidade dos processadores dobra a cada 18-24 meses. Um smartphone hoje tem mais poder computacional que o computador que levou o homem à Lua!</li>
      <li><b>Custo de sequenciamento de DNA:</b> De US$100 milhões em 2001 para menos de US$1.000 hoje</li>
      <li><b>Energia solar:</b> O custo caiu 99% nos últimos 40 anos</li>
      <li><b>Armazenamento digital:</b> 1GB custava US$300 mil em 1980; hoje custa centavos</li></ul>
    <p><b>Impacto:</b> Essas tecnologias estão transformando saúde, educação, transporte, energia, agricultura e comunicação em ritmo acelerado.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Linha do tempo: escolha uma tecnologia e mapeie sua evolução desde a criação até hoje. Identifique os momentos de crescimento exponencial. Apresente em formato visual (cartaz ou slides).</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Compare: o que existia e o que NÃO existia quando seus pais tinham sua idade? Faça uma lista de pelo menos 10 tecnologias que surgiram desde então.</p></div>` },
{ id: 3, title: "Inteligência Artificial, Data Science e Machine Learning", page: 48,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Inteligência Artificial (IA)</b> é a capacidade de máquinas simularem comportamentos inteligentes — aprender, raciocinar, perceber e tomar decisões.</p>
    <p><b>Data Science (Ciência de Dados):</b> É a área que extrai conhecimento de grandes volumes de dados. Usa estatística, programação e conhecimento do negócio para encontrar padrões e fazer previsões.</p>
    <p><b>Machine Learning (Aprendizado de Máquina):</b> É uma subárea da IA onde o computador aprende a partir de dados, sem ser explicitamente programado. Exemplos: recomendações da Netflix, filtro de spam do Gmail, reconhecimento facial do celular.</p>
    <p><b>IA no dia a dia:</b> Assistentes virtuais (Alexa, Siri), tradutores automáticos, carros autônomos, diagnósticos médicos, ChatGPT e outras IAs generativas que criam textos, imagens e códigos.</p>
    <p><b>Questão ética:</b> A IA pode ter vieses (preconceitos aprendidos dos dados). Por isso, precisamos de profissionais éticos e conscientes desenvolvendo essas tecnologias.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Liste 10 situações do seu dia a dia onde a IA está presente (mesmo sem você perceber). Depois, debata: em quais dessas situações a IA é benéfica? Em quais pode ser problemática?</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Use o ChatGPT ou Gemini para aprender algo novo (um conceito de matemática, uma curiosidade histórica). Avalie: a resposta foi precisa? Útil? Traga o resultado para comparar com os colegas.</p></div>` },
{ id: 4, title: "Internet das Coisas (IoT)", page: 50,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Internet das Coisas (IoT — Internet of Things)</b> é a conexão de objetos do dia a dia à internet, permitindo que eles coletem e troquem dados automaticamente.</p>
    <p><b>Exemplos de IoT:</b></p><ul>
      <li><b>Casa inteligente:</b> Lâmpadas, fechaduras, câmeras e geladeiras conectadas ao WiFi e controladas pelo celular</li>
      <li><b>Saúde:</b> Relógios que medem batimentos cardíacos, oxigenação e qualidade do sono</li>
      <li><b>Agricultura:</b> Sensores no solo que medem umidade e ativam irrigação automaticamente</li>
      <li><b>Cidades inteligentes:</b> Semáforos que ajustam tempos conforme o trânsito, lixeiras que avisam quando estão cheias</li>
      <li><b>Indústria 4.0:</b> Máquinas que se comunicam entre si para otimizar a produção</li></ul>
    <p><b>Previsão:</b> Até 2030, estima-se que haverá mais de 50 bilhões de dispositivos IoT conectados no mundo!</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Projete uma solução IoT para um problema da escola ou do bairro. Descreva: que sensor usaria? Que dados coletaria? O que faria com esses dados? Como melhoraria a vida das pessoas?</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Identifique 3 dispositivos IoT que existem na sua casa ou vizinhança (pode ser smartTV, assistente virtual, câmera WiFi). Como eles se conectam? Que dados coletam?</p></div>` },
{ id: 5, title: "Blockchain", page: 52,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Blockchain é uma tecnologia de registro distribuído</b> — um "livro-razão digital" que registra transações de forma transparente, segura e descentralizada. Nenhuma pessoa ou empresa controla sozinha.</p>
    <p><b>Como funciona (simplificado):</b> Cada transação é registrada em um "bloco". Esse bloco é verificado por milhares de computadores na rede. Uma vez aprovado, é adicionado à "cadeia" de blocos anteriores — e não pode mais ser alterado. Por isso é tão seguro!</p>
    <p><b>Aplicações além das criptomoedas:</b></p><ul>
      <li><b>Contratos inteligentes:</b> Contratos que se executam automaticamente quando condições são cumpridas</li>
      <li><b>Rastreabilidade:</b> Saber de onde veio cada ingrediente do seu alimento</li>
      <li><b>Votação digital:</b> Eleições seguras e auditáveis</li>
      <li><b>NFTs:</b> Certificados de propriedade digital para arte, música, itens de games</li>
      <li><b>Identidade digital:</b> Documentos à prova de falsificação</li></ul></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Simulação de blockchain em papel: cada grupo é um "nó" da rede. Quando uma transação acontece, todos os grupos devem validar e registrar. Se um grupo tentar fraudar, os outros detectam. Vivenciem a segurança do sistema!</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise um uso real de blockchain que NÃO seja criptomoeda. Descreva: qual o problema resolvido? Como o blockchain ajuda? Traga para apresentar.</p></div>` },
{ id: 6, title: "Realidade Aumentada, Realidade Virtual e Metaverso", page: 54,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Realidade Aumentada (RA):</b> Adiciona elementos digitais ao mundo real, visto pela câmera do celular. Ex: filtros do Instagram, Pokémon Go, apps que mostram como um móvel ficaria na sua sala.</p>
    <p><b>Realidade Virtual (RV):</b> Cria um mundo totalmente digital e imersivo, acessado por óculos especiais (Meta Quest, PlayStation VR). Você "entra" no mundo virtual.</p>
    <p><b>Metaverso:</b> Conceito de um universo virtual persistente onde as pessoas podem trabalhar, estudar, socializar e comprar — como uma versão digital do mundo real. Exemplos: Roblox, Fortnite (eventos virtuais), Horizon Worlds (Meta).</p>
    <p><b>Aplicações educacionais:</b> Visitas virtuais a museus, simulações de laboratório, aulas imersivas de história (visitar o Egito Antigo em VR!), treinamento médico e cirúrgico.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Projete uma experiência educacional usando RA ou RV. Qual disciplina? Que conteúdo? Como funcionaria? Desenhe o storyboard da experiência e apresente.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Teste um app de RA gratuito (Google Arts & Culture, filtros do Instagram, ou Pokémon Go). Descreva a experiência: o que funcionou bem? O que poderia ser melhor?</p></div>` },
{ id: 7, title: "Biotecnologia e Nanotecnologia", page: 56,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Biotecnologia</b> é o uso de organismos vivos ou seus componentes para criar produtos ou processos úteis. Está presente na medicina (vacinas, terapias genéticas), agricultura (plantas modificadas para resistir a pragas), alimentos (fermentação de pão e cerveja) e meio ambiente (biorremediação de áreas poluídas).</p>
    <p><b>Nanotecnologia</b> é a manipulação de materiais na escala nanométrica (1 nanômetro = 1 milionésimo de milímetro). Para comparar: um fio de cabelo tem 80.000 nanômetros de espessura!</p>
    <p><b>Aplicações da nanotecnologia:</b></p><ul>
      <li><b>Medicina:</b> Nanopartículas que levam remédio direto às células doentes (sem afetar as saudáveis)</li>
      <li><b>Materiais:</b> Tecidos que não mancham, vidros autolimpantes, materiais mais leves e resistentes</li>
      <li><b>Eletrônica:</b> Chips cada vez menores e mais potentes</li>
      <li><b>Energia:</b> Painéis solares mais eficientes</li></ul></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Debate futuro: "Se pudéssemos editar o DNA humano livremente, deveríamos?" Divida a turma e debatam os limites éticos da biotecnologia. Há um limite entre curar doenças e criar "bebês designer"?</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise: o que é CRISPR? Como essa tecnologia de edição genética pode mudar a medicina? Traga 2 exemplos de uso promissor e 1 preocupação ética.</p></div>` },
{ id: 8, title: "Fabricação digital", page: 58,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Fabricação digital</b> é o uso de tecnologias computadorizadas para criar objetos físicos a partir de modelos digitais. Revoluciona a forma como produzimos coisas!</p>
    <p><b>Principais tecnologias:</b></p><ul>
      <li><b>Impressão 3D:</b> Cria objetos tridimensionais camada por camada a partir de um modelo digital. Materiais: plástico, resina, metal, concreto e até tecido biológico!</li>
      <li><b>Corte a laser:</b> Corta ou grava materiais (madeira, acrílico, tecido) com precisão milimétrica usando laser</li>
      <li><b>CNC (Controle Numérico Computadorizado):</b> Máquinas que esculpem peças a partir de blocos de material</li>
      <li><b>Fab Labs:</b> Laboratórios de fabricação digital abertos ao público, com impressoras 3D, cortadoras laser e outras ferramentas</li></ul>
    <p><b>Impacto no empreendedorismo:</b> Hoje qualquer pessoa pode prototipar um produto em horas e com baixo custo. Não precisa mais de uma fábrica para criar!</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Projete um objeto que poderia ser feito em impressora 3D para resolver um problema do dia a dia. Desenhe em 3 ângulos (frente, lado, cima), descreva material e dimensões. Apresente como um "produto" para a turma.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise: existe algum Fab Lab ou espaço maker na sua região? Se não, pesquise o mais próximo. O que seria possível criar lá? Traga a pesquisa.</p></div>` },

{ id: 1, title: "Conceitos básicos de UX", page: 62,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>UX (User Experience)</b> significa Experiência do Usuário. É como uma pessoa se sente ao usar um produto, serviço, sistema ou aplicativo. UX é um importante mediador entre o empreendedor e o usuário.</p>
    <p><b>Pilares do UX:</b></p><ul>
      <li><b>Utilidade:</b> O produto resolve um problema real?</li>
      <li><b>Usabilidade:</b> É fácil de usar? Intuitivo?</li>
      <li><b>Desejabilidade:</b> As pessoas QUEREM usar? É atraente?</li>
      <li><b>Acessibilidade:</b> Todos conseguem usar, incluindo pessoas com deficiência?</li>
      <li><b>Credibilidade:</b> O usuário confia no produto?</li></ul>
    <p><b>Peter Morville (Favo de Mel do UX):</b> Modelo que organiza as qualidades de uma boa experiência: útil, usável, desejável, localizável, acessível, credível e valioso.</p>
    <p><b>Stakeholders:</b> Todas as partes interessadas no projeto — usuários, clientes, investidores, equipe de desenvolvimento, parceiros.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Escolha um app que você usa todo dia (Instagram, WhatsApp, TikTok). Avalie nos 5 pilares de UX (nota 0-10 para cada). Compare com os colegas: vocês concordam nas avaliações?</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Encontre um app ou site com UX RUIM (confuso, difícil de usar, feio). Anote 3 problemas e proponha 3 melhorias. Traga screenshots se possível.</p></div>` },
{ id: 2, title: "UX na prática", page: 64,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>UX na prática envolve um processo estruturado</b> para entender o usuário e criar soluções que realmente funcionem.</p>
    <p><b>O processo de UX:</b></p><ul>
      <li><b>1. Pesquisa:</b> Entender quem é o usuário, suas necessidades, dores e comportamentos (entrevistas, observação, questionários)</li>
      <li><b>2. Persona:</b> Criar um perfil fictício que representa o usuário típico (nome, idade, profissão, objetivos, frustrações)</li>
      <li><b>3. Jornada do Usuário:</b> Mapear todos os passos que o usuário percorre ao usar o produto (desde descobrir até recomendar)</li>
      <li><b>4. Wireframe:</b> Esboço simplificado das telas (sem cores ou imagens, só estrutura)</li>
      <li><b>5. Protótipo:</b> Versão funcional para testes</li>
      <li><b>6. Teste de usabilidade:</b> Observar pessoas reais usando e identificar problemas</li></ul>
    <p><b>Benchmarking:</b> Analisar como os concorrentes resolvem o mesmo problema para identificar boas práticas e oportunidades de diferenciação.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Crie uma persona para o projeto da sua startup: dê nome, idade, profissão, 3 objetivos e 3 frustrações. Depois, mapeie a jornada dessa persona ao usar sua solução (do momento que descobre até virar fã).</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Faça benchmarking: pesquise 3 apps/sites que resolvem um problema parecido com o da sua startup. Para cada um, liste: o que faz bem? O que faz mal? O que você faria diferente?</p></div>` },
{ id: 3, title: "UX e UI", page: 66,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>UX e UI são complementares mas diferentes:</b></p><ul>
      <li><b>UX (User Experience):</b> Como o usuário se SENTE ao usar o produto. Foca na experiência, na jornada, na funcionalidade. É invisível quando bem feito</li>
      <li><b>UI (User Interface):</b> Como o produto PARECE. Foca no visual — cores, tipografia, ícones, botões, layout. É a "pele" do produto</li></ul>
    <p><b>Analogia do restaurante:</b> UX é a experiência completa (atendimento, tempo de espera, sabor da comida, ambiente). UI é a decoração, o cardápio bonito, a apresentação do prato.</p>
    <p><b>Princípios de UI:</b></p><ul>
      <li><b>Consistência:</b> Elementos iguais devem funcionar de forma igual em todo o app</li>
      <li><b>Hierarquia visual:</b> O mais importante deve chamar mais atenção (tamanho, cor, posição)</li>
      <li><b>Feedback:</b> O sistema deve responder a cada ação do usuário (botão muda de cor ao clicar)</li>
      <li><b>Simplicidade:</b> Menos é mais — remova o desnecessário</li></ul></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Redesenhe a interface de um app com UX bom mas UI ruim (ou vice-versa). Primeiro, faça o wireframe (UX — estrutura e navegação). Depois, aplique o visual (UI — cores, fontes, ícones).</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Compare 2 apps concorrentes (ex: Uber vs 99, iFood vs Rappi). Qual tem melhor UX? Qual tem melhor UI? São o mesmo? Justifique com exemplos concretos.</p></div>` },
{ id: 4, title: "O profissional de UX e suas habilidades", page: 68,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>UX Designer é uma das profissões mais demandadas do mercado digital.</b> Esse profissional é responsável por garantir que produtos digitais sejam fáceis, agradáveis e eficientes de usar.</p>
    <p><b>Habilidades essenciais:</b></p><ul>
      <li><b>Empatia:</b> Capacidade de entender o usuário profundamente</li>
      <li><b>Pensamento analítico:</b> Interpretar dados de pesquisa e testes para tomar decisões</li>
      <li><b>Comunicação:</b> Apresentar ideias para equipe, stakeholders e clientes</li>
      <li><b>Prototipagem:</b> Criar wireframes e protótipos em ferramentas como Figma, Adobe XD</li>
      <li><b>Colaboração:</b> Trabalhar com desenvolvedores, designers visuais, PMs</li>
      <li><b>Curiosidade:</b> Estar sempre aprendendo sobre comportamento humano e novas tecnologias</li></ul>
    <p><b>Cargos relacionados:</b> UX Researcher, UX Writer, UI Designer, Product Designer, Service Designer.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Autoavaliação: pontue de 0-10 suas habilidades em cada competência de UX. Identifique seus pontos fortes e fracos. Crie um plano de desenvolvimento pessoal para melhorar os pontos fracos.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise vagas de UX Designer em sites de emprego (LinkedIn, Glassdoor). Quais habilidades são mais pedidas? Qual a faixa salarial? Traga os dados.</p></div>` },
{ id: 5, title: "Pesquisas em projetos de UX e ferramentas I", page: 70,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Pesquisa de UX é a base de todo bom design.</b> Sem pesquisa, você está adivinhando o que o usuário quer — e adivinhar custa caro.</p>
    <p><b>Tipos de pesquisa:</b></p><ul>
      <li><b>Qualitativa:</b> Entrevistas, observação, grupos focais — entende o PORQUÊ do comportamento</li>
      <li><b>Quantitativa:</b> Questionários, analytics, métricas — mede QUANTO e COM QUE FREQUÊNCIA</li>
      <li><b>Exploratória:</b> No início do projeto, para descobrir problemas e oportunidades</li>
      <li><b>Avaliativa:</b> Para testar protótipos e versões do produto</li></ul>
    <p><b>Ferramentas de pesquisa:</b> Google Forms (questionários), Hotjar (mapas de calor — onde o usuário clica), Google Analytics (dados de uso do site), Maze (testes de usabilidade remotos).</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Crie um questionário de pesquisa (Google Forms) com 8-10 perguntas para validar a ideia da sua startup. Aplique com pelo menos 10 colegas. Compile os resultados e identifique padrões.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Aplique o questionário com mais 10 pessoas fora da escola (familiares, vizinhos). Compare os resultados: as respostas de dentro e fora da escola são iguais ou diferentes?</p></div>` },
{ id: 6, title: "Pesquisas em projetos de UX e ferramentas II", page: 72,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Teste de usabilidade é a pesquisa mais poderosa de UX.</b> Você observa pessoas reais usando seu protótipo e identifica problemas que nunca teria percebido sozinho.</p>
    <p><b>Como fazer um teste de usabilidade:</b></p><ul>
      <li><b>1. Defina tarefas:</b> "Encontre o botão de compra" ou "Faça um cadastro"</li>
      <li><b>2. Recrute testadores:</b> 5 pessoas são suficientes para encontrar 80% dos problemas</li>
      <li><b>3. Observe sem ajudar:</b> Deixe a pessoa usar sozinha. NÃO explique, NÃO ajude</li>
      <li><b>4. Anote tudo:</b> Onde a pessoa hesitou? Clicou errado? Fez expressão de confusão?</li>
      <li><b>5. Entreviste após o teste:</b> "O que achou? O que confundiu? O que melhoraria?"</li>
      <li><b>6. Itere:</b> Corrija os problemas e teste novamente</li></ul>
    <p><b>Ferramentas de prototipagem:</b> Figma (gratuito, colaborativo), Canva (mockups rápidos), Marvel App (protótipos clicáveis a partir de fotos).</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Teste cruzado: troque protótipos com outro grupo. Realize o teste de usabilidade completo (6 passos). Depois, entregue ao grupo original um "relatório de usabilidade" com os 3 maiores problemas encontrados e sugestões de melhoria.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Teste o protótipo com alguém da família (que NÃO sabe do que se trata o projeto). Observe e anote os problemas. Traga o relatório.</p></div>` },
{ id: 7, title: "Customer Success I — NPS, LTV e Churn", page: 74,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Customer Success (CS)</b> é a estratégia de garantir que o cliente alcance o resultado desejado ao usar seu produto. Não é só "atender bem" — é garantir que o cliente tenha SUCESSO.</p>
    <p><b>Métricas essenciais de CS:</b></p><ul>
      <li><b>NPS (Net Promoter Score):</b> "De 0 a 10, quanto você recomendaria?" Detratores (0-6), Neutros (7-8), Promotores (9-10). NPS = %Promotores - %Detratores. Acima de 50 é excelente!</li>
      <li><b>LTV (Lifetime Value):</b> Quanto um cliente gera de receita durante todo o relacionamento. Ex: assinatura de R$30/mês × 24 meses = LTV R$720</li>
      <li><b>Churn (Taxa de Cancelamento):</b> % de clientes que param de usar/pagar por mês. Se 5 de 100 cancelam = 5% churn. Abaixo de 5% é saudável</li>
      <li><b>CAC (Custo de Aquisição de Cliente):</b> Quanto gasta para conquistar cada novo cliente</li></ul>
    <p><b>Regra de ouro:</b> LTV deve ser pelo menos 3x o CAC para o negócio ser sustentável.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Aplique um mini-NPS na turma sobre a experiência da aula. Calcule o NPS da turma. Depois, simule cenários de LTV e Churn para a startup fictícia e avalie se o modelo é sustentável.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Escolha um serviço por assinatura que você ou sua família usam (Netflix, Spotify, Amazon Prime). Calcule o LTV baseado em quanto tempo são assinantes e quanto pagam por mês.</p></div>` },
{ id: 8, title: "Customer Success II — Ativação, Pós-venda e Retenção", page: 76,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>O funil de CS vai além da venda:</b></p><ul>
      <li><b>Ativação:</b> O momento em que o novo cliente tem sua primeira experiência de valor. Ex: no Spotify, é quando descobre uma playlist perfeita. No Uber, é quando faz a primeira corrida sem problemas</li>

              <p><b>Papéis em uma Startup - O Trio Essencial:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>Hacker (O Construtor):</b> Responsável pela parte técnica/tecnológica. Transforma ideias em produtos funcionais. Domina programação, desenvolvimento de software, hardware, ou processos técnicos. Perfil: analítico, solucionador de problemas, focado em como fazer funcionar.</li>
                <li><b>Hipster (O Designer):</b> Responsável pela experiência do usuário (UX/UI), branding, design visual, comunicação. Garante que o produto seja bonito, intuitivo e desejável. Perfil: criativo, empático, focado em como o cliente se sente ao usar.</li>
                <li><b>Hustler (O Vendedor):</b> Responsável por vendas, marketing, relacionamento com clientes, captação de recursos e networking. É quem "coloca a startup no mapa". Perfil: comunicativo, persistente, focado em resultados e crescimento.</li>

              <p><b>Principais Modelos Econômicos:</b></p>

                <li><b>Exemplos:</b> Magazine Luiza, Amazon, Mercado Livre (quando vende produtos próprios)</li>
                <li><b>Vantagens:</b> Escalável geograficamente, margens controladas, relacionamento direto com cliente</li>
                <li><b>Desafios:</b> Logística, estoque, custos de aquisição de clientes</li>

              <p><b>2. Marketplace (Plataforma de Intermediação):</b> Conecta vendedores e compradores.</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li><b>Como funciona:</b> Você cria a plataforma, terceiros vendem, você cobra comissão</li>
                <li><b>Receita:</b> Porcentagem sobre cada transação (10-30% geralmente)</li>
                <li><b>Exemplos:</b> iFood, Airbnb, Uber, Mercado Livre, Enjoei</li>
                <li><b>Vantagens:</b> Escalabilidade máxima (não precisa estoque), efeito de rede (quanto mais usuários, mais valioso)</li>
                <li><b>Desafios:</b> Difícil atingir massa crítica inicial (chicken-and-egg problem), qualidade depende de terceiros</li>
              </ul>
              
              <p><b>3. SaaS (Software as a Service - Software como Serviço):</b> Assinatura de software.</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li><b>Como funciona:</b> Cliente paga mensalidade/anuidade para usar o software</li>
                <li><b>Receita:</b> Receita recorrente mensal (MRR) ou anual (ARR)</li>
                <li><b>Exemplos:</b> Netflix, Spotify, Adobe Creative Cloud, Canva Pro, Notion</li>
                <li><b>Vantagens:</b> Receita previsível, alto valor vitalício do cliente (LTV), atualizações contínuas</li>
                <li><b>Desafios:</b> Alta taxa de cancelamento (churn), necessidade de agregar valor constantemente</li>

              <p><b>4. Freemium (Grátis + Premium):</b> Versão gratuita básica + versão paga avançada.</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li><b>Como funciona:</b> Maioria usa de graça, minoria paga por recursos extras</li>
                <li><b>Receita:</b> Assinatura premium de 2-5% dos usuários gratuitos</li>
                <li><b>Exemplos:</b> Spotify, LinkedIn, Canva, Dropbox, Zoom</li>
                <li><b>Vantagens:</b> Crescimento rápido de base de usuários, baixo custo de aquisição, teste antes de comprar</li>
                <li><b>Desafios:</b> Maioria nunca paga, difícil balancear gratuito vs. pago sem frustrar usuários</li>
              </ul>
              
              <p><b>5. Publicidade/Advertising:</b> Receita vem de anunciantes, não dos usuários.</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">

                <li><b>Receita:</b> CPM (custo por mil impressões), CPC (custo por clique), ou vendas de dados agregados</li>

                <li><b>Vantagens:</b> Gratuito atrai massas, escalabilidade extrema</li>
                <li><b>Desafios:</b> Precisa MUITO volume para viabilizar, dependência de anunciantes, questões de privacidade</li>
              </ul>
              
              <p><b>6. Economia Compartilhada/Sharing Economy:</b> Otimização de ativos subutilizados.</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">

                <li><b>Receita:</b> Taxa sobre cada transação ou aluguel</li>

                <li><b>Vantagens:</b> Aproveita ativos existentes, baixo investimento inicial em estoque</li>
                <li><b>Desafios:</b> Regulação legal, qualidade inconsistente, dependência de fornecedores independentes</li>

              <p><b>7. Economia Circular/Sustentável:</b> Reutilização, reciclagem, regeneração.</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li><b>Como funciona:</b> Produtos projetados para durar, serem consertados, revendidos ou reciclados</li>
                <li><b>Receita:</b> Venda inicial + serviços de manutenção + revenda de usados + reciclagem</li>
                <li><b>Exemplos:</b> Patagonia (conserta roupas usadas), OLX/Enjoei (revenda), TerraCycle (reciclagem)</li>
                <li><b>Vantagens:</b> Sustentável, engajamento de consumidores conscientes, resiliência de longo prazo</li>

              </ul>
              
              <h3 class="font-bold text-lg mt-4">Caso Prático Real</h3>
              <p><b>Natura - Híbrido de Modelos:</b> Combina E-commerce (venda direta online), Economia Compartilhada (consultoras independentes vendem porta a porta), e Economia Circular (programa de reciclagem de embalagens, refil). Isso diversifica fontes de receita e reduz riscos.</p>
              
              <p><b>Rappi - Marketplace Multivertical:</b> Começou como delivery de comida, expandiu para mercado, farmácia, cash, motoboy on-demand. Mesmo modelo econômico (comissão sobre transações), mas múltiplas verticais aumentam frequência de uso e valor por cliente.</p>
              
              <p><b>Spotify - Freemium + Publicidade:</b> Duplo modelo: usuários gratuitos geram receita via anúncios, usuários premium pagam assinatura sem anúncios. Isso permitiu crescimento massivo (400+ milhões de usuários) enquanto converte aos poucos para premium (180+ milhões pagantes).</p>

              <h3 class="font-bold text-lg">Teoria Aprofundada (Revisão e Aprofundamento)</h3>

              <p><b>Aprofundando o POR QUÊ:</b></p>

                <li><b>Não é lucro:</b> Lucro é resultado, não propósito. "Ganhar dinheiro" não inspira ninguém.</li>

                <li><b>É a mudança que você quer ver:</b> Que mundo você sonha criar? Por que isso importa profundamente para vocês?</li>

              <p><b>Coerência entre POR QUÊ → COMO → O QUÊ:</b> Cada camada deve ser consistente. Exemplo RUIM: POR QUÊ: "Salvar o meio ambiente" + COMO: "Produtos descartáveis de uso único" + O QUÊ: "Copos plásticos" = INCOERENTE! Exemplo BOM: POR QUÊ: "Democratizar educação de qualidade" + COMO: "Plataforma online acessível com mentoria personalizada" + O QUÊ: "App de cursos com IA que adapta conteúdo" = COERENTE!</p>

            content: `<div class="space-y-4">
              <h3 class="font-bold text-lg">Teoria Aprofundada (Consolidação Final)</h3>
              <p><b>Business Model Canvas - Aplicação Completa:</b> Vocês já viram o Canvas no 7º ano (introdução) e no 8º ano (aplicado a startups). Agora, no 9º ano, vamos CONSOLIDAR um Canvas impecável e completo da startup de vocês, garantindo que todos os 9 blocos estejam profundamente pensados, interconectados e validados.</p>
              
              <p><b>Aprofundamento Bloco a Bloco:</b></p>
              
              <p><b>1. Segmentos de Clientes - Hiperfoco:</b> Não tente atender "todo mundo". Definam um SEGMENTO PRIMÁRIO específico (early adopters) para começar. Depois, segmentos secundários. Criem personas DETALHADAS: nome, idade, profissão, renda, dores, sonhos, hábitos digitais, objeções. Quanto mais específico, melhor o produto.</p>
              
              <p><b>2. Proposta de Valor - Teste da Clareza:</b> Explique em 1 frase: Para [SEGMENTO], que tem [PROBLEMA], nossa [SOLUÇÃO] oferece [BENEFÍCIO PRINCIPAL] diferente de [ALTERNATIVAS] porque [DIFERENCIAL ÚNICO]. Exemplo Uber: "Para pessoas que precisam de transporte urbano rápido (segmento) e não querem esperar táxi na rua (problema), o Uber (solução) conecta motoristas em 3 minutos (benefício) diferente de táxis tradicionais (alternativa) porque usa GPS e avaliações de confiança (diferencial)."</p>
              
              <p><b>3. Canais - Jornada Completa:</b> Mapeiem os 5 estágios: 1) CONSCIÊNCIA: Como o cliente descobre vocês? (redes sociais, boca a boca, anúncios), 2) AVALIAÇÃO: Como ele pesquisa/compara? (site, reviews, teste grátis), 3) COMPRA: Onde/como ele adquire? (app, site, loja física), 4) ENTREGA: Como recebe o produto/serviço? (delivery, acesso digital, presencial), 5) PÓS-VENDA: Como mantém relacionamento? (suporte, atualizações, comunidade)</p>
              
              <p><b>4. Relacionamento com Clientes - Estratégia de Retenção:</b> Conquistar cliente custa caro (CAC). Mantê-lo é mais barato e lucrativo. Estratégias: automação inteligente (chatbots com toque humano), comunidade engajada (grupo exclusivo), programa de fidelidade/gamificação, conteúdo educativo constante, suporte excepcional que surpreende.</p>
              
              <p><b>5. Fontes de Receita - Diversificação:</b> Não dependam de UMA fonte só. Exemplos de combinação: Receita Primária (vendas/assinaturas) + Receita Secundária (consultoria/cursos) + Receita Terciária (afiliados/parcerias). Definam: preço, frequência de pagamento, método de precificação (valor percebido vs. custo vs. concorrência).</p>

              <p><b>7. Atividades-Chave - Os 20% que Geram 80% do Valor:</b> Lei de Pareto aplicada. Das 100 coisas que poderiam fazer, quais 3-5 atividades são INEGOCIÁVEIS para entregar a proposta de valor? Exemplo Spotify: 1) Licenciamento de músicas, 2) Algoritmo de recomendação, 3) Experiência de usuário fluida. Foquem nisso, terceirizem/automatizem o resto.</p>
              
              <p><b>8. Parcerias Principais - Escolha Estratégica:</b> Parcerias certas aceleram, parcerias erradas drenam energia. Busquem parcerias que: fornecem recursos que vocês não têm, dão credibilidade (parceiro conhecido valida vocês), reduzem custos (economia de escala), abrem portas (rede de contatos). Evitem: parcerias que tiram controle excessivo ou não alinham com valores.</p>
              
              <p><b>9. Estrutura de Custos - Enxugue Implacavelmente:</b> Startups morrem por falta de caixa, não por falta de ideias. Separem: CUSTOS FIXOS (aluguel, salários, softwares - paguem mensalmente independente de vender) vs. CUSTOS VARIÁVEIS (produção, comissões, marketing - aumentam com vendas). No início, minimizem fixos, variabilizem tudo que puder. Calculem o BURN RATE (quanto gastam por mês) e RUNWAY (quantos meses sobrevivem).</p>
              
              <h3 class="font-bold text-lg mt-4">Caso Prático Real</h3>

            content: `<div class="space-y-4">
              <h3 class="font-bold text-lg">Teoria Aprofundada</h3>
              <p><b>Finanças para Startups - Pensamento Estratégico:</b> A maioria das startups não morre por falta de produto ou mercado. Morrem por falta de CAIXA (cash). Entender finanças básicas não é "coisa de contador" - é sobrevivência. Como empreendedores, vocês precisam dominar os números que ditam vida ou morte do negócio.</p>
              
              <p><b>Conceitos Financeiros Essenciais:</b></p>
              
              <p><b>1. Estrutura de Custos (Anatomy of Costs):</b></p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li><b>Custos Fixos:</b> Acontecem independente de vender ou não (aluguel, salários, softwares em assinatura, internet). No início, MINIMIZE ao máximo! Trabalhem de casa, usem ferramentas gratuitas, comecem sem contratar.</li>
                <li><b>Custos Variáveis:</b> Aumentam conforme você vende (matéria-prima, comissões, embalagens, frete, taxas de transação). Idealmente a margem deve cobrir fixos + variáveis + sobrar lucro.</li>
                <li><b>Custo de Aquisição de Cliente (CAC):</b> Quanto você gasta em marketing/vendas para conquistar UM cliente? Exemplo: R$ 1.000 em anúncios geraram 50 clientes = CAC de R$ 20/cliente. Se o cliente paga R$ 30 uma vez, você lucra R$ 10. Se ele paga R$ 10 uma vez, você PERDE dinheiro!</li>
              </ul>
              
              <p><b>2. Estrutura de Receitas (Money In):</b></p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li><b>Receita Bruta:</b> Todo dinheiro que entra antes de deduzir custos</li>
                <li><b>Receita Líquida:</b> Após deduzir devoluções, impostos, comissões de plataforma</li>
                <li><b>Margem de Contribuição:</b> Receita - Custos Variáveis = quanto sobra para pagar custos fixos e gerar lucro</li>
                <li><b>LTV (Lifetime Value):</b> Quanto um cliente gera de receita durante TODO o relacionamento com você. Exemplo Netflix: assinatura R$ 40/mês x 24 meses médios = LTV R$ 960</li>
              </ul>
              
              <p><b>3. Indicadores Críticos de Saúde Financeira:</b></p>
              
              <p><b>Ponto de Equilíbrio (Break-even):</b> Quantas vendas você precisa fazer para EMPATAR (não lucrar, não perder)? Fórmula: Custos Fixos ÷ Margem de Contribuição Unitária = Quantidade no Break-even. Exemplo: Custos fixos R$ 3.000/mês. Produto custa R$ 50, vendo a R$ 100 (margem R$ 50). Break-even = 3.000 ÷ 50 = 60 unidades. Preciso vender 60/mês para não perder dinheiro. A partir da 61ª, lucro!</p>
              
              <p><b>Burn Rate (Taxa de Queima):</b> Quanto você GASTA por mês a mais do que ganha. Startup pré-receita com R$ 5.000 de custos mensais = Burn Rate R$ 5.000. Assustador, mas normal no início. O importante é ter runway...</p>
              
              <p><b>Runway (Pista de Pouso):</b> Quantos meses você sobrevive até o dinheiro acabar? Fórmula: Dinheiro em Caixa ÷ Burn Rate = Runway em meses. Exemplo: Tem R$ 20.000 em caixa, gasta R$ 4.000/mês = Runway de 5 meses. Quando runway < 3 meses = ALERTA VERMELHO! Precisa captar investimento ou cortar custos URGENTE.</p>
              
              <p><b>Regra de Ouro: LTV > 3x CAC:</b> O valor vitalício do cliente deve ser PELO MENOS 3 vezes o custo de aquisição. Se CAC = R$ 100, LTV precisa ser > R$ 300 para o negócio ser saudável. Se LTV < CAC, você PERDE dinheiro em cada cliente que ganha!</p>
              
              <p><b>4. Projeção Financeira (Financial Forecast):</b> Não adivinhem, CALCULEM! Projeção de 12 meses deve ter:</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li><b>Premissas:</b> Quantos clientes/mês (realista, não otimista!), ticket médio, taxa de conversão, % de churn (cancelamento)</li>

                <li><b>Resultado:</b> Lucro/Prejuízo mensal, Acumulado, Em que mês atingem break-even?</li>
                <li><b>Necessidade de Capital:</b> Quanto precisam investir ANTES de começar a lucrar?</li>

              <h3 class="font-bold text-lg mt-4">Caso Prático Real</h3>

                <li><b>Preço de Venda:</b> R$ 25/marmita</li>
                <li><b>Margem de Contribuição:</b> R$ 25 - R$ 15 = R$ 10/marmita</li>
                <li><b>Break-even:</b> R$ 2.000 ÷ R$ 10 = 200 marmitas/mês (≈ 10 marmitas/dia útil)</li>
                <li><b>CAC:</b> R$ 1.000 marketing/mês ÷ 40 novos clientes = R$ 25/cliente</li>

                <li><b>LTV/CAC Ratio:</b> R$ 1.200 ÷ R$ 25 = 48x (EXCELENTE! Muito acima do mínimo 3x)</li>
                <li><b>Projeção:</b> Mês 1: 50 marmitas (prejuízo R$ 1.500), Mês 3: 150 (prejuízo R$ 500), Mês 5: 250 (lucro R$ 500!)</li>

              <p>2. Entrevista Financeira: Converse com um pequeno empreendedor local (pode ser dono de lanchonete, loja, prestador de serviço) e pergunte: 1) Quanto você investe inicialmente para abrir o negócio? 2) Em quanto tempo teve lucro? 3) Qual seu custo fixo mensal? 4) Qual sua margem de lucro? 5) Que erro financeiro você cometeu e o que aprendeu? Anote os aprendizados e compare com a realidade da startup de vocês.</p>
              
              <p>3. Pesquisa de Preços da Concorrência: Identifiquem 5 concorrentes diretos ou similares. Anotem: Quanto cobram? Que modelo de preço usam (único, assinatura, freemium)? Há promoções/descontos? O preço de vocês está competitivo? Precisam ajustar? Criem uma tabela comparativa de precificação.</p>
              
              <p>4. Simulação de Cenários: Refaçam a projeção com 3 cenários: 1) PESSIMISTA (vendas 50% menores que esperado), 2) REALISTA (o que vocês acreditam de verdade), 3) OTIMISTA (tudo dando muito certo, vendas 50% maiores). Para cada cenário, calculem: Em quanto tempo têm lucro? Quanto de capital precisam? Isso ajuda a entender riscos e preparar planos B!</p>
            </div>`

            content: `<div class="space-y-4">
              <h3 class="font-bold text-lg">Teoria Aprofundada (Revisão + Execução)</h3>
              <p><b>MVP - Minimum Viable Product (Revisão Estratégica):</b> Vocês estudaram MVP no 8º ano teoricamente. Agora, no 9º ano, vão CONSTRUIR o MVP real da startup! Não é mais conceito - é FAZER. O MVP é sua primeira versão testável que valida se a solução resolve o problema real dos clientes.</p>
              
              <p><b>Mindset Correto para MVP:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>MÍNIMO não é "mal feito":</b> É focar no ESSENCIAL e fazer bem feito. Qualidade alta, escopo reduzido.</li>
                <li><b>VIÁVEL não é "incompleto":</b> Tem que funcionar suficientemente bem para entregar valor e gerar aprendizado real.</li>
                <li><b>PRODUTO não é "apresentação":</b> Algo que o cliente pode USAR, não apenas VER em slides.</li>
              </ul>
              
              <p><b>Tipos de MVP (escolham o melhor para sua startup):</b></p>
              
              <p><b>1. Landing Page + Email List:</b> Para validar demanda ANTES de construir.</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li><b>O que é:</b> Página web explicando o produto e pedindo email de interessados</li>
                <li><b>Como fazer:</b> Canva/Carrd/Google Sites gratuitos</li>
                <li><b>Valida:</b> Pessoas realmente querem isso? Quantas se inscrevem?</li>
                <li><b>Custo/Tempo:</b> Baixíssimo (1-2 dias, R$ 0-50)</li>
                <li><b>Bom para:</b> Apps, SaaS, produtos digitais</li>
              </ul>
              
              <p><b>2. Protótipo Clicável (Mockup Interativo):</b> Simulação navegável sem código real.</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li><b>O que é:</b> Telas do app/site linkadas simulando navegação</li>
                <li><b>Como fazer:</b> Figma/Marvel/Adobe XD/Canva com links</li>
                <li><b>Valida:</b> Usuário entende a interface? Consegue usar?</li>
                <li><b>Custo/Tempo:</b> Baixo (3-7 dias, grátis)</li>
                <li><b>Bom para:</b> Apps mobile, plataformas web, SaaS</li>
              </ul>
              
              <p><b>3. Wizard of Oz MVP:</b> Parece automático, mas é manual nos bastidores.</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li><b>O que é:</b> Cliente interage com "sistema", mas você faz manualmente</li>
                <li><b>Exemplo:</b> "App" de delivery é na verdade um número de WhatsApp onde vocês recebem pedidos e organizam entregas manualmente</li>
                <li><b>Valida:</b> Processo funciona? Há demanda? Que pontos de dor surgem?</li>
                <li><b>Custo/Tempo:</b> Muito baixo (imediato, sem programação)</li>
                <li><b>Bom para:</b> Serviços, marketplaces, concierge</li>
              </ul>
              
              <p><b>4. Produto Físico Mínimo:</b> Versão básica funcional do produto tangível.</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li><b>O que é:</b> Protótipo funcional feito com materiais acessíveis</li>
                <li><b>Exemplo:</b> Produto de papelaria sustentável - fazer 50 unidades artesanalmente antes de fabricar em escala</li>
                <li><b>Valida:</b> Design funciona? Pessoas usam? Feedback de melhoria?</li>
                <li><b>Custo/Tempo:</b> Médio (depende do produto)</li>
                <li><b>Bom para:</b> Hardware, produtos físicos, vestuário</li>
              </ul>
              
              <p><b>5. MVP de Serviço (Concierge):</b> Faça manualmente para os primeiros clientes.</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li><b>O que é:</b> Prestar o serviço artesanalmente, um cliente por vez</li>
                <li><b>Exemplo:</b> "Plataforma" de personal trainer online é na verdade vocês mesmos montando treino personalizado no Google Docs</li>
                <li><b>Valida:</b> Serviço resolve o problema? Quanto cliente paga? É escalável depois?</li>
                <li><b>Custo/Tempo:</b> Baixo, mas trabalhoso</li>
                <li><b>Bom para:</b> Consultorias, educação, serviços personalizados</li>
              </ul>
              
              <p><b>Roadmap de Criação do MVP (2 aulas):</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>AULA 7 (HOJE):</b> Planejamento - Definir tipo de MVP, escopo mínimo, ferramentas, divisão de tarefas</li>
                <li><b>AULA 8 (PRÓXIMA):</b> Execução - Construir o MVP, testar internamente, ajustar, preparar para validação externa</li>
              </ul>
              
              <h3 class="font-bold text-lg mt-4">Caso Prático Real</h3>
              <p><b>Buffer (agendador de posts) - MVP Landing Page:</b> Fundador Joel Gascoigne queria criar ferramenta para agendar posts no Twitter. ANTES de programar qualquer coisa, criou landing page de 2 páginas: 1) Explicando a ideia, 2) Pedindo email. Postou em fóruns tech. Em 3 dias, 100+ pessoas se inscreveram. SÓ ENTÃO começou a programar. Resultado: validou demanda ANTES de gastar meses programando algo que ninguém queria!</p>
              
              <p><b>Zappos (e-commerce de sapatos) - MVP Concierge:</b> Antes de ter estoque, fundador Nick Swinmurn fotografava sapatos em lojas físicas, postava no site. Quando alguém comprava, ele ia na loja, comprava o sapato e enviava. Totalmente não escalável, MAS validou: "Pessoas compram sapatos online sem experimentar?" Resposta: SIM! Aí sim investiu em estoque e logística. Hoje: vendida para Amazon por US$ 1,2 bilhão!</p>
            </div>`,
            exercise: `<div class="space-y-3">
              <h3 class="font-bold">Proposta de Trabalho em Sala:</h3>
              <p><b>Atividade 1: Definindo o Tipo de MVP</b><br/>
              Em grupo, analisem a startup de vocês e decidam: Qual tipo de MVP faz mais sentido? (Landing Page, Protótipo Clicável, Wizard of Oz, Produto Físico, Concierge). Justifiquem: Por que esse tipo? O que ele vai validar especificamente? Quanto tempo/recurso precisarão? É viável fazer até a próxima aula?</p>
              
              <p><b>Atividade 2: Definindo Escopo Mínimo (Prioritização Brutal)</b><br/>
              Listem TODAS as funcionalidades/características que o produto PODERIA ter. Agora, para cada uma, classifiquem usando MoSCoW: <b>M</b>ust have (essencial), <b>S</b>hould have (importante mas não crítico), <b>C</b>ould have (legal ter), <b>W</b>on't have (deixar para depois). Para o MVP, APENAS os "Must have" entram! Sejam brutais: se dá para lançar sem, CORTEM!</p>
              
              <p><b>Atividade 3: Mapeamento de Ferramentas e Recursos</b><br/>
              Que ferramentas precisarão? (Canva, Figma, materiais físicos, plataformas). Listem e verifiquem: Temos acesso? É gratuito? Se pago, quanto custa? Alguém da equipe sabe usar? Se não, quanto tempo para aprender básico? Criem inventário completo de recursos necessários.</p>
              
              <p><b>Atividade 4: Divisão de Tarefas e Cronograma</b><br/>
              Dividam a construção do MVP em tarefas específicas (ex: desenhar tela de login, criar logo, escrever textos, linkar páginas, testar navegação). Atribuam responsável e prazo para cada tarefa. Usem metodologia ágil: criem um quadro Kanban (TO DO, DOING, DONE) físico ou digital (Trello gratuito). META: MVP pronto até o final da próxima aula!</p>
            </div>`,
            homework: `<div class="space-y-2">
              <p><b>Missão para Casa:</b></p>
              <p>1. Comece a construir sua parte do MVP! Cada membro deve executar as tarefas que ficaram sob sua responsabilidade. Se sua tarefa é criar telas no Figma, faça pelo menos 3 telas. Se é escrever textos, redija todos os textos necessários. Se é pesquisar fornecedores, traga 3 opções com preços. Traga PRONTO para a próxima aula, não deixe para fazer lá!</p>
              
              <p>2. Pesquise 3 MVPs famosos (além dos citados na aula): Amazon (começou só com livros), Twitter (era plataforma de podcasts chamada Odeo), Instagram (era Burbn, app de check-in), Groupon (começou como PDF por email). Para cada um: Como era o MVP inicial? O que mudou até a versão atual? Quanto tempo entre MVP e produto maduro? Que aprendizados tiraram?</p>
              
              <p>3. Prepara roteiro de teste do MVP: Quando o MVP estiver pronto, vocês precisarão testar com usuários reais. Escreva 5-7 perguntas para fazer aos testadores DEPOIS de usarem: 1) Você entendeu o que o produto faz? 2) Conseguiu realizar X tarefa sozinho? (sem ajuda), 3) Algo confundiu ou frustrou você? 4) Você usaria isso no dia a dia? Por quê? 5) Quanto pagaria? 6) Que está faltando? 7) Recomendaria para alguém?</p>
              
              <p>4. Validação antecipada: Se o MVP for digital (landing page, protótipo), já comece a divulgar para coletar emails/interesse ANTES mesmo de estar 100% pronto. Crie teaser nas redes: "Em breve: solução para [problema]. Quer saber primeiro? Link na bio." Quanto mais interesse antecipado, mais validado está!</p>
            </div>`

            title: "MVP II - Execução e Teste",
            page: 22,
            content: `<div class="space-y-4">
              <h3 class="font-bold text-lg">Teoria Aprofundada</h3>
              <p><b>Da Construção ao Teste - Ciclo de Validação:</b> Hoje vocês vão FINALIZAR o MVP e, crucialmente, colocá-lo nas mãos de usuários reais. O verdadeiro aprendizado não vem de construir, mas de OBSERVAR pessoas reais usando e reagindo. Lembrem: vocês não estão buscando elogios, estão buscando VERDADE.</p>
              
              <p><b>Metodologia Lean Startup - Construir-Medir-Aprender:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>CONSTRUIR:</b> Criar o MVP mínimo que testa a hipótese central (vocês estão fazendo isso hoje!)</li>
                <li><b>MEDIR:</b> Coletar dados quantitativos (quantos testaram, quantos concluíram, tempo de uso) e qualitativos (feedback, frustrações, sugestões)</li>
                <li><b>APRENDER:</b> Analisar dados e decidir: PERSEVERAR (continuar no caminho) ou PIVOTAR (mudar direção significativamente)</li>
              </ul>
              
              <p><b>Técnicas de Teste de Usabilidade:</b></p>
              
              <p><b>1. Teste de Observação Silenciosa:</b> O MELHOR método para apps/protótipos.</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li><b>Como fazer:</b> Dê o MVP para o testador usar. NÃO explique nada. NÃO ajude. Apenas OBSERVE e ANOTE.</li>
                <li><b>O que observar:</b> Onde ele hesita? Onde clica errado? Que expressão facial faz? (confuso, frustrado, satisfeito) Desiste em algum momento?</li>
                <li><b>Por quê funciona:</b> Revela problemas reais de UX que vocês, criadores cegos pela familiaridade, não veem.</li>
                <li><b>Regra de ouro:</b> Se 3 de 5 pessoas travam no mesmo ponto, há um problema sério de design ali!</li>
              </ul>
              
              <p><b>2. Think Aloud (Pense Alto):</b> Variação onde você PEDE para a pessoa falar o que está pensando enquanto usa.</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li>"Agora estou procurando o botão de..."</li>
                <li>"Fiquei confuso com essa palavra..."</li>
                <li>"Esperava que isso fizesse X, mas fez Y"</li>
              </ul>
              <p class="mt-1">Isso revela expectativas vs. realidade!</p>
              
              <p><b>3. Entrevista Pós-Teste:</b> Após o uso, faça perguntas abertas (não "você gostou?" mas "o que achou?").</p>
              <ul class="list-disc ml-6 space-y-1 mt-1">
                <li>O que você entendeu que esse produto faz?</li>
                <li>Resolveria algum problema seu? Qual?</li>
                <li>O que te FRUSTROU durante o uso?</li>
                <li>O que te SURPREENDEU positivamente?</li>
                <li>Usaria de novo? Recomendaria? Por quê?</li>
                <li>Se pudesse mudar UMA coisa, o que seria?</li>
                <li>Quanto pagaria por isso? (teste de disposição a pagar!)</li>
              </ul>
              
              <p><b>4. Teste A/B (se aplicável):</b> Se tiverem 2 versões de algo (ex: 2 logos, 2 títulos na landing page), mostrem versão A para metade dos testadores, versão B para outra metade. Vejam qual performa melhor.</p>
              
              <p><b>Documentando Aprendizados:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>O que funcionou bem:</b> Elementos que usuários elogiaram/usaram facilmente. Manter!</li>
                <li><b>O que não funcionou:</b> Pontos de confusão, frustração, travamento. Corrigir urgente!</li>
                <li><b>Sugestões dos usuários:</b> Nem todas valem implementar, mas anotem todas. Se 5+ pessoas sugerem a mesma coisa, considerem seriamente.</li>
                <li><b>Hipóteses validadas:</b> Que premissas iniciais se confirmaram? (Ex: "Pessoas realmente sofrem com esse problema" - validado ou não?)</li>
                <li><b>Hipóteses invalidadas:</b> O que vocês pensavam que era verdade mas descobriram que não é? (Não é fracasso, é aprendizado barato!)</li>
              </ul>
              
              <p><b>Decisão: Perseverar ou Pivotar?</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>PERSEVERAR:</b> Feedback majoritariamente positivo, pessoas usariam/pagariam, problemas são ajustes pequenos de UX. AÇÃO: Refinar MVP e preparar lançamento.</li>
                <li><b>PIVOTAR:</b> Problema não é tão relevante quanto pensavam, solução não resolve bem, pessoas não pagariam, concorrência é imbatível. AÇÃO: Mudar problema, solução, público ou modelo. Não é fracasso - Instagram pivotou, Twitter pivotou, todos pivotam!</li>
              </ul>
              
              <h3 class="font-bold text-lg mt-4">Caso Prático Real</h3>
              <p><b>Instagram - Pivô que Virou Unicórnio:</b> Começou como "Burbn" (2010), app de check-in tipo Foursquare + compartilhamento de fotos + planos futuros. MVP estava CONFUSO, cheio de funções. Testes revelaram: pessoas APENAS usavam a parte de fotos com filtros (ignore resto). Decisão corajosa: PIVOTAR. Eliminaram tudo exceto fotos + filtros. Renomearam Instagram. Relançaram em outubro/2010. Resultado: 25mil usuários no primeiro DIA, 1 milhão em 2 meses. Comprado por Facebook por US$ 1 bilhão em 2012 (empresa com 13 funcionários!). A chave? Observaram o que usuários REALMENTE faziam (não o que diziam) e pivotaram drasticamente.</p>
              
              <p><b>Groupon - Pivô de Blog para Marketplace:</b> Fundador Andrew Mason tinha site "The Point" (plataforma de mobilização coletiva). Não decolou. Observou: as poucas ações que funcionavam eram compras coletivas. Pivotou: criou Groupon focado APENAS nisso. Crescimento explosivo. IPO US$ 16 bilhões em 2011.</p>
            </div>`,
            exercise: `<div class="space-y-3">
              <h3 class="font-bold">Proposta de Trabalho em Sala:</h3>
              <p><b>Atividade 1: Finalização do MVP (30-40 min)</b><br/>
              Primeira metade da aula: trabalho focado em equipe para finalizar o MVP. Integrem as partes que cada um fez, testem internamente, corrijam bugs óbvios. Checklist mínimo: 1) Todas as telas/partes estão completas? 2) Links/navegação funcionam? 3) Textos estão corretos (sem erros)? 4) Visual está minimamente apresentável? 5) Testaram entre vocês e funciona? Quando 100% desses itens estiverem OK, MVP pronto para testes externos!</p>
              
              <p><b>Atividade 2: Teste Cruzado entre Equipes (30-40 min)</b><br/>
              Troquem MVPs com outra equipe. Cada equipe testa o MVP da outra usando Teste de Observação Silenciosa: 1) Testador tenta usar o MVP SOZINHO sem explicações (2-3 min), 2) Criadores APENAS observam e anotam dificuldades (NÃO ajudem!), 3) Após uso, entrevista pós-teste com perguntas preparadas (5 min), 4) Anotem todo feedback: elogios, críticas, sugestões, confusões. Depois retornem o MVP e recebam feedback documentado por escrito.</p>
              
              <p><b>Atividade 3: Análise de Aprendizados</b><br/>
              Com o feedback recebido, façam análise em grupo: 1) Liste 3 coisas que funcionaram MUITO BEM (usuários elogiaram ou usaram facilmente), 2) Liste 3 coisas que NÃO funcionaram (confusão, frustração, críticas), 3) Liste as sugestões de melhoria mais mencionadas, 4) DECISÃO: Vocês vão PERSEVERAR (ajustar e seguir) ou PIVOTAR (mudar significativamente)? Justifiquem baseado em dados, não em apego à ideia!</p>
              
              <p><b>Atividade 4: Plano de Ação Pós-MVP</b><br/>
              Definam próximos passos: 1) Se PERSEVERAR: que melhorias farão antes do pitch? Em que ordem de prioridade? 2) Se PIVOTAR: o que mudarão especificamente? (problema, solução, público, modelo) 3) Validação externa: vão testar com mais pessoas fora da sala? Quantas? Quando? 4) Documentem tudo num "Relatório de Validação do MVP" (1-2 páginas) que será anexado ao material final.</p>
            </div>`,
            homework: `<div class="space-y-2">
              <p><b>Missão para Casa:</b></p>
              <p>1. Validação Externa Massiva: Cada membro da equipe DEVE testar o MVP com pelo menos 3 pessoas FORA da escola (familiares, amigos, vizinhos) que se encaixem na persona. Use o roteiro de teste preparado. Anote TUDO: observações, respostas, sugestões. Cada equipe terá, no mínimo, 15 testes externos. Consolidem os dados: quantos % entenderam? Quantos % usariam? Quantos % pagariam? Qual feedback mais comum?</p>
              
              <p>2. Itere o MVP: Baseado no feedback da sala E dos testes externos, façam melhorias urgentes no MVP. Não precisa ser perfeito, mas corrijam os problemas CRÍTICOS (aqueles que 3+ pessoas apontaram). Tragam a versão melhorada na próxima aula.</p>
              
              <p>3. Documente a Jornada do MVP: Criem um slide ou página mostrando a EVOLUÇÃO: 1) Ideia inicial (como era no papel), 2) MVP v1.0 (primeira versão testada), 3) Feedback recebido (prints, citações), 4) MVP v2.0 (versão melhorada pós-feedback), 5) Métricas de validação (X% entenderam, Y% pagariam, Z sugestões recebidas). Isso mostra PROCESSO EMPREENDEDOR para a banca do pitch!</p>
              
              <p>4. Reflita individualmente: Escreva 1 página respondendo: 1) O que você aprendeu construindo e testando o MVP? 2) Que habilidade você desenvolveu/descobriu? 3) Qual foi o momento mais difícil? Como superou? 4) Se fosse começar de novo, o que faria diferente? 5) Como se sente sobre o projeto agora comparado ao início? Essa reflexão pessoal será valiosa para a apresentação final!</p>
            </div>`

{ id: 1, title: "Minhas metas financeiras", page: 26,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Metas financeiras são objetivos concretos relacionados ao dinheiro.</b> Para alcançá-las, é preciso saber quanto poupar e investir. Nem sempre quem ganha mais é mais bem-sucedido financeiramente — o segredo está nas metas claras e na disciplina.</p>
    <p><b>Caso João vs Maria:</b> João é engenheiro, ganha R$2.300/mês, reserva R$400 para investimentos com retorno de 10% ao ano, gasta só 30% do salário e guarda o resto para emergências. Maria é médica, ganha R$8.600/mês, poupa R$600, e gasta praticamente todo o restante. Quem tem mais chance de uma aposentadoria tranquila? João — porque tem metas claras e disciplina, mesmo ganhando menos!</p>
    <p><b>Como definir metas financeiras:</b> Metas devem ser SMART: Específicas, Mensuráveis, Alcançáveis, Relevantes e com Prazo definido. "Quero economizar" é vago. "Quero juntar R$5.000 em 12 meses poupando R$420/mês" é uma meta SMART.</p></div>`,

    <p><b>Atividade:</b> Analise os casos de João e Maria no livro do aluno. Calcule quanto cada um terá em 5, 10 e 20 anos. Depois, defina 3 metas financeiras pessoais (curto, médio e longo prazo) usando o método SMART.</p></div>`,
