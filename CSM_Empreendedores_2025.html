{ id: 2, title: "Onde eu posso investir?", page: 28,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Investir é fazer o dinheiro trabalhar para você.</b> No 9º ano, consolidamos os conhecimentos de investimentos dos anos anteriores e aprofundamos as opções disponíveis no mercado brasileiro.</p>
    <p><b>Renda Fixa vs. Renda Variável:</b></p><ul>
      <li><b>Renda Fixa:</b> Você sabe (ou pode estimar) quanto vai ganhar. Tesouro Direto, CDB, LCI/LCA, Debêntures. Menor risco, menor retorno</li>
      <li><b>Renda Variável:</b> O retorno é incerto — pode ganhar muito ou perder. Ações, FIIs (Fundos Imobiliários), ETFs, Criptomoedas. Maior risco, maior potencial</li></ul>
    <p><b>A importância da diversificação:</b> Nunca coloque todo o dinheiro em um só lugar. Uma carteira equilibrada combina renda fixa (segurança) com renda variável (crescimento).</p>
    <p><b>Onde investir como menor de idade?</b> Com autorização dos pais, é possível abrir conta em corretoras e investir em Tesouro Direto, CDB e até ações. O mais importante é começar a aprender!</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Monte uma carteira de investimentos fictícia com R$10.000. Distribua entre renda fixa e variável conforme seu perfil de investidor. Justifique cada escolha. Compare com os colegas.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise: qual corretora de valores permite abertura de conta para menores? Quais investimentos estão disponíveis? Traga os dados.</p></div>` },
{ id: 3, title: "Investindo o seu dinheiro", page: 30,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Prática de investimento simulado.</b> Nesta aula, os alunos aplicam os conceitos em uma simulação realista de investimento, tomando decisões com base em cenários de mercado.</p>
    <p><b>Simulação de investimento:</b> Cada grupo recebe um cenário econômico diferente (inflação alta, juros baixos, crise global, boom tecnológico) e deve decidir como alocar seus recursos. Ao longo da aula, "notícias" surgem mudando o cenário — e os grupos precisam reagir.</p>
    <p><b>Lições do exercício:</b> Investir exige paciência, informação e controle emocional. Decisões por impulso geralmente dão errado. Diversificação protege contra cenários imprevistos. O mercado sobe e desce, mas no longo prazo tende a crescer.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Simulação de mercado financeiro: cada grupo começa com R$50.000 fictícios e 4 opções de investimento. A cada rodada (5 min), uma "notícia" muda o cenário. O grupo decide se mantém, vende ou compra mais. No final, quem teve melhor retorno?</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Acompanhe durante 1 semana o valor de uma ação (pode ser Petrobras, Vale, Magazine Luiza) em um site de finanças. Anote o preço diário. Subiu ou caiu? Quanto variou?</p></div>` },
{ id: 4, title: "Criptomoeda: a moeda do futuro?", page: 32,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>No 9º ano, aprofundamos o estudo de criptomoedas</b> iniciado no 8º ano, focando agora no impacto delas no futuro do dinheiro e dos negócios.</p>
    <p><b>CBDCs (Moedas Digitais de Bancos Centrais):</b> O Brasil está desenvolvendo o Drex (Real Digital) — uma versão digital do Real controlada pelo Banco Central. Diferente das criptomoedas descentralizadas, o Drex será regulamentado e rastreável.</p>
    <p><b>DeFi (Finanças Descentralizadas):</b> Serviços financeiros que funcionam sem bancos — empréstimos, seguros, trocas — tudo via contratos inteligentes no blockchain. Promete democratizar o acesso a finanças, mas ainda tem riscos altos.</p>
    <p><b>Debate:</b> Criptomoedas vão substituir o dinheiro tradicional? Ou vão coexistir? E quais os riscos e implicações para a sociedade?</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Debate: "Criptomoedas são a moeda do futuro ou uma bolha?" Grupos pesquisam argumentos prós e contras. Incluam dados sobre Drex, Bitcoin e DeFi. Debatam e a turma vota.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise o que é o Drex (Real Digital). Como vai funcionar? Quando será lançado? Que impacto terá no dia a dia? Traga resumo de 5 linhas.</p></div>` },
{ id: 5, title: "Gestão Financeira Empresarial I", page: 34,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Gestão financeira empresarial aplicada à startup.</b> No 9º ano, os conceitos financeiros são aplicados diretamente ao Projeto de Startup que os alunos estão desenvolvendo no módulo de Negócios.</p>
    <p><b>Estrutura de custos da startup:</b></p><ul>
      <li><b>Custos fixos:</b> Existem independente de vender (aluguel, softwares, salários)</li>
      <li><b>Custos variáveis:</b> Mudam conforme vendas (matéria-prima, embalagem, frete)</li>
      <li><b>Custos de aquisição (CAC):</b> Quanto custa conquistar cada cliente</li></ul>
    <p><b>Precificação:</b> O preço de venda deve cobrir custos + margem de lucro. Métodos: baseada em custos (custo + margem), baseada em valor (quanto o cliente está disposto a pagar), baseada na concorrência (preço de mercado).</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Monte a estrutura de custos da startup do seu grupo: liste todos os custos fixos e variáveis. Defina o preço de venda usando os 3 métodos. Qual faz mais sentido para o seu negócio?</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise o preço de 3 concorrentes da sua startup. Seu preço está acima, abaixo ou na média do mercado? Por quê?</p></div>` },
{ id: 6, title: "Gestão Financeira Empresarial II", page: 36,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>DRE (Demonstrativo de Resultados do Exercício):</b> É o "boletim" financeiro da empresa — mostra se ela está lucrando ou tendo prejuízo.</p>
    <p><b>Estrutura simplificada do DRE:</b></p><ul>
      <li>Receita Bruta (tudo que vendeu)</li>
      <li>(-) Deduções (impostos, devoluções)</li>
      <li>= Receita Líquida</li>
      <li>(-) Custos variáveis</li>
      <li>= Lucro Bruto</li>
      <li>(-) Despesas operacionais (fixas)</li>
      <li>= Lucro Operacional</li>
      <li>(-) Impostos sobre lucro</li>
      <li>= Lucro Líquido</li></ul>
    <p><b>Fluxo de caixa:</b> Diferente do DRE (que mostra competência), o fluxo de caixa mostra o dinheiro REAL que entra e sai. Uma empresa pode ter lucro no DRE mas não ter dinheiro em caixa (por exemplo, se vendeu a prazo).</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Monte o DRE simplificado da startup para os primeiros 3 meses (projeção). Calcule: receita, custos, lucro bruto, despesas e lucro líquido. A startup dá lucro no primeiro mês? Se não, em qual mês?</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise o DRE de uma empresa real de capital aberto (busque no Google: "[empresa] DRE"). Ela está lucrando? Quanto? Compare com a projeção da sua startup.</p></div>` },
{ id: 7, title: "Gestão Financeira Empresarial III", page: 38,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Indicadores financeiros avançados para startups:</b></p><ul>
      <li><b>Burn Rate:</b> Quanto a startup gasta por mês a mais do que ganha. Ex: gasta R$8.000, ganha R$3.000 → burn rate = R$5.000/mês</li>
      <li><b>Runway:</b> Quantos meses a startup sobrevive com o dinheiro em caixa. Fórmula: Caixa ÷ Burn Rate. R$30.000 ÷ R$5.000 = 6 meses de runway</li>
      <li><b>Break-even:</b> Quando receitas = despesas. A partir daí, lucro! Fórmula: Custos Fixos ÷ Margem de Contribuição</li>
      <li><b>LTV/CAC:</b> Lifetime Value ÷ Custo de Aquisição. Deve ser > 3x para ser saudável</li>
      <li><b>MRR (Monthly Recurring Revenue):</b> Receita recorrente mensal — essencial para modelos de assinatura</li></ul>
    <p><b>Quando levantar investimento:</b> Quando o runway está ficando curto (< 6 meses) E a startup tem tração comprovada (métricas crescendo).</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Calcule todos os indicadores da sua startup: Burn Rate, Runway, Break-even e LTV/CAC. Apresente em um "dashboard financeiro" visual. A startup é saudável? O que precisa melhorar?</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise o burn rate de startups famosas na fase inicial (Uber, Airbnb). Quanto gastavam por mês? Como sobreviveram até ficarem lucrativas?</p></div>` },
{ id: 8, title: "Métricas para atrair um investidor", page: 40,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Investidores analisam métricas antes de investir.</b> Não basta ter uma boa ideia — é preciso provar com números que o negócio tem potencial.</p>
    <p><b>As métricas que investidores mais valorizam:</b></p><ul>
      <li><b>Tração:</b> Prova de que o mercado quer o produto (usuários ativos, vendas crescentes, engajamento)</li>
      <li><b>Unit Economics:</b> O negócio ganha mais por cliente do que gasta para adquiri-lo? (LTV > 3x CAC)</li>
      <li><b>Crescimento:</b> Taxa de crescimento mensal (MoM). Acima de 15% ao mês é excelente para early-stage</li>
      <li><b>Retenção/Churn:</b> Clientes ficam ou vão embora? Churn abaixo de 5% é saudável</li>
      <li><b>Mercado (TAM/SAM/SOM):</b> Tamanho total do mercado, parcela acessível e parcela realista a conquistar</li></ul>
    <p><b>O Pitch Deck financeiro:</b> Slides essenciais para investidores: modelo de negócio, métricas de tração, projeção financeira de 12 meses (3 cenários), pedido de investimento (quanto e para quê) e valuation.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Monte os slides financeiros do Pitch Deck da startup: 1) Modelo de receita, 2) Métricas atuais (mesmo que estimadas), 3) Projeção de 12 meses, 4) Quanto precisa de investimento e para quê. Ensaie a apresentação.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Prepare-se para o pitch final: revise TODOS os números financeiros. Peça para um familiar fazer perguntas difíceis sobre as finanças da startup. As respostas foram convincentes?</p></div>` },
{ id: 9, title: "Revisão de Educação Financeira", page: 42, isQuiz: true }
] },
      { id: "m9-3", name: "Inovacao", icon: "target", color: "amber", lessons: [
{ id: 1, title: "Cultura da inovação", page: 44,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Cultura da inovação</b> são hábitos desenvolvidos por uma pessoa ou empresa para promover a criatividade, experimentação e busca constante por melhorias. Assim como a cultura regional do Nordeste inclui São João e forró, a cultura da inovação inclui curiosidade, tolerância ao erro e colaboração.</p>
    <p><b>Características de empresas inovadoras:</b> Google permite 20% do tempo para projetos pessoais. 3M encoraja experimentação (Post-it nasceu de um "erro"). Amazon tem a cultura de "pensar grande, começar pequeno". Todas investem fortemente em P&D (Pesquisa e Desenvolvimento).</p>
    <p><b>Neste módulo:</b> Cultura de inovação, criatividade, tecnologias exponenciais, IA, data science, machine learning, IoT, blockchain, RA/RV, metaverso, biotecnologia, nanotecnologia, fabricação digital e oratória.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Analise: a escola tem cultura de inovação? Avalie nos critérios: tolera erros? Incentiva ideias novas? Tem espaço para experimentação? Proponha 3 ações para criar uma cultura de inovação na escola.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise uma empresa com forte cultura de inovação. Que práticas ela adota? Traga 3 exemplos concretos.</p></div>` },
{ id: 2, title: "Tecnologia a favor da humanidade", page: 46,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Tecnologias exponenciais estão transformando a vida humana</b> em áreas como saúde, educação, energia e alimentação. Diferente de tecnologias lineares, as exponenciais dobram de capacidade a cada período.</p>
    <p><b>Exemplos de impacto positivo:</b></p><ul>
      <li><b>Saúde:</b> IA diagnosticando câncer com mais precisão que médicos, impressão 3D de próteses acessíveis, telemedicina levando atendimento a áreas remotas</li>
      <li><b>Educação:</b> Plataformas adaptativas de aprendizado, tradução instantânea quebrando barreiras linguísticas</li>
      <li><b>Meio ambiente:</b> Energia solar cada vez mais barata, sensores monitorando desmatamento em tempo real</li>
      <li><b>Alimentação:</b> Agricultura de precisão usando drones e sensores, carne cultivada em laboratório</li></ul>
    <p><b>Reflexão:</b> A tecnologia é neutra — pode ser usada para o bem ou para o mal. Cabe a nós, empreendedores e cidadãos, direcioná-la para resolver problemas reais da humanidade.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Em grupos, escolham um dos 17 ODS (Objetivos de Desenvolvimento Sustentável da ONU). Proponham uma solução tecnológica para contribuir com esse ODS. Apresentem: que tecnologia? Como resolve? Quem beneficia?</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise uma startup de impacto social que usa tecnologia para resolver um problema real. Descreva: qual o problema? Que tecnologia usa? Qual o impacto?</p></div>` },
{ id: 3, title: "A inteligência artificial vai dominar o mundo?", page: 48,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>A IA está presente em praticamente tudo que fazemos</b> — desde as recomendações do TikTok até o filtro de spam do e-mail. Mas será que ela vai dominar o mundo?</p>
    <p><b>IA Fraca vs. IA Forte:</b></p><ul>
      <li><b>IA Fraca (Narrow AI):</b> Especializada em UMA tarefa. É o que temos hoje: ChatGPT gera texto, DALL-E gera imagens, DeepMind joga xadrez. Muito boa no que faz, mas não "pensa"</li>
      <li><b>IA Forte (AGI):</b> Inteligência geral artificial — capacidade de pensar como humano em QUALQUER tarefa. Ainda NÃO existe e pode estar a décadas (ou séculos) de distância</li></ul>
    <p><b>IA Generativa no dia a dia:</b> ChatGPT (textos), DALL-E/Midjourney (imagens), Suno (músicas), Runway (vídeos), GitHub Copilot (código). Essas ferramentas não "pensam" — reconhecem padrões em bilhões de dados.</p>
    <p><b>Impacto no trabalho:</b> A IA não vai substituir pessoas — vai substituir pessoas que NÃO sabem usar IA. A habilidade de trabalhar COM IA será tão importante quanto saber ler e escrever.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Debate: "A IA vai tirar nossos empregos?" Pesquisem profissões que estão mudando e profissões novas que surgem por causa da IA. Conclusão: que habilidades humanas a IA NÃO consegue replicar?</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Use uma IA generativa (ChatGPT, Gemini) para ajudar em alguma tarefa real (estudar para prova, escrever texto, resolver exercício). Avalie: ajudou? Errou algo? Traga o relato.</p></div>` },
{ id: 4, title: "Internet das Coisas, mas que coisas?", page: 50,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>IoT é a conexão de objetos cotidianos à internet.</b> No 9º ano, aprofundamos o conceito visto no 8º ano com foco em aplicações empreendedoras.</p>
    <p><b>IoT + Empreendedorismo:</b></p><ul>
      <li><b>Agritech:</b> Sensores que monitoram umidade, temperatura e nutrientes do solo, ativando irrigação automaticamente. Economia de até 30% de água</li>
      <li><b>Smart Cities:</b> Iluminação pública que acende só quando detecta movimento, lixeiras que avisam quando estão cheias, estacionamento inteligente</li>
      <li><b>Wearables:</b> Relógios e pulseiras que monitoram saúde 24h — batimentos, sono, oxigenação, estresse. Dados usados para prevenção de doenças</li>
      <li><b>Logística:</b> Rastreamento em tempo real de entregas, otimização de rotas, armazéns inteligentes</li></ul>
    <p><b>Oportunidade:</b> O mercado de IoT no Brasil deve movimentar mais de US$ 8 bilhões até 2025. Startups que conectam o mundo físico ao digital têm enorme potencial!</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Projete uma startup de IoT para Limoeiro/PE: que problema local resolveria? Que sensor usaria? Que dados coletaria? Como geraria receita? Apresente o pitch em 2 minutos.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Identifique 3 oportunidades de IoT na sua comunidade (agricultura, comércio, saúde, educação). Para cada uma, descreva: o problema, a solução IoT e o impacto esperado.</p></div>` },
{ id: 5, title: "Mundo da Blockchain", page: 52,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Blockchain vai muito além das criptomoedas.</b> No 9º ano, exploramos aplicações avançadas e disruptivas dessa tecnologia.</p>
    <p><b>Contratos inteligentes (Smart Contracts):</b> Programas que se executam automaticamente quando condições são cumpridas. Ex: seguro de voo que paga automaticamente se o voo atrasar mais de 2 horas — sem burocracia, sem atendente.</p>
    <p><b>DAOs (Organizações Autônomas Descentralizadas):</b> Empresas governadas por código e votação dos membros, sem CEO ou hierarquia tradicional. Cada membro vota nas decisões proporcionalmente à sua participação.</p>
    <p><b>Web3:</b> A próxima geração da internet, onde os usuários são donos dos seus dados e conteúdos (diferente da Web2, onde Google, Meta e Amazon controlam tudo).</p>
    <p><b>Aplicações práticas:</b> Rastreabilidade de alimentos (saber exatamente de qual fazenda veio cada ingrediente), cartórios digitais, votação eletrônica segura, identidade digital soberana.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Crie um contrato inteligente fictício para a startup do grupo: que processo seria automatizado? Quais as condições? O que acontece quando as condições são cumpridas? Desenhe o fluxo.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise o conceito de Web3: como será diferente da internet atual? Que benefícios e riscos traz? Resuma em 1 parágrafo.</p></div>` },
{ id: 6, title: "Metaverso: mais real do que imaginamos!", page: 54,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>O Metaverso é a convergência de mundos físico e digital</b> em experiências imersivas persistentes. Não é apenas um jogo ou uma rede social — é uma nova camada de realidade.</p>
    <p><b>Aplicações empresariais do Metaverso:</b></p><ul>
      <li><b>Varejo:</b> Lojas virtuais onde você experimenta roupas com seu avatar antes de comprar</li>
      <li><b>Educação:</b> Aulas imersivas (visitar o fundo do oceano, viajar ao espaço, simular cirurgias)</li>
      <li><b>Trabalho remoto:</b> Escritórios virtuais com sensação de presença real (substitui videoconferência)</li>
      <li><b>Eventos:</b> Shows, conferências e feiras no metaverso (Fortnite já realizou shows com milhões de espectadores)</li>
      <li><b>Imóveis digitais:</b> Terrenos e propriedades virtuais sendo comprados e valorizados</li></ul>
    <p><b>Desafios:</b> Acessibilidade (óculos VR ainda são caros), privacidade, vício digital, regulamentação, inclusão de quem não tem acesso à tecnologia.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Projete a presença da sua startup no metaverso: como seria a loja/escritório virtual? Que experiência ofereceria? Como seria diferente do mundo físico? Desenhe o conceito.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Experimente uma plataforma de metaverso (Roblox, Fortnite Creative, Rec Room). Observe: como as pessoas interagem? Há comércio? Que modelo de negócio a plataforma usa?</p></div>` },
{ id: 7, title: "Fabricação digital a favor da vida", page: 56,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>A fabricação digital está democratizando a produção.</b> Hoje, com uma impressora 3D e um computador, qualquer pessoa pode criar produtos físicos — de próteses médicas a peças de engenharia.</p>
    <p><b>Impacto social da fabricação digital:</b></p><ul>
      <li><b>Próteses acessíveis:</b> Impressão 3D reduziu o custo de uma prótese de mão de R$50.000 para R$500</li>
      <li><b>Construção civil:</b> Casas inteiras impressas em 3D em 24 horas por uma fração do custo convencional</li>
      <li><b>Bioimpressão:</b> Impressão de tecidos biológicos (pele, cartilagem) para transplantes — futuro: órgãos inteiros!</li>
      <li><b>Personalização em massa:</b> Cada produto pode ser único sem custo extra (aparelhos dentários, sapatos sob medida)</li></ul>
    <p><b>Fab Labs e Makerspaces:</b> Laboratórios comunitários de fabricação digital. O movimento maker democratiza a criação — qualquer pessoa com uma ideia pode prototipar sem precisar de uma fábrica.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Se a startup pudesse usar fabricação digital, que produto criaria? Desenhe em 3 ângulos (frente, lado, cima), especifique material e dimensões. Explique como a fabricação digital reduziria custos ou tempo de produção.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise: existe um Fab Lab ou makerspace acessível na região? Se não, pesquise o mais próximo. O que seria possível criar? Quanto custa usar?</p></div>` },
{ id: 8, title: "Como falar em público?", page: 58,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Falar em público é a habilidade mais importante para um empreendedor.</b> Você apresentará para investidores, clientes, parceiros e equipe. Nesta aula, preparamos os alunos para o Pitch Final.</p>
    <p><b>Estrutura do pitch de 5 minutos:</b></p><ul>
      <li><b>Hook (30s):</b> Comece com algo que prenda — dado impactante, pergunta provocativa, história pessoal</li>
      <li><b>Problema (45s):</b> Mostre que o problema é real, relevante e doloroso</li>
      <li><b>Solução + Demo (1min):</b> Apresente sua solução e mostre o MVP funcionando</li>
      <li><b>Mercado + Modelo (45s):</b> Tamanho da oportunidade e como ganha dinheiro</li>
      <li><b>Tração + Métricas (45s):</b> Prove que funciona — números, feedbacks, validações</li>
      <li><b>Equipe (30s):</b> Por que VOCÊS são as pessoas certas?</li>
      <li><b>Pedido + Visão (30s):</b> O que precisam e onde querem chegar</li></ul>
    <p><b>Dicas finais:</b> Ensaie pelo menos 5 vezes. Cronometre. Mantenha contato visual. Não leia slides. Prepare-se para perguntas difíceis. Cada membro da equipe deve falar!</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade — Ensaio Geral:</b> Cada grupo apresenta o pitch completo cronometrado (5 min + 3 min de perguntas). A turma avalia em 5 critérios (1-10): Clareza, Convicção, Visual, Inovação, Viabilidade. Feedback construtivo. Ajustem para a apresentação final!</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Ensaie o pitch pelo menos 3 vezes em casa (na frente do espelho ou para familiares). Grave pelo menos uma vez em vídeo e assista criticamente. Prepare respostas para as 10 perguntas mais prováveis da banca.</p></div>` },
{ id: 9, title: "Revisão de Inovação", page: 60, isQuiz: true }
] },

{ id: 1, title: "Pilares do UX", page: 62,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>No 9º ano, aprofundamos UX com foco na startup.</b> Os pilares do UX (utilidade, usabilidade, desejabilidade, acessibilidade, credibilidade) devem ser aplicados diretamente ao projeto que os alunos estão construindo.</p>
    <p><b>O Favo de Mel de Peter Morville — revisão avançada:</b> Útil (resolve problema real?), Usável (fácil de usar?), Desejável (as pessoas querem?), Localizável (encontram o que precisam?), Acessível (todos conseguem usar?), Credível (confiam?) e Valioso (gera valor para o negócio?).</p>
    <p><b>Stakeholders do projeto:</b> Quem são as partes interessadas? Usuários diretos, clientes pagantes, equipe, investidores, parceiros, comunidade. Cada stakeholder tem expectativas diferentes — um bom UX equilibra todas.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Avalie o protótipo/MVP da sua startup nos 7 pilares do Favo de Mel (nota 0-10 para cada). Identifique o pilar mais forte e o mais fraco. Crie um plano de ação para melhorar os 2 pilares mais fracos.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Peça para 3 pessoas avaliarem seu protótipo nos 7 pilares. Compare a avaliação delas com a sua. Onde há diferença? O que isso revela?</p></div>` },
{ id: 2, title: "UX na prática", page: 64,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Aplicação prática de UX ao projeto da startup.</b> Nesta aula, os alunos executam o processo completo de UX design.</p>
    <p><b>Processo aplicado:</b></p><ul>
      <li><b>1. Pesquisa com usuários reais:</b> Entrevistar pelo menos 5 potenciais clientes</li>
      <li><b>2. Persona refinada:</b> Atualizar a persona com base nos dados reais das entrevistas</li>
      <li><b>3. Jornada do usuário:</b> Mapear cada passo desde descobrir o produto até recomendá-lo</li>
      <li><b>4. Pain Points:</b> Identificar os momentos de frustração na jornada e propor soluções</li>
      <li><b>5. Wireframe atualizado:</b> Redesenhar telas com base nos aprendizados</li></ul>
    <p><b>Benchmarking:</b> Analisar 3-5 concorrentes ou produtos similares para identificar boas práticas e oportunidades de diferenciação.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Execute o processo completo: atualize a persona, redesenhe a jornada do usuário com os pain points identificados, e refine o wireframe. Trabalho prático e mão na massa!</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Realize benchmarking: analise 3 apps/sites concorrentes. Para cada um: 3 pontos fortes e 3 pontos fracos. O que sua startup faz melhor?</p></div>` },
{ id: 3, title: "UX e UI: unidos, mas diferentes", page: 66,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>UX é o esqueleto, UI é a pele.</b> No 9º ano, os alunos aplicam ambos ao produto real da startup, criando uma experiência completa.</p>
    <p><b>Aplicando UI à startup:</b></p><ul>
      <li><b>Paleta de cores:</b> Escolha cores que transmitam os valores da marca (máximo 3-4 cores)</li>
      <li><b>Tipografia:</b> Fonte legível, consistente, que combine com a personalidade da marca</li>
      <li><b>Iconografia:</b> Ícones intuitivos e consistentes em todo o produto</li>
      <li><b>Espaçamento:</b> Respiro visual — não encher a tela de informação</li>
      <li><b>Hierarquia visual:</b> Guiar o olhar do usuário para o que é mais importante</li></ul>
    <p><b>Design System:</b> Conjunto padronizado de componentes reutilizáveis (botões, cards, formulários) que mantém consistência em todo o produto.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Crie o mini Design System da startup: defina paleta de cores (com códigos hex), tipografia, estilo de botões e cards. Aplique ao protótipo. O visual agora reflete a identidade da marca?</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Analise o design system de uma marca famosa (Google Material Design, Apple HIG). Que elementos você pode adaptar para sua startup?</p></div>` },
{ id: 4, title: "Dia a dia de um UX", page: 68,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Como é o dia a dia de um profissional de UX?</b> No 9º ano, os alunos vivenciam na prática o trabalho de um UX Designer aplicado à startup.</p>
    <p><b>Atividades típicas de um UX Designer:</b></p><ul>
      <li><b>Segunda:</b> Reunião de sprint planning — definir prioridades da semana</li>
      <li><b>Terça:</b> Pesquisa com usuários — entrevistas ou análise de dados</li>
      <li><b>Quarta:</b> Design — criar wireframes e protótipos com base nos aprendizados</li>
      <li><b>Quinta:</b> Teste de usabilidade — observar usuários usando o protótipo</li>
      <li><b>Sexta:</b> Iteração — ajustar o design com base nos testes e preparar para desenvolvimento</li></ul>
    <p><b>Ferramentas do mercado:</b> Figma (design e prototipagem), Miro (brainstorming e mapeamento), Hotjar (mapas de calor), Maze (testes remotos), Notion (documentação).</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Simule uma "semana de UX" compactada: 10 min planejando, 10 min pesquisando (com colegas), 10 min desenhando melhorias, 10 min testando, 10 min iterando. Experiência completa!</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise vagas de UX Designer no LinkedIn. Quais habilidades mais pedem? Qual faixa salarial? Que formação exigem? Traga os dados.</p></div>` },
{ id: 5, title: "UX Research I", page: 70,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Pesquisa de UX é o que separa "achismo" de decisões baseadas em dados.</b> Sem pesquisa, você está adivinhando — e adivinhar custa caro.</p>
    <p><b>Métodos de pesquisa aplicados ao projeto:</b></p><ul>
      <li><b>Entrevistas em profundidade:</b> Conversa 1:1 com potenciais clientes (20-30 min). Pergunte "por quê?" pelo menos 5 vezes para ir além da superfície</li>
      <li><b>Questionários quantitativos:</b> Google Forms com 10-15 perguntas para validar hipóteses com números. Mínimo 30 respondentes para ter confiabilidade</li>
      <li><b>Card Sorting:</b> Pedir para usuários organizarem funcionalidades em categorias — revela como ELES pensam (não como você pensa que eles pensam)</li>
      <li><b>Análise competitiva:</b> Estudar concorrentes sistematicamente — funcionalidades, preços, avaliações de usuários, pontos fracos</li></ul></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Crie e aplique um questionário de validação (Google Forms) com 10 perguntas sobre a startup. Aplique com pelo menos 15 colegas. Compile e analise: que padrões emergiram? Alguma hipótese foi invalidada?</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Aplique o questionário com mais 15 pessoas FORA da escola. Compare com os resultados de dentro da escola. São diferentes? O que isso significa?</p></div>` },
{ id: 6, title: "UX Research II", page: 72,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Teste de usabilidade é a pesquisa mais valiosa de UX.</b> Você observa pessoas REAIS usando seu produto e descobre problemas que jamais perceberia sozinho.</p>
    <p><b>Protocolo de teste de usabilidade:</b></p><ul>
      <li><b>1. Defina 3-5 tarefas:</b> "Faça cadastro", "Encontre o preço", "Complete uma compra"</li>
      <li><b>2. Recrute 5 testadores:</b> Que se encaixem na persona (5 é suficiente para encontrar 80% dos problemas!)</li>
      <li><b>3. Grave (com permissão):</b> Tela + rosto do testador para analisar depois</li>
      <li><b>4. Observe sem interferir:</b> NÃO ajude, NÃO explique, apenas anote</li>
      <li><b>5. Meça:</b> Tempo por tarefa, taxa de conclusão, número de erros</li>
      <li><b>6. Entreviste após:</b> "O que confundiu?", "O que melhoraria?", "Usaria de novo?"</li></ul>
    <p><b>Regra dos 3:</b> Se 3 de 5 testadores travam no mesmo ponto, é um problema CRÍTICO que precisa ser resolvido antes do lançamento.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Teste cruzado final: troque protótipos entre grupos e execute o protocolo completo de teste de usabilidade. Entregue ao grupo original um "relatório de usabilidade" com métricas e recomendações.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Teste com 3 pessoas fora da escola que se encaixem na persona. Aplique o protocolo completo. Traga o relatório com as métricas e os problemas encontrados.</p></div>` },
{ id: 7, title: "Customer Success", page: 74,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Customer Success (CS) é garantir que o cliente alcance o resultado desejado ao usar seu produto.</b> No 9º ano, aplicamos CS à startup com métricas reais.</p>
    <p><b>Métricas de CS aplicadas ao projeto:</b></p><ul>
      <li><b>NPS:</b> Aplique com testadores — "De 0 a 10, recomendaria?" Calcule o NPS da startup</li>
      <li><b>Churn previsto:</b> Com base nos testes, quantos % desistiriam? O que fazer para reduzir?</li>
      <li><b>Time to Value:</b> Quanto tempo leva para o usuário ter a primeira experiência de valor? Quanto menor, melhor</li>
      <li><b>Onboarding:</b> Como será o processo de boas-vindas? Tutorial? Guia? Email de acompanhamento?</li></ul>
    <p><b>Estratégia de retenção da startup:</b> Defina 3 ações concretas para manter clientes ativos e satisfeitos. Lembre: conquistar cliente novo custa 5-7x mais que manter um existente!</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Aplique NPS com os testadores das aulas anteriores. Calcule o NPS da startup. Desenhe o fluxo de onboarding (primeiros 5 minutos do novo usuário). Defina 3 estratégias de retenção.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Analise o onboarding de um app que você começou a usar recentemente. Foi fácil? Teve tutorial? Quanto tempo levou para entender? O que faria diferente?</p></div>` },
{ id: 8, title: "Jornada do usuário", page: 76,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>A Jornada do Usuário é o mapa completo da experiência</b> desde o primeiro contato com a marca até se tornar um promotor que recomenda para outros.</p>
    <p><b>Etapas da jornada final da startup:</b></p><ul>
      <li><b>1. Descoberta:</b> Como o usuário descobre a startup? (redes sociais, boca a boca, busca)</li>
      <li><b>2. Consideração:</b> O que faz ele considerar usar? (proposta de valor, reviews, demo)</li>
      <li><b>3. Decisão:</b> O que o convence a comprar/assinar? (preço, confiança, urgência)</li>
      <li><b>4. Ativação:</b> Primeira experiência de valor (onboarding, "momento aha!")</li>
      <li><b>5. Uso recorrente:</b> Ele volta? Por quê? (hábito, necessidade, gamificação)</li>
      <li><b>6. Expansão:</b> Ele compra mais? Atualiza plano? (upsell, cross-sell)</li>
      <li><b>7. Advocacia:</b> Ele recomenda? (NPS 9-10, indicações, reviews positivas)</li></ul>
    <p><b>Consolidação final:</b> Este é o último passo antes do Pitch. A jornada do usuário mostra que vocês pensaram em TUDO — da descoberta à fidelização. Investidores adoram ver isso!</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade Final:</b> Desenhe a jornada completa do usuário da startup (7 etapas) em formato visual (cartaz ou digital). Para cada etapa: o que o usuário faz? O que sente? Que touchpoint tem com a marca? Que métrica mede? Inclua no material do Pitch.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Revise TODOS os materiais do projeto: Pitch Deck, Canvas, Finanças, Protótipo, Jornada do Usuário. Tudo coerente? Ensaie o pitch completo pelo menos 3 vezes. Estejam prontos para o Demo Day!</p></div>` },

        id: "m9-5",
        name: "Projetos Semestrais",
        icon: "rocket",

        lessons: [
          { id: 1, title: "Projeto 1 — 1º Semestre", page: 0,
            content: `<div class="space-y-4">
<h3>🚀 Projetos do 1º Semestre — Negócios + Educação Financeira</h3>
<p style="color:var(--text-dim);font-style:italic">Nível 9º ano: projeto-síntese que integra 4 anos de aprendizado. Máxima autonomia.</p>

<div style="border-left:3px solid var(--grade-accent);padding-left:1rem;margin:1.5rem 0">
<h3 style="color:var(--grade-accent)">Opção A — "Startup Real: Do Problema ao Primeiro Cliente"</h3>
<p><b>Proposta:</b> Ir ALÉM do projeto fictício: o grupo deve criar uma startup que gere pelo menos uma transação real (venda, assinatura, doação ou parceria concretizada) antes da Feira. Toda a jornada deve ser documentada: pivôs, erros, decisões financeiras, métricas reais.</p>
<p><b>Objetivo:</b> Provar que empreendedorismo é realizável por jovens de 14-15 anos, com impacto real e aprendizado irreversível. Este é o projeto-síntese de 4 anos do programa.</p>
<p><b>Sugestões de desenvolvimento:</b></p>
<ul>
<li>O negócio pode ser: produto físico, serviço, produto digital, consultoria, conteúdo, evento — SEM restrições de formato</li>
<li>Obrigatório: CNPJ não é necessário, mas tudo deve ser documentado como se fosse (DRE, fluxo de caixa, métricas)</li>
<li>Papéis claros: Hacker, Hipster, Hustler — quem faz o quê e por quê</li>
<li>Canvas completo + Golden Circle + Projeção de 12 meses (3 cenários) + Valuation estimado</li>
<li>Pelo menos 1 cliente real que pagou ou se comprometeu formalmente</li>
<li>Dashboard de métricas reais: CAC, conversão, NPS (mesmo que com poucos dados)</li>
<li>Na Feira: pitch de investidor (7 min) + demo ao vivo + métricas reais no painel + produto/serviço demonstrável</li>
</ul>
<p><b>Material do stand:</b> Produto/serviço real + dashboard de métricas + Canvas + pitch deck + depoimento de cliente real</p>
<p><b>Bônus competitivo:</b> Os melhores projetos podem ser inscritos no SEBRAE Desafio, FEBRACE, ou mostras científicas regionais.</p>
</div>

<div style="border-left:3px solid var(--grade-accent);padding-left:1rem;margin:1.5rem 0">
<h3 style="color:var(--grade-accent)">Opção B — "Fundo de Investimento Estudantil"</h3>
<p><b>Proposta:</b> Criar e gerenciar um fundo de investimento simulado com R$100.000 fictícios durante 6 semanas, tomando decisões baseadas em análise real de mercado. Ao final, apresentar: estratégia, composição da carteira, rendimento alcançado e lições aprendidas.</p>
<p><b>Objetivo:</b> Aplicar todos os conceitos financeiros (investimentos, perfil, carteira, diversificação, métricas, risco vs retorno) em simulação realista, desenvolvendo pensamento analítico e tomada de decisão sob incerteza.</p>
<p><b>Sugestões de desenvolvimento:</b></p>
<ul>
<li>Definir: nome do fundo, tese de investimento (ex: "Fundo focado em tecnologia brasileira"), perfil de risco</li>
<li>Distribuir os R$100K entre pelo menos 5 tipos de ativos (ações, Tesouro, CDB, cripto, FIIs)</li>
<li>Acompanhar semanalmente os preços reais (via sites de finanças) e registrar rentabilidade</li>
<li>A cada semana, decidir: manter, comprar mais ou vender? Documentar CADA decisão e o porquê</li>
<li>Calcular: rendimento total, comparação com CDI, Ibovespa e poupança (benchmarks)</li>
<li>Na Feira: dashboard visual com evolução da carteira + gráficos + análise de decisões + ranking entre os fundos da turma</li>
</ul>
<p><b>Material do stand:</b> Dashboard financeiro em tela + gráficos de rendimento + composição da carteira + diário de decisões + comparação com benchmarks</p>
</div>

<div style="border-left:3px solid var(--grade-accent);padding-left:1rem;margin:1.5rem 0">
<h3 style="color:var(--grade-accent)">Opção C — "Incubadora Social: Negócio de Impacto para Limoeiro"</h3>
<p><b>Proposta:</b> Criar um negócio de impacto social que resolva simultaneamente um problema social/ambiental E seja financeiramente viável. O projeto deve provar que é possível gerar lucro E impacto positivo — refutando a falsa dicotomia "ou lucro ou propósito".</p>
<p><b>Objetivo:</b> Integrar empreendedorismo, finanças e ESG (Environmental, Social, Governance) em uma proposta que demonstre maturidade de pensamento e compromisso com a comunidade.</p>
<p><b>Sugestões de desenvolvimento:</b></p>
<ul>
<li>Identificar um problema social/ambiental real e mensurável de Limoeiro (com dados)</li>
<li>Pesquisar negócios de impacto que já funcionam no Brasil (Banco Pérola, Solar Ear, Cataki, Instituto Chapada)</li>
<li>Modelo financeiro detalhado: como o impacto se paga? Quem financia? É sustentável sem doação?</li>
<li>Métricas de impacto: quantas pessoas beneficia? Quanto CO2 evita? Quantos empregos gera?</li>
<li>Conectar a pelo menos 2 ODS (Objetivos de Desenvolvimento Sustentável da ONU)</li>
<li>Na Feira: demonstração do impacto com dados reais + modelo financeiro + depoimentos de beneficiados</li>
</ul>
<p><b>Material do stand:</b> Protótipo/demonstração + infográfico de impacto + modelo financeiro + mapa dos ODS conectados + depoimentos</p>
</div>
</div>`,
            exercise: `<div class="space-y-3"><h3>📋 Orientações Gerais — 1º Semestre</h3>
              <p><b>Grupos:</b> Até 4 integrantes. Cada membro deve ter um papel claro (líder, pesquisador, designer, apresentador — papéis podem acumular).</p>
              <p><b>Duração:</b> 4-6 semanas de desenvolvimento, integrado às aulas dos módulos 1 (Negócios) e 2 (Educação Financeira).</p>
              <p><b>Entrega:</b> Apresentação na Feira/Mostra aberta a famílias e comunidade. Cada grupo terá um stand com materiais visuais (cartaz, protótipo, tela) + apresentação oral de 5 minutos.</p>
              <p><b>Avaliação:</b> Criatividade (25%), Profundidade de pesquisa (25%), Qualidade da apresentação (25%), Trabalho em equipe (25%).</p>
              <p><b>Inspiração pedagógica:</b> Baseado na metodologia de projetos da Escola Lumiar e no conceito de aprendizagem por investigação — os estudantes são protagonistas, o professor é tutor/facilitador.</p></div>`,
            homework: `<div class="space-y-2"><p><b>Cronograma sugerido:</b></p>
              <p>📅 <b>Semana 1-2:</b> Escolha do projeto + pesquisa inicial + divisão de papéis</p>
              <p>📅 <b>Semana 3:</b> Desenvolvimento (pesquisa de campo, entrevistas, coleta de dados)</p>

// Keyword matching: map lesson title keywords to illustration keys
function getLessonIllust(title, moduleIcon) {
  const t = title.toLowerCase();
  // Financial
  if(t.includes('mindset')||t.includes('autoconhec')) return topicIllust.piggybank;
  if(t.includes('consumo')||t.includes('consumir')||t.includes('desejo')||t.includes('necessidade')) return topicIllust.wallet;
  if(t.includes('poupar')||t.includes('poupan')||t.includes('cofr')) return topicIllust.piggybank;
  if(t.includes('investir')||t.includes('investimento')||t.includes('carteira')) return topicIllust.invest;
  if(t.includes('equilíbrio')||t.includes('break')||t.includes('ponto de equil')) return topicIllust.scale;
  if(t.includes('cripto')||t.includes('bitcoin')||t.includes('blockchain')||t.includes('nft')) return topicIllust.bitcoin;
  if(t.includes('fintech')) return topicIllust.calculator;
  if(t.includes('orçamento')||t.includes('planej')||t.includes('gestão financ')) return topicIllust.chart;
  if(t.includes('rentab')||t.includes('juros')||t.includes('parcela')) return topicIllust.chart;
  if(t.includes('captação')||t.includes('métrica')||t.includes('atrair')) return topicIllust.target;
  if(t.includes('meta')||t.includes('metas')) return topicIllust.target;
  // Innovation
  if(t.includes('ia ')||t.includes('inteligência artificial')||t.includes('machine')||t.includes('dominar')) return topicIllust.robot;
  if(t.includes('iot')||t.includes('internet das coisas')||t.includes('coisas')) return topicIllust.iot;
  if(t.includes('realidade')||t.includes('metaverso')||t.includes('virtual')) return topicIllust.vr;
  if(t.includes('blockchain')||t.includes('contrato')||t.includes('web3')) return topicIllust.blockchain;
  if(t.includes('biotec')||t.includes('nano')||t.includes('dna')||t.includes('genét')) return topicIllust.dna;
  if(t.includes('fabricação')||t.includes('impressão 3d')||t.includes('impressora')||t.includes('prototip')) return topicIllust.printer3d;
  if(t.includes('criativ')||t.includes('bloqueio')||t.includes('inovaç')||t.includes('cultura da inov')||t.includes('cultura de inov')) return topicIllust.brain;
  if(t.includes('design think')||t.includes('design sprint')||t.includes('scamper')||t.includes('combin')) return topicIllust.gear;
  if(t.includes('brainstorm')||t.includes('problema')||t.includes('solucion')) return topicIllust.brain;
  if(t.includes('validando')||t.includes('pesquisa final')) return topicIllust.target;
  if(t.includes('tecnolog')||t.includes('exponenc')) return topicIllust.gear;
  if(t.includes('falar em público')||t.includes('pitch')||t.includes('apresent')||t.includes('oratória')) return topicIllust.presentation;
  // People & Communication
  if(t.includes('ux')||t.includes('ui')||t.includes('usabil')||t.includes('interface')||t.includes('wireframe')) return topicIllust.ux;
  if(t.includes('customer')||t.includes('jornada do usu')||t.includes('nps')||t.includes('churn')) return topicIllust.feedback;
  if(t.includes('líder')||t.includes('lider')||t.includes('autolider')) return topicIllust.leader;
  if(t.includes('equipe')||t.includes('trabalho em')||t.includes('clima')||t.includes('conflito')) return topicIllust.team;
  if(t.includes('marketing')||t.includes('branding')||t.includes('venda')||t.includes('atendimento')) return topicIllust.megaphone;
  if(t.includes('feedback')||t.includes('rapport')||t.includes('escuta')) return topicIllust.feedback;
  if(t.includes('comunica')||t.includes('estilo')||t.includes('interpessoal')||t.includes('intrapessoal')||t.includes('técnica')) return topicIllust.handshake;
  if(t.includes('expressão')||t.includes('desinib')||t.includes('verbal')) return topicIllust.megaphone;
  if(t.includes('research')) return topicIllust.ux;
  // Business fallback
  if(t.includes('startup')||t.includes('empreend')||t.includes('canvas')||t.includes('negócio')) return topicIllust.target;
  if(t.includes('mvp')||t.includes('modelo')) return topicIllust.prototype;
  // Default: use module icon
  return getModuleIllust(moduleIcon);
}

function getModuleIllust(icon) {
  return moduleIllust[icon] || moduleIllust["lightbulb"];
}

let state = { grade:"6ano", moduleId:null, lessonId:null };

// =======================================================================
// RENDER
// =======================================================================
function init(){
  renderGradeTabs();
  setGrade("6ano");
}

function renderGradeTabs(){
  const c = document.getElementById('gradeTabs');
  c.innerHTML = Object.entries(gradeLabels).map(([k,v])=>
    `<button class="grade-tab${state.grade===k?' active':''}" onclick="setGrade('${k}')">${v}</button>`
  ).join('');
}

function setGrade(g){
  state.grade = g;
  const d = DATA[g];
  state.moduleId = d.modules[0].id;
  state.lessonId = d.modules[0].lessons[0].id;
  const isLight = document.body.classList.contains('light');
  document.body.className = 'theme-'+gradeThemes[g];
  if(isLight) document.body.classList.add('light');
  renderGradeTabs();
  renderSidebar();
  renderMain();
}

function setModule(mid){
  const d = DATA[state.grade];
  const m = d.modules.find(x=>x.id===mid);
  state.moduleId = mid;
  state.lessonId = m.lessons[0].id;
  renderSidebar();
  renderMain();
}

function setLesson(mid, lid){
  state.moduleId = mid;
  state.lessonId = lid;
  renderSidebar();
  renderMain();
  closeSidebar();
}

function renderSidebar(){
  const d = DATA[state.grade];
  let html = `<div style="padding:.3rem .8rem .8rem;margin-bottom:.8rem;border-bottom:1px solid rgba(255,255,255,.04)">
    <div style="font-weight:700;font-size:.9rem;margin-bottom:.15rem">${gradeLabels[state.grade]}</div>
    <div style="font-size:.78rem;color:var(--text-muted)">${d.title}</div>
  </div>`;
  d.modules.forEach(m=>{
    const isActive = state.moduleId===m.id;
    const modClass = 'mod-'+m.color;
    html += `<div class="module-section ${modClass}">
      <div class="module-header${isActive?' active':''}" onclick="setModule('${m.id}')">
        <span class="module-icon">${moduleIcons[m.icon]||'📦'}</span>
        <span>${m.name}</span>
        <span style="margin-left:auto;font-size:.7rem;opacity:.5">${m.lessons.length}</span>
      </div>
      <div class="module-lessons${isActive?' open':''}">`;
    m.lessons.forEach(l=>{
      const lActive = isActive && state.lessonId===l.id;
      const label = l.isQuiz ? '★' : l.id;
      html += `<div class="lesson-item${lActive?' active':''}" onclick="setLesson('${m.id}',${l.id})">
        <span class="lesson-num">${label}</span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.title}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('sidebar').innerHTML = html;
}

function renderMain(){
  const d = DATA[state.grade];
  const m = d.modules.find(x=>x.id===state.moduleId);
  const l = m.lessons.find(x=>x.id===state.lessonId);
  
  let html = `<div class="grade-banner">
    <h1>${moduleIcons[m.icon]||''} ${m.name} — ${gradeLabels[state.grade]}</h1>
    <p>${d.title} · Aula ${l.id} de ${m.lessons.length}</p>
    <div class="banner-illust" style="color:var(--grade-accent)">${getModuleIllust(m.icon)}</div>
  </div>`;
  
  if(l.isQuiz){
    html += renderQuiz(m);
  } else {
    html += `<div class="content-card">
      <div class="lesson-illust" style="color:var(--grade-accent)">${getLessonIllust(l.title, m.icon)}</div>
      <h2>${l.title}</h2>
      <span class="page-ref">📖 Página ${l.page}</span>
      <div class="content-tabs">
        <button class="content-tab active" onclick="switchTab(this,'teoria')">📚 Teoria</button>
        <button class="content-tab" onclick="switchTab(this,'exercicio')">✏️ Exercício</button>
        <button class="content-tab" onclick="switchTab(this,'casa')">🏠 Para Casa</button>
      </div>
      <div class="tab-panel active" id="tab-teoria">${l.content||'<p>Conteúdo em desenvolvimento.</p>'}</div>
      <div class="tab-panel" id="tab-exercicio">${l.exercise||'<p>Atividade em desenvolvimento.</p>'}</div>
      <div class="tab-panel" id="tab-casa">${l.homework||'<p>Tarefa em desenvolvimento.</p>'}</div>
    </div>`;
  }
  
  
  // Question box (only for non-quiz lessons)
  if(!l.isQuiz){
    const ctx = `${gradeLabels[state.grade]} · ${m.name} · Aula ${l.id}: ${l.title}`;
    html += `<div class="question-box">
      <h3>💬 Perguntar ao Professor</h3>
      <div class="qb-form" id="qbForm">
        <span class="qb-context">📍 ${ctx}</span>
        <input type="text" id="qbName" placeholder="Seu nome completo" maxlength="60">
        <textarea id="qbText" placeholder="Escreva sua dúvida aqui... O professor receberá sua pergunta e responderá em breve." maxlength="500"></textarea>
        <div style="display:flex;align-items:center;gap:1rem">
          <span style="font-size:.72rem;color:var(--text-muted)" id="qbCount">0/500</span>
          <button class="qb-send" id="qbSend" onclick="submitQuestion()" disabled>Enviar pergunta</button>
        </div>
      </div>
      <div class="qb-success" id="qbSuccess">✅ Pergunta enviada com sucesso! O professor será notificado.</div>
    </div>`;
  }

  html += `<div class="footer">2025 · Colégio Santa Mônica — Limoeiro/PE · Programa Empreendedores Exponenciais</div>`;
  document.getElementById('main').innerHTML = html;
}

function renderQuiz(m){
  if(!m.quiz || !m.quiz.length){
    return `<div class="content-card"><div class="empty-state">
      <div class="icon">🧪</div>
      <p>Quiz em desenvolvimento para este módulo.</p>
    </div></div>`;
  }
  let html = '';
  m.quiz.forEach((q,qi)=>{
    html += `<div class="quiz-card">
      <h3>${qi+1}. ${q.question}</h3>`;
    q.options.forEach((o,oi)=>{
      html += `<button class="quiz-option" onclick="checkAnswer(this,${o.correct},${qi})">${o.text}</button>`;
    });
    html += `<div class="quiz-hint" id="hint-${qi}">💡 ${q.hint}</div></div>`;
  });
  return html;
}

function checkAnswer(btn, correct, qi){
  const card = btn.closest('.quiz-card');
  card.querySelectorAll('.quiz-option').forEach(b=>{b.disabled=true;b.style.pointerEvents='none'});
  btn.classList.add(correct?'correct':'wrong');
  if(!correct) document.getElementById('hint-'+qi).style.display='block';
}

function switchTab(btn, tab){
  btn.closest('.content-card').querySelectorAll('.content-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.content-card').querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

init();

// =====================================================================
// QUESTION SYSTEM
// =====================================================================
function getQuestions(){
  try { return JSON.parse(localStorage.getItem('csm_questions')||'[]'); }
  catch(e){ return []; }
}
function saveQuestions(qs){
  try { localStorage.setItem('csm_questions', JSON.stringify(qs)); } catch(e){}
}

// Wire up textarea counter and send button
document.addEventListener('input', function(e){
  if(e.target.id==='qbText'){
    const c = e.target.value.length;
    const counter = document.getElementById('qbCount');
    if(counter) counter.textContent = c+'/500';
    enableSend();
  }
  if(e.target.id==='qbName') enableSend();
});

function enableSend(){
  const name = document.getElementById('qbName');
  const text = document.getElementById('qbText');
  const btn = document.getElementById('qbSend');
  if(name && text && btn){
    btn.disabled = !(name.value.trim().length>=2 && text.value.trim().length>=5);
  }
}

function submitQuestion(){
  const name = document.getElementById('qbName').value.trim();
  const text = document.getElementById('qbText').value.trim();
  if(!name || !text) return;
  
  const d = DATA[state.grade];
  const m = d.modules.find(x=>x.id===state.moduleId);
  const l = m.lessons.find(x=>x.id===state.lessonId);
  
  const q = {
    id: Date.now(),
    name: name,
    text: text,
    grade: state.grade,
    gradeLabel: gradeLabels[state.grade],
    module: m.name,
    moduleIcon: m.icon,
    lessonId: l.id,
    lessonTitle: l.title,
    date: new Date().toLocaleString('pt-BR'),
    status: 'pending'
  };
  
  const qs = getQuestions();
  qs.unshift(q);
  saveQuestions(qs);
  
  // Show success
  document.getElementById('qbForm').style.display='none';
  const suc = document.getElementById('qbSuccess');
  suc.classList.add('show');
  
  // Reset after 4s
  setTimeout(()=>{
    document.getElementById('qbForm').style.display='flex';
    suc.classList.remove('show');
    document.getElementById('qbName').value='';
    document.getElementById('qbText').value='';
    document.getElementById('qbCount').textContent='0/500';
    document.getElementById('qbSend').disabled=true;
  }, 4000);
  
  updateTeacherBadge();
}

function updateTeacherBadge(){
  const btn = document.querySelector('.teacher-btn');
  const qs = getQuestions();
  const pending = qs.filter(q=>q.status==='pending').length;
  btn.textContent = pending > 0 ? `📋 Professor (${pending})` : '📋 Professor';
}

// =====================================================================
// TEACHER PANEL
// =====================================================================
let currentFilter = 'all';
let currentSearch = '';

function toggleTeacherPanel(){
  const p = document.getElementById('teacherPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open')) renderTeacherPanel();
}

function renderTeacherPanel(){
  const qs = getQuestions();
  
  // Stats
  const total = qs.length;
  const pending = qs.filter(q=>q.status==='pending').length;
  const done = qs.filter(q=>q.status==='done').length;
  const today = qs.filter(q=>q.date && q.date.includes(new Date().toLocaleDateString('pt-BR'))).length;
  
  document.getElementById('tpStats').innerHTML = `
    <div class="tp-stat"><div class="num">${total}</div><div class="label">Total</div></div>
    <div class="tp-stat"><div class="num" style="color:#fbbf24">${pending}</div><div class="label">Pendentes</div></div>
    <div class="tp-stat"><div class="num" style="color:#4ade80">${done}</div><div class="label">Respondidas</div></div>
    <div class="tp-stat"><div class="num">${today}</div><div class="label">Hoje</div></div>
  `;
  
  renderQuestionsList();
}

function renderQuestionsList(){
  let qs = getQuestions();
  
  // Apply filter
  if(currentFilter==='pending') qs = qs.filter(q=>q.status==='pending');
  else if(currentFilter==='done') qs = qs.filter(q=>q.status==='done');
  else if(currentFilter!=='all') qs = qs.filter(q=>q.grade===currentFilter);
  
  // Apply search
  if(currentSearch){
    const s = currentSearch.toLowerCase();
    qs = qs.filter(q=> q.name.toLowerCase().includes(s) || q.text.toLowerCase().includes(s));
  }
  
  const container = document.getElementById('tpQuestions');
  
  if(qs.length===0){
    container.innerHTML = `<div class="tp-empty">
      <div class="icon">📭</div>
      <p>${getQuestions().length===0 ? 'Nenhuma pergunta recebida ainda.' : 'Nenhuma pergunta encontrada com esse filtro.'}</p>
    </div>`;
    return;
  }
  
  const gradeClass = {'6ano':'b-6','7ano':'b-7','8ano':'b-8','9ano':'b-9'};
  
  container.innerHTML = qs.map(q=>`
    <div class="tp-question" data-id="${q.id}">
      <div class="tp-q-header">
        <span class="tp-q-name">👤 ${q.name}</span>
        <span class="tp-q-badge ${gradeClass[q.grade]||''}">${q.gradeLabel}</span>
        <span class="tp-q-module">${q.module}</span>
        <span class="tp-q-date">${q.date}</span>
      </div>
      <div class="tp-q-text">${q.text}</div>
      <div class="tp-q-lesson">📖 Aula ${q.lessonId}: ${q.lessonTitle}</div>
      <div class="tp-actions">
        <button class="tp-action-btn ${q.status==='done'?'done':''}" onclick="toggleStatus(${q.id})">
          ${q.status==='done'?'✅ Respondida':'⏳ Marcar como respondida'}
        </button>
        <button class="tp-action-btn" onclick="deleteQuestion(${q.id})">🗑️ Excluir</button>
      </div>
    </div>
  `).join('');
}

function filterQuestions(filter, btn){
  currentFilter = filter;
  document.querySelectorAll('.tp-filter').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderQuestionsList();
}

function searchQuestions(val){
  currentSearch = val;
  renderQuestionsList();
}

function toggleStatus(id){
  const qs = getQuestions();
  const q = qs.find(x=>x.id===id);
  if(q){
    q.status = q.status==='done' ? 'pending' : 'done';
    saveQuestions(qs);
    renderTeacherPanel();
    updateTeacherBadge();
  }
}

function deleteQuestion(id){
  if(!confirm('Excluir esta pergunta?')) return;
  const qs = getQuestions().filter(x=>x.id!==id);
  saveQuestions(qs);
  renderTeacherPanel();
  updateTeacherBadge();
}

function clearAllQuestions(){
  if(!confirm('Excluir TODAS as perguntas? Esta ação não pode ser desfeita.')) return;
  saveQuestions([]);
  renderTeacherPanel();
  updateTeacherBadge();
}

function exportQuestions(){
  const qs = getQuestions();
  if(!qs.length){ alert('Nenhuma pergunta para exportar.'); return; }
  
  const header = 'Nome,Série,Módulo,Aula,Pergunta,Data,Status\n';
  const rows = qs.map(q=>{
    const clean = (s)=>'"'+(s||'').replace(/"/g,'""')+'"';
    return [clean(q.name),clean(q.gradeLabel),clean(q.module),
            clean('Aula '+q.lessonId+': '+q.lessonTitle),
            clean(q.text),clean(q.date),clean(q.status==='done'?'Respondida':'Pendente')].join(',');
  }).join('\n');
  
  const blob = new Blob(['\ufeff'+header+rows], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'perguntas_csm_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function toggleLightMode(){
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';
  try { localStorage.setItem('csm_light', isLight ? '1' : '0'); } catch(e){}
}

(function(){
  try {
    if(localStorage.getItem('csm_light')==='1'){
      document.body.classList.add('light');
      const btn = document.getElementById('themeBtn');
      if(btn) btn.textContent = '🌙';
    }
  } catch(e){}
})();

// Init badge on load
updateTeacherBadge();
