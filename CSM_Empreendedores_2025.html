            title: "Diferenciação e proposta de valor", 
            page: 14, 
            content: `<div class="space-y-4">
              <h3 class="font-bold text-lg">Teoria Aprofundada</h3>
              <p><b>O que é Diferenciação?</b> É o conjunto de características que torna seu produto/serviço único e preferível em relação aos concorrentes. Em mercados competitivos, não basta ser bom - é preciso ser DIFERENTE de forma que importe para o cliente.</p>
              
              <p><b>Tipos de Diferenciação:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>Por Produto:</b> Características únicas, qualidade superior, design inovador (ex: iPhone)</li>
                <li><b>Por Serviço:</b> Atendimento excepcional, entrega rápida, garantia estendida (ex: Zappos)</li>
                <li><b>Por Preço:</b> Mais barato sem perder qualidade, ou premium justificado (ex: Xiaomi vs. Apple)</li>
                <li><b>Por Experiência:</b> Como o cliente se sente ao usar (ex: Disney, Starbucks)</li>
                <li><b>Por Conveniência:</b> Mais fácil, mais rápido, mais acessível (ex: Netflix, iFood)</li>
                <li><b>Por Valores:</b> Sustentabilidade, causas sociais, origem local (ex: Natura, Patagonia)</li>
              </ul>
              
              <p><b>Proposta de Valor Clara:</b> Deve comunicar em 1-2 frases: O QUE você oferece + PARA QUEM + QUE BENEFÍCIO traz + O QUE tem de DIFERENTE. Exemplo Nubank: "Banco digital SEM tarifas, COM atendimento humanizado, PARA quem está cansado da burocracia bancária".</p>
              
              <p><b>Oceano Azul vs. Oceano Vermelho:</b> Oceano Vermelho = mercado saturado com muita concorrência (guerra de preços, lucros apertados). Oceano Azul = espaço de mercado inexplorado, sem concorrência direta (criado através de inovação e diferenciação radical).</p>
              
              <h3 class="font-bold text-lg mt-4">Caso Prático Real</h3>
              <p><b>Cirque du Soleil (Oceano Azul Clássico):</b> Circos tradicionais estavam em decadência (Oceano Vermelho): competiam por preço, usavam animais (polêmico), e atraíam apenas crianças. Cirque du Soleil ELIMINOU animais e palhaços, ADICIONOU narrativa artística e música ao vivo, AUMENTOU sofisticação e preço, e CRIOU um oceano azul atraindo adultos dispostos a pagar mais por entretenimento artístico. Diferenciaram-se completamente.</p>
              
              <p><b>Yellow/Grin (Patinetes Elétricos):</b> Diferenciação por CONVENIÊNCIA (não precisa devolver onde pegou) + PREÇO ACESSÍVEL + SUSTENTABILIDADE (menos carros). Criaram categoria nova no Brasil combinando micromobilidade + tecnologia + modelo pay-per-use.</p>
              
              <p><b>Havaianas:</b> Diferenciação que salvou a marca: de "chinelo barato" para "ícone de moda brasileiro". ADICIONARAM: cores variadas, design moderno, marketing aspiracional. MANTIVERAM: conforto, durabilidade, preço acessível. Conseguiram cobrar mais por produto similar através do reposicionamento.</p>
              
              <p><b>Outback vs. Churrascarias Tradicionais:</b> Diferenciação por EXPERIÊNCIA: pãozinho quentinho + manteiga temperada (exclusivo), ambiente temático australiano, porções gigantes para compartilhar, atendimento descontraído. Não é apenas comida, é entretenimento.</p>
            </div>`,

            page: 16, 
            content: `<div class="space-y-4">
              <h3 class="font-bold text-lg">Teoria Aprofundada</h3>
              <p><b>O que é o Business Model Canvas?</b> É uma ferramenta visual criada por Alexander Osterwalder que organiza e representa os 9 componentes fundamentais de um modelo de negócio em um único quadro. Permite que empreendedores planejem, testem e ajustem suas ideias de forma clara e estruturada.</p>
              
              <p><b>Os 9 Blocos do Canvas:</b></p>
              
              <p><b>1. Segmentos de Clientes:</b> Quem são seus clientes? Que grupos de pessoas/empresas você atende? (ex: adolescentes, PMEs, idosos, atletas). Dica: Seja específico! "Jovens" é vago. "Universitários que moram em repúblicas" é segmento claro.</p>
              
              <p><b>2. Proposta de Valor:</b> Que valor você entrega para cada segmento? Que problema resolve? Que necessidade atende? (revisão do módulo anterior)</p>
              
              <p><b>3. Canais:</b> Como seu produto/serviço CHEGA até o cliente? (loja física, site, app, representantes, marketplaces, franquias). Inclui: comunicação, venda, entrega e pós-venda.</p>
              
              <p><b>4. Relacionamento com Clientes:</b> Que tipo de relação você mantém? (atendimento pessoal, self-service, comunidade, automação). Como conquista, mantém e expande clientes?</p>
              
              <p><b>5. Fontes de Receita:</b> Como o negócio GANHA DINHEIRO? (venda única, assinatura, aluguel, taxa, publicidade, licenciamento). Quanto os clientes pagam? Como pagam?</p>
              
              <p><b>6. Recursos Principais:</b> Que RECURSOS são essenciais? (físicos: equipamentos, lojas; intelectuais: marca, patentes; humanos: equipe especializada; financeiros: capital, linha de crédito)</p>
              
              <p><b>7. Atividades-Chave:</b> Que AÇÕES são indispensáveis para o modelo funcionar? (produção, resolução de problemas, gestão de plataforma/rede)</p>
              
              <p><b>8. Parcerias Principais:</b> Quem são seus parceiros e fornecedores estratégicos? Por que a parceria é necessária? (economia de escala, redução de risco, aquisição de recursos)</p>
              
              <p><b>9. Estrutura de Custos:</b> Quais são os CUSTOS mais importantes? (fixos: aluguel, salários; variáveis: matéria-prima, comissões). O modelo é focado em custo baixo ou em criação de valor premium?</p>
              
              <p><b>Como usar o Canvas:</b> Comece com Clientes e Proposta de Valor (lado direito = visão do cliente). Depois preencha a infraestrutura (lado esquerdo = como você entrega). Finalize com viabilidade financeira (parte inferior = receitas e custos).</p>
              
              <h3 class="font-bold text-lg mt-4">Caso Prático Real</h3>
              <p><b>Canvas do Nubank (simplificado):</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>Clientes:</b> Millennials/Gen Z frustrados com bancos tradicionais, classe C/D sem acesso a crédito</li>
                <li><b>Proposta de Valor:</b> Banco digital sem tarifas, simples, com atendimento humanizado</li>
                <li><b>Canais:</b> App mobile, redes sociais, indicação (boca a boca digital)</li>
                <li><b>Relacionamento:</b> Atendimento 24/7 por chat humanizado, comunidade engajada</li>
                <li><b>Receitas:</b> Juros de crédito, interchange (taxas de cada compra), empréstimos</li>
                <li><b>Recursos:</b> Tecnologia/plataforma robusta, marca forte, licença bancária</li>
                <li><b>Atividades-Chave:</b> Desenvolvimento de software, análise de crédito via IA, gestão de risco</li>
                <li><b>Parcerias:</b> Mastercard (bandeira), AWS (infraestrutura), seguradoras</li>
                <li><b>Custos:</b> Tecnologia/servidores, equipe tech, marketing de aquisição</li>
              </ul>
              
              <p><b>Canvas do Uber (simplificado):</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>Clientes:</b> Passageiros urbanos + Motoristas autônomos</li>
                <li><b>Proposta de Valor:</b> Para passageiros: transporte rápido e confiável. Para motoristas: renda extra flexível</li>
                <li><b>Canais:</b> App mobile (iOS/Android)</li>
                <li><b>Relacionamento:</b> Automatizado via app, sistema de avaliações mútuas</li>
                <li><b>Receitas:</b> Comissão de 20-25% em cada corrida</li>
                <li><b>Recursos:</b> Plataforma tecnológica, algoritmo de matching, marca global</li>
                <li><b>Atividades-Chave:</b> Gestão de plataforma, recrutamento de motoristas, suporte</li>
                <li><b>Parcerias:</b> Google Maps, sistemas de pagamento, seguradoras</li>
                <li><b>Custos:</b> Desenvolvimento tech, marketing agressivo, incentivos a motoristas</li>
              </ul>
            </div>`,
            exercise: `<div class="space-y-3">
              <h3 class="font-bold">Proposta de Trabalho em Sala:</h3>
              <p><b>Atividade 1: Desconstruindo Canvas de Empresas Famosas</b><br/>
              Divida a turma em grupos. Cada grupo recebe uma empresa conhecida (Netflix, iFood, Natura, Magazine Luiza, Spotify). Tarefa: pesquisar e preencher o Canvas completo dessa empresa. Depois, cada grupo apresenta. Discussão: Que bloco é o mais crítico para aquela empresa? Se você mudasse um bloco, como impactaria os outros?</p>
              
              <p><b>Atividade 2: Canvas do Projeto de Negócio</b><br/>
              Cada grupo trabalha na ideia de negócio que vem desenvolvendo. Desenhem o Canvas grande (pode ser em papel kraft ou cartolina). Preencham todos os 9 blocos de forma detalhada. Use post-its coloridos para poder mover ideias. Apresentem para a turma. Os colegas podem fazer perguntas desafiadoras sobre cada bloco.</p>
              
              <p><b>Atividade 3: Jogo da Transformação</b><br/>
              Apresente um Canvas de um negócio tradicional (ex: livraria física). Desafio: transformem esse modelo em um modelo digital/inovador. O que muda em cada bloco? Exemplo: Livraria física → Clube de assinatura de livros. Como cada um dos 9 blocos seria diferente?</p>
              
              <p><b>Atividade 4: Teste de Coerência</b><br/>
              Apresente 3 Canvas "quebrados" (com blocos incoerentes entre si). Exemplo: Proposta de valor premium + estrutura de custos baixíssima + canais de baixo custo = não faz sentido! Os grupos devem identificar as incoerências e propor correções para tornar o modelo viável.</p>
            </div>`,
            homework: `<div class="space-y-2">
              <p><b>Missão para Casa:</b></p>
              <p>1. Escolha um negócio local da sua cidade (pode ser pequeno: padaria, salão, mercadinho). Tente mapear o Canvas desse negócio através de observação e, se possível, entrevistando o dono. Que blocos você conseguiu identificar? Teve dificuldade em algum?</p>
              <p>2. Pegue sua ideia de negócio pessoal (ou uma que gostaria de criar) e preencha um Canvas completo. Seja o mais detalhado possível. Depois, identifique: Qual é o bloco mais forte? Qual é o mais fraco que precisa de mais trabalho?</p>
              <p>3. Pesquise: Encontre um caso de negócio que MUDOU seu modelo (pivotou) e mostre como o Canvas era ANTES e como ficou DEPOIS. Exemplos: YouTube (começou como site de namoro), Twitter (era plataforma de podcasts), Instagram (era app de check-in).</p>
              <p>4. Desafio: Desenhe o Canvas ideal para um problema real que você identificou na sua comunidade ou escola. Seja criativo e viável ao mesmo tempo!</p>
            </div>`

{ id: 1, title: "Orçamento pessoal", page: 26,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>O que é orçamento pessoal?</b> É uma ferramenta para o autoconhecimento financeiro. Desenvolver o hábito de organizar receitas e custos é fundamental para se ter uma vida financeira inteligente, por meio de hábitos de consumo saudáveis.</p>
    <p><b>Como fazer um orçamento pessoal?</b> Existem etapas que devem ser seguidas:</p>
    <ul>
      <li><b>1. Colocar suas fontes de renda:</b> O dinheiro que entra para você — salário, aluguel, venda de produtos etc.</li>
      <li><b>2. Identificar seus gastos e despesas:</b> Transporte, alimentação, lazer etc.</li>
      <li><b>3. Fazer as contas e analisar:</b> Em uma planilha, coloque todos os seus gastos, some e observe quanto da sua renda está sendo gasta em cada categoria (alimentação, transporte, lazer, energia). Identifique possíveis áreas onde podemos economizar.</li>
    </ul>
    <p><b>Atividade:</b> Análise do orçamento da Família Belo — os estudantes devem analisar um orçamento familiar, fazer os devidos cálculos, a fim de obter informações de como uma família se comporta perante os seus gastos.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Analise o orçamento da Família Belo (no livro do aluno). Calcule receitas, despesas, e saldo mensal. Responda: a família está no azul ou no vermelho? Que gastos poderiam ser reduzidos? Monte uma sugestão de orçamento melhor.</p>

  </div>` },
{ id: 2, title: "Tipos de investimentos I", page: 28,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Investir é aplicar dinheiro com a expectativa de retorno futuro.</b> Existem diversos tipos de investimento, cada um com características próprias de risco, retorno e prazo.</p>
    <p><b>Principais tipos de investimento:</b></p>
    <ul>
      <li><b>Poupança:</b> O mais popular do Brasil. Baixo risco, baixo retorno. Ideal para quem está começando</li>
      <li><b>Tesouro Selic:</b> Título do governo federal. Maior estabilidade e segurança. Boa opção para reserva de emergência</li>
      <li><b>CDB (Certificado de Depósito Bancário):</b> Você "empresta" dinheiro ao banco e recebe juros. Retorno geralmente maior que a poupança</li>
      <li><b>Ações:</b> Comprar uma pequena parte de uma empresa. Alto risco, mas potencial de alto retorno</li>
      <li><b>Fundos de Investimento:</b> Um gestor profissional aplica o dinheiro de vários investidores em conjunto</li>
    </ul>
    <p><b>Importante:</b> Fatores que influenciam a escolha do investimento: tempo que se pretende deixar o dinheiro aplicado, quantia disponível, expectativa de rendimento e nível de risco que aceita correr.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> No livro do aluno, você encontra um plano de investimento com diferentes cenários. Escolha qual investimento é mais adequado para cada situação e justifique. Depois, compartilhe e compare com os colegas.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Pesquise sobre o Tesouro Selic: como funciona? Qual o rendimento atual? Por que é considerado seguro? Traga as informações para discutirmos na próxima aula.</p>
  </div>` },
{ id: 3, title: "Tipos de investimentos II", page: 30,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Investimentos da nova economia:</b> Com a evolução da tecnologia, novos tipos de investimento surgiram. Vamos conhecer três deles:</p>
    <ul>
      <li><b>Imóveis:</b> A compra de um imóvel, por mais que haja um gasto inicial, pode se tornar um investimento. O imóvel pode valorizar com o tempo, ou o dono pode alugá-lo e receber renda mensal</li>
      <li><b>Criptomoedas:</b> Ativos digitais que as pessoas compram esperando que o preço suba. Podem ser consideradas investimento, mas com alto risco e volatilidade</li>
      <li><b>NFT (Non-Fungible Token):</b> Em português, "token não fungível" — um certificado digital que representa objetos reais ou virtuais (obras de arte, itens de jogos, posts). Pode ser negociado na internet</li>
    </ul>
    <p><b>Quebrando paradigmas:</b> Não é necessário ter uma quantia altíssima de dinheiro para investir. Isso não é verdade! É possível investir com valores menores também. O segredo para um bom retorno é a diversificação da carteira.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Debate sobre os 3 tipos de investimento: imóveis, criptomoedas e NFT. Cada grupo defende um tipo. Qual tem mais risco? Qual tem mais potencial? Qual vocês escolheriam e por quê?</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Pesquise o valor atual do Bitcoin. Compare com o valor de 1 ano atrás. Subiu ou caiu? O que isso ensina sobre investimentos de alto risco?</p>
  </div>` },
{ id: 4, title: "Perfil de investidor", page: 32,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Cada pessoa tem um perfil de investidor diferente.</b> Conhecer o seu perfil ajuda a escolher os investimentos mais adequados para você.</p>
    <p><b>Os 3 perfis de investidor:</b></p>
    <ul>
      <li><b>Conservador:</b> Prefere segurança acima de tudo. Aceita retornos menores em troca de menor risco. Investe em poupança, Tesouro Selic, CDB. Perfil ideal para: reserva de emergência, objetivos de curto prazo</li>
      <li><b>Moderado:</b> Equilibra risco e retorno. Aceita um pouco mais de risco para buscar retornos melhores. Diversifica entre renda fixa e variável. Perfil ideal para: objetivos de médio prazo</li>
      <li><b>Arrojado (Agressivo):</b> Busca os maiores retornos possíveis. Aceita riscos elevados e volatilidade. Investe fortemente em ações, criptomoedas, startups. Perfil ideal para: longo prazo, quem tem reserva de emergência garantida</li>
    </ul>
    <p><b>Importante:</b> Não existe perfil certo ou errado — existe o perfil adequado para cada momento da vida e cada objetivo financeiro.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Questionário de perfil de investidor (no livro). Responda as perguntas e descubra seu perfil. Depois, analise cenários fictícios e recomende o perfil adequado para cada um.</p>
  </div>`,
  homework: `<div class="space-y-2">

{ id: 5, title: "Carteira de investimentos", page: 34,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>O que é uma carteira de investimentos?</b> É o conjunto de todos os investimentos que uma pessoa possui. A carteira representa a sua estratégia no mercado financeiro. O principal objetivo é garantir que seu saldo seja sempre positivo, mesmo se uma ou outra aplicação não apresente resultados favoráveis.</p>
    <p><b>Diversificação — a regra de ouro:</b> "Não coloque todos os ovos na mesma cesta." Se um investimento vai mal, os outros compensam. A diversificação é indicada especialmente para investimentos de médio e longo prazo.</p>
    <p><b>Como montar minha carteira?</b></p>
    <ul>
      <li>1. Identifique seus objetivos (curto, médio, longo prazo)</li>
      <li>2. Faça um levantamento das suas metas financeiras</li>
      <li>3. Separe os objetivos por prazo e quanto precisará</li>
      <li>4. Distribua entre diferentes tipos de investimento conforme seu perfil</li>
    </ul>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Analise uma carteira fictícia que tem renda variável com aportes em diversos tipos de negócios. Calcule o saldo total e a porcentagem em cada aporte. Depois, determine qual perfil de investidor possui essa carteira, com base nos conhecimentos das aulas anteriores.</p>
  </div>`,
  homework: `<div class="space-y-2">

  </div>` },
{ id: 6, title: "Empreender, uma mão na roda", page: 36,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Empreender é criar e gerenciar um negócio.</b> Nesta aula, os alunos serão capazes de compreender o que é empreender e os principais elementos envolvidos no processo de criar e gerenciar um negócio.</p>
    <p><b>Elementos essenciais do empreendedorismo:</b></p>
    <ul>
      <li><b>Ideia:</b> Identificar uma oportunidade ou problema a resolver</li>
      <li><b>Planejamento:</b> Estruturar como a ideia será executada</li>
      <li><b>Capital:</b> Recursos financeiros necessários para começar</li>
      <li><b>Execução:</b> Colocar o plano em prática</li>
      <li><b>Gestão:</b> Administrar o negócio no dia a dia</li>
    </ul>
    <p><b>A relação entre finanças pessoais e empreendedorismo:</b> Um empreendedor que não sabe cuidar das próprias finanças dificilmente conseguirá cuidar das finanças de um negócio. Tudo que aprendemos neste módulo se aplica diretamente!</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>

  homework: `<div class="space-y-2">

{ id: 7, title: "Juros e parcelas na vida pessoal e nos negócios", page: 38,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>O que são juros?</b> Juros são o "preço" do dinheiro ao longo do tempo. Quando você empresta dinheiro (investimento), recebe juros. Quando toma dinheiro emprestado (empréstimo, cartão de crédito), paga juros.</p>
    <p><b>Juros Simples vs. Juros Compostos:</b></p>
    <ul>
      <li><b>Juros Simples:</b> Calculados sempre sobre o valor inicial. Ex: R$1.000 a 10% ao ano = R$100/ano sempre</li>
      <li><b>Juros Compostos:</b> Calculados sobre o valor atualizado (juros sobre juros). Ex: R$1.000 a 10% → R$1.100 → R$1.210 → R$1.331. Crescimento exponencial!</li>
    </ul>
    <p><b>O perigo das parcelas:</b> Comprar parcelado parece mais barato, mas frequentemente embute juros. Um produto de R$1.000 em 12x de R$100 = R$1.200. Você pagou R$200 de juros! Sempre compare o preço à vista com o parcelado.</p>
    <p><b>A armadilha do cartão de crédito:</b> Os juros do rotativo do cartão no Brasil podem ultrapassar 400% ao ano. Um atraso de R$500 pode virar R$2.500 em um ano!</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Calcule cenários de juros simples e compostos. Compare: quanto rende R$1.000 em 5 anos a 10% com juros simples vs. compostos? Depois, analise ofertas reais de lojas: o preço parcelado é realmente "sem juros"?</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Pesquise a taxa de juros do cartão de crédito dos seus pais (geralmente está na fatura). Calcule: se atrasarem uma fatura de R$500, quanto pagariam de juros em 1 mês? E em 6 meses? Compartilhe a descoberta com a família.</p>
  </div>` },
{ id: 8, title: "Planejamento financeiro do empreendimento", page: 40,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Todo negócio precisa de um planejamento financeiro.</b> Sem ele, o empreendedor não sabe quanto precisa para começar, quanto vai gastar por mês, nem quando vai começar a lucrar.</p>
    <p><b>Elementos do planejamento financeiro empresarial:</b></p>
    <ul>
      <li><b>Investimento inicial:</b> Quanto precisa para começar (equipamentos, estoque, marketing)</li>
      <li><b>Custos fixos:</b> Gastos mensais que não mudam (aluguel, internet, salários)</li>
      <li><b>Custos variáveis:</b> Gastos que mudam conforme vendas (matéria-prima, embalagens)</li>
      <li><b>Projeção de receitas:</b> Quanto espera vender por mês (seja realista!)</li>
      <li><b>Ponto de equilíbrio:</b> Quando receitas = despesas (a partir daí, lucro!)</li>
      <li><b>Margem de lucro:</b> Quanto sobra depois de pagar todos os custos</li>
    </ul>
    <p><b>Consolidação do módulo:</b> Esta aula conecta tudo que aprendemos: orçamento, investimentos, perfil financeiro, juros — tudo se aplica ao planejar um negócio.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Monte o planejamento financeiro de um negócio fictício: uma barraquinha de açaí. Defina: investimento inicial, custos fixos e variáveis, preço de venda, projeção mensal. Calcule o ponto de equilíbrio. Em quantos meses o negócio se paga?</p>
  </div>`,

  </div>` },

{ id: 1, title: "O que é um problema?", page: 44,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Problema é uma situação que gera um desconforto e precisa ser resolvida.</b> Nunca paramos para pensar e definir alguns termos, porque eles nos acompanham no nosso dia a dia que às vezes não paramos para refletir.</p>
    <p><b>Problemas têm diversos níveis:</b> Alguns são mais complicados e outros mais simples de serem resolvidos. Entretanto, cada um sabe o peso do seu problema — nunca devemos menosprezar o problema dos outros.</p>
    <p><b>Problema simples vs. complexo:</b> Problemas simples podem ter soluções simples e não-criativas (computador travado → reiniciar). Já problemas complexos muitas vezes exigem soluções arrojadas e inovadoras.</p>
    <p><b>Resolução criativa:</b> É o processo mental para encontrar uma solução original e desconhecida para um problema de forma criativa e independente. O processo começa com uma definição precisa do problema a ser resolvido — esta é geralmente a maior dificuldade.</p>
    <p><b>Neste módulo:</b> As aulas são destinadas à construção do conceito, análise e aplicação dos temas: design sprint, design thinking, scamper, combinatividade, brainstorming e solução de problemas.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Liste 3 problemas: um simples, um médio e um complexo. Para cada um, proponha uma solução convencional e uma solução criativa. Compare com os colegas: as soluções criativas foram parecidas ou diferentes?</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Durante a semana, identifique 3 problemas do dia a dia e anote uma solução criativa para cada. Traga para compartilhar na próxima aula.</p>
  </div>` },
{ id: 2, title: "Brainstorming", page: 46,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Brainstorming significa "tempestade de ideias".</b> É uma técnica de grupo para gerar o máximo de ideias possível sobre um tema ou problema, sem julgamento inicial.</p>
    <p><b>Regras do brainstorming:</b></p>
    <ul>
      <li><b>Quantidade importa:</b> Quanto mais ideias, melhor. Não filtre!</li>
      <li><b>Sem julgamento:</b> Nenhuma ideia é "ruim" durante o brainstorming. Toda ideia é válida</li>
      <li><b>Construa sobre ideias alheias:</b> Use a ideia do colega como ponto de partida para novas ideias</li>
      <li><b>Ideias malucas são bem-vindas:</b> Às vezes a ideia mais "louca" leva à solução genial</li>
    </ul>
    <p><b>Após o brainstorming:</b> Agora sim, avalie e selecione as melhores ideias usando critérios como viabilidade, criatividade, impacto e custo.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Em grupos de 4-5, façam um brainstorming de 10 minutos sobre: "Como melhorar o intervalo da escola?". Anotem TODAS as ideias sem julgar. Depois, selecionem as 3 melhores e apresentem para a turma.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Faça um brainstorming individual sobre um problema que você enfrenta. Anote pelo menos 10 ideias (mesmo as malucas!). Depois circule as 3 que parecem mais viáveis.</p>
  </div>` },
{ id: 3, title: "Resolvendo problemas com o design", page: 48,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Design não é só "fazer bonito" — é resolver problemas.</b> Para resolver um problema com design, é importante primeiro entender o problema e as necessidades dos usuários ou consumidores. Em seguida, criar e testar diferentes soluções, avaliando cada uma das opções para determinar a melhor abordagem.</p>
    <p><b>O processo de design criativo:</b></p>
    <ul>
      <li><b>1. Entender:</b> Pesquise sobre o problema e as pessoas afetadas</li>
      <li><b>2. Criar:</b> Gere múltiplas soluções possíveis</li>
      <li><b>3. Avaliar:</b> Analise os prós e contras de cada solução</li>
      <li><b>4. Selecionar:</b> Escolha a melhor abordagem</li>
      <li><b>5. Testar:</b> Crie um protótipo e teste com pessoas reais</li>
    </ul>
    <p><b>Prática:</b> Em dupla, resolver o seguinte problema: uma fábrica de sorvetes está precisando de uma máquina de última geração para aumentar a produtividade. Desenhe essa máquina e detalhe suas funcionalidades!</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Em duplas, projetem a máquina de sorvetes ideal. Desenhem e listem todas as funcionalidades. Lembrem: a máquina pode ser utópica, irreal — o objetivo é exercitar a criatividade sem limites! Apresentem brevemente.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Observe um produto ou serviço que você usa no dia a dia. Que problema ele resolve? Como poderia ser melhorado pelo design? Faça um rascunho da sua versão melhorada.</p>
  </div>` },
{ id: 4, title: "Design Thinking", page: 50,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Design Thinking é uma metodologia usada por muitas empresas para criar novas soluções e projetos.</b> É centrada nas pessoas, levando em consideração sua experiência de vida. Empresas como Natura, Havaianas e Uber, por exemplo, utilizam essa metodologia.</p>
    <p><b>Os 3 Pilares do Design Thinking:</b></p>
    <ul>
      <li><b>Empatia:</b> A capacidade de olhar o mundo pelos olhos do outro. No caso do DT, fazer com que a solução funcione e entenda a necessidade do próximo</li>
      <li><b>Cocriação:</b> Elaborar o objetivo de modo que ele seja colaborativo. Quanto mais diversificado for o grupo, maior a chance de desenvolver uma solução que abraça a maioria dos públicos</li>
      <li><b>Experimentação:</b> Tem como princípio a ideia de que toda ideia formulada precisa ser testada antes de ser considerada válida. Criar protótipos e testar!</li>
    </ul>
    <p><b>As 5 etapas do DT:</b> Empatizar → Definir → Idear → Prototipar → Testar</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Aplique os 3 pilares do DT a um problema real: "Como melhorar a experiência de almoço na escola?" Empatia: entreviste colegas. Cocriação: trabalhe em grupo diverso. Experimentação: proponha uma solução testável.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Pesquise como uma empresa famosa (Natura, Airbnb, Apple) usa Design Thinking para criar seus produtos. Traga um exemplo real para compartilhar.</p>
  </div>` },
{ id: 5, title: "Design Sprint", page: 52,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Design Sprint é um processo de 5 dias criado pelo Google Ventures</b> para responder perguntas críticas de negócios através de design, prototipagem e testes com clientes. Na escola, adaptamos para uma versão mais curta.</p>
    <p><b>As 5 fases do Sprint (versão original):</b></p>
    <ul>
      <li><b>Segunda: Mapear</b> — Entender o problema e definir o foco</li>
      <li><b>Terça: Esboçar</b> — Cada um cria soluções individualmente</li>
      <li><b>Quarta: Decidir</b> — O grupo escolhe a melhor solução</li>
      <li><b>Quinta: Prototipar</b> — Construir um protótipo rápido</li>
      <li><b>Sexta: Testar</b> — Testar com usuários reais e coletar feedback</li>
    </ul>
    <p><b>Na escola:</b> Adaptamos o sprint para uma versão compacta em sala de aula, onde os alunos experimentam todas as fases em miniatura.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade Mini-Sprint:</b> Em 40 minutos, execute um sprint compacto: 5 min mapeando o problema, 10 min esboçando soluções individuais, 5 min decidindo em grupo, 15 min prototipando em papel, 5 min apresentando. Tema: "Como reduzir o desperdício de alimentos na cantina?"</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Pesquise sobre o Google Design Sprint original. Assista a um vídeo explicativo e anote as diferenças entre a versão completa (5 dias) e a que fizemos em sala.</p>
  </div>` },
{ id: 6, title: "SCAMPER", page: 54,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>SCAMPER é uma técnica criativa que usa 7 perguntas para inovar.</b> Cada letra representa uma ação que você pode aplicar a um produto, serviço ou processo existente para transformá-lo em algo novo:</p>
    <ul>
      <li><b>S — Substituir:</b> O que posso trocar? (material, ingrediente, pessoa, processo)</li>
      <li><b>C — Combinar:</b> O que posso juntar? (ideias, funções, produtos)</li>
      <li><b>A — Adaptar:</b> O que posso adaptar de outro contexto?</li>
      <li><b>M — Modificar/Magnificar:</b> O que posso aumentar, exagerar ou intensificar?</li>
      <li><b>P — Propor outros usos:</b> Para que mais isso poderia servir?</li>
      <li><b>E — Eliminar:</b> O que posso remover ou simplificar?</li>
      <li><b>R — Reorganizar/Reverter:</b> E se inverter a ordem? Fazer ao contrário?</li>
    </ul>
    <p><b>Exemplo:</b> Um lápis → Substituir a madeira por material reciclado, Combinar com borracha e apontador, Adaptar para uso digital (caneta stylus), Propor como material de plantio (lápis-semente)!</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Escolha um objeto comum (caderno, garrafa, mochila). Aplique as 7 perguntas SCAMPER para reinventá-lo. Anote as ideias e apresente a mais criativa para a turma.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Aplique o SCAMPER a um produto que você usa todo dia. Descreva pelo menos 3 modificações que fariam o produto melhor. Traga suas ideias.</p>
  </div>` },
{ id: 7, title: "Combinatividade", page: 56,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Combinatividade é a arte de juntar ideias existentes para criar algo novo.</b> A maioria das grandes inovações não surge do zero — surge da combinação inteligente de coisas que já existem.</p>
    <p><b>Exemplos famosos de combinatividade:</b></p>
    <ul>
      <li><b>Smartphone:</b> Telefone + câmera + computador + GPS + MP3 player = um único aparelho</li>
      <li><b>Uber:</b> GPS + pagamento digital + aplicativo + motoristas particulares = transporte sob demanda</li>
      <li><b>Netflix:</b> Internet + catálogo de filmes + algoritmo de recomendação = streaming personalizado</li>
    </ul>
    <p><b>Como praticar:</b> Escolha 2 produtos ou conceitos aparentemente não relacionados e tente combiná-los. Quanto mais inusitada a combinação, mais inovador pode ser o resultado!</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Sorteie 2 objetos/conceitos aleatórios (o professor prepara cartões). Combine-os em um produto inovador. Dê nome, descreva funcionalidades e desenhe. Apresente em 1 minuto para a turma votar na combinação mais criativa!</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Pense em 3 combinações inovadoras que já existem no seu dia a dia (ex: relógio + medidor de passos = smartwatch). Anote e reflita: o que torna essas combinações bem-sucedidas?</p>
  </div>` },
{ id: 8, title: "Como apresentar minha solução?", page: 58,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>De nada adianta ter uma ideia genial se você não souber apresentá-la.</b> O pitch é uma apresentação curta e convincente da sua solução. Investidores, parceiros e clientes decidem em poucos minutos se sua ideia vale a pena.</p>
    <p><b>Estrutura de um bom pitch:</b></p>
    <ul>
      <li><b>1. O Problema (30s):</b> Que dor você resolve? Comece com algo que prenda atenção</li>
      <li><b>2. A Solução (30s):</b> O que você criou e como funciona?</li>
      <li><b>3. O Diferencial (20s):</b> Por que sua solução é melhor que as alternativas?</li>
      <li><b>4. O Pedido (10s):</b> O que você precisa? (investimento, parceria, feedback)</li>
    </ul>
    <p><b>Dicas:</b> Conte uma história (storytelling). Use dados concretos. Faça contato visual. Não leia — fale com convicção. Ensaie várias vezes. O pitch ideal dura 90 segundos!</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Prepare e apresente um pitch de 90 segundos sobre a solução que você desenvolveu ao longo do módulo (usando as técnicas de brainstorming, DT, SCAMPER, combinatividade). A turma dá feedback: convenceu? O que melhorar?</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Grave um vídeo do seu pitch de 90 segundos. Assista e avalie: você pareceu confiante? A solução ficou clara? O diferencial ficou evidente? Refaça até ficar satisfeito.</p>
  </div>` },

{ id: 1, title: "Comunicação Empresarial I — Marketing e Branding", page: 62,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Empresas também se comunicam — através da sua marca.</b> Neste módulo, falaremos sobre a comunicação de uma empresa, mas o foco não será somente em empresa, até porque uma empresa é formada de pessoas. Empresas se comunicam também através de sua marca, numa estratégia chamada marketing.</p>
    <p><b>Marketing vs. Branding:</b></p>
    <ul>
      <li><b>Marketing:</b> Chamar a atenção do cliente. Foca em divulgação e vendas. Usa promoções, anúncios, redes sociais. A principal pergunta: "Como vender mais?"</li>
      <li><b>Branding:</b> Criar fidelidade e reputação da marca. Foca na identidade e nos valores. Usa experiências, tom de voz, propósito. A principal pergunta: "O que a marca representa?"</li>
    </ul>
    <p><b>Quem vem primeiro?</b> Sabe aquela expressão "quem vem primeiro, o ovo ou a galinha?" No mundo empresarial, quando o tema é branding e marketing, o que vem primeiro é o branding. Afinal, não dá para vender algo se ainda não tem uma marca criada e estabelecida.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Crie uma marca para uma empresa que vende doces. Defina: nome, o que será vendido, quais os valores da marca, qual o meio de comunicação (redes sociais, panfleto, boca a boca?) e desenhe um logotipo. Apresente e justifique suas escolhas.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Escolha 3 marcas que você gosta. Para cada uma, identifique: qual é o branding (valores, identidade) e qual é o marketing (como divulgam, onde estão). Anote as diferenças.</p>
  </div>` },
{ id: 2, title: "Comunicação Empresarial II — Marketing Digital", page: 64,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Marketing Digital é o marketing feito no ambiente digital</b> — redes sociais, sites, e-mail, aplicativos. Hoje, a maioria das decisões de compra começa com uma pesquisa online.</p>
    <p><b>Pilares do Marketing Digital:</b></p>
    <ul>
      <li><b>Conteúdo:</b> Criar conteúdo relevante que atraia e eduque o público (posts, vídeos, artigos)</li>
      <li><b>Redes Sociais:</b> Estar presente onde o público está (Instagram, TikTok, YouTube)</li>
      <li><b>Engajamento:</b> Interagir com o público, responder comentários, criar comunidade</li>
      <li><b>Análise de dados:</b> Medir resultados para saber o que funciona e o que não funciona</li>
    </ul>
    <p><b>Como a empresa se comunica com o cliente?</b> Através de canais como e-mail, chatbot, redes sociais, SAC (Serviço de Atendimento ao Consumidor). A comunicação precisa ser clara, rápida e personalizada.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Crie uma estratégia de marketing digital para a marca de doces da aula anterior: quais redes sociais usará? Que tipo de conteúdo postará? Com que frequência? Crie o primeiro post (texto + ideia visual).</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Siga uma marca pequena no Instagram e observe por uma semana: quantas vezes postam? Que tipo de conteúdo? Respondem comentários? Avalie a estratégia de marketing digital dela.</p>
  </div>` },
{ id: 3, title: "Atendimento ao cliente", page: 66,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>O atendimento ao cliente pode ser o diferencial entre uma empresa que cresce e uma que fecha.</b> Um bom atendimento fideliza; um mau atendimento afasta — e um cliente insatisfeito conta para muitas outras pessoas!</p>
    <p><b>Pilares do bom atendimento:</b></p>
    <ul>
      <li><b>Empatia:</b> Se coloque no lugar do cliente. Entenda sua frustração ou necessidade</li>
      <li><b>Agilidade:</b> Ninguém gosta de esperar. Resolva rápido</li>
      <li><b>Clareza:</b> Comunique-se de forma simples e direta</li>
      <li><b>Personalização:</b> Trate cada cliente como único, não como um número</li>
      <li><b>Pós-venda:</b> O relacionamento não acaba na venda — acompanhe depois!</li>
    </ul>
    <p><b>Simulação de atendimento:</b> Praticar atendimento em duplas — um é o atendente, outro é o cliente com diferentes perfis (educado, impaciente, indeciso, reclamador).</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Simulação de atendimento em duplas. O professor distribui cenários: cliente querendo devolver produto, cliente pedindo desconto, cliente com dúvida técnica. Pratiquem e depois a turma avalia: qual atendimento foi melhor e por quê?</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Na próxima vez que for atendido em uma loja ou restaurante, avalie o atendimento nos 5 pilares. Dê uma nota de 0 a 10 para cada. Traga sua avaliação.</p>
  </div>` },
{ id: 4, title: "Clima organizacional", page: 68,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Clima organizacional é o conjunto de atitudes, sentimentos e percepções que os funcionários de uma empresa têm em relação ao seu ambiente de trabalho.</b> Assim como numa sala de aula, uma empresa também tem esses fatores — isso é chamado de clima organizacional.</p>
    <p><b>Fatores que influenciam o clima:</b></p>
    <ul>
      <li><b>Internos:</b> Cultura da empresa, estilo de liderança, relacionamento interpessoal, nível de apoio e reconhecimento</li>
      <li><b>Externos:</b> Mercado, concorrência, situação econômica do país</li>
    </ul>
    <p><b>Impacto na motivação:</b> Em um ambiente de trabalho positivo, os funcionários tendem a se sentir mais motivados, satisfeitos e comprometidos. Em um ambiente negativo, podem se sentir desmotivados, insatisfeitos e descontentes.</p>
    <p><b>Como criar um bom clima:</b> Comunicação aberta, reconhecimento, oportunidades de crescimento, respeito mútuo, trabalho em equipe e feedback construtivo.</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Avalie o "clima organizacional" da sala de aula: como vocês se sentem? O que motiva? O que desmotiva? Proponham juntos 5 ações concretas para melhorar o clima da turma.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Pergunte a um adulto que trabalha: "Como é o clima no seu trabalho?" Anote se é positivo ou negativo e o que mais influencia. Compare com o clima da sua sala.</p>
  </div>` },
{ id: 5, title: "Técnicas de venda — comunicação é a chave", page: 70,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Vender é comunicar valor.</b> A técnica de venda mais importante não é manipular ou pressionar — é comunicar claramente por que seu produto ou serviço resolve o problema do cliente.</p>
    <p><b>Técnicas de venda baseadas em comunicação:</b></p>
    <ul>
      <li><b>Escuta ativa:</b> Entenda primeiro o que o cliente precisa antes de oferecer algo</li>
      <li><b>Perguntas estratégicas:</b> "O que você busca?" "Qual o maior problema que enfrenta?" As perguntas certas revelam a necessidade</li>
      <li><b>Storytelling:</b> Conte histórias de como o produto ajudou outras pessoas</li>
      <li><b>Demonstração:</b> Mostre o produto funcionando — ver é crer!</li>
      <li><b>Gatilhos mentais:</b> Escassez ("últimas unidades"), prova social ("mais vendido"), autoridade ("recomendado por especialistas")</li>
    </ul>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Em duplas, um é vendedor e outro é cliente. O vendedor deve vender um produto simples (caneta, caderno, garrafa) usando pelo menos 3 técnicas aprendidas. Depois troquem. A turma vota: quem vendeu melhor?</p>
  </div>`,

{ id: 6, title: "Gestão de conflitos na empresa", page: 72,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Conflitos são naturais em qualquer grupo de pessoas.</b> O problema não é o conflito em si — é como lidamos com ele. Uma boa gestão de conflitos transforma desentendimentos em oportunidades de crescimento.</p>
    <p><b>Tipos de conflito:</b></p>
    <ul>
      <li><b>Conflito de tarefas:</b> Desacordo sobre como fazer algo (método, processo)</li>
      <li><b>Conflito de relacionamento:</b> Atrito pessoal entre pessoas (personalidades, valores)</li>
      <li><b>Conflito de processo:</b> Desacordo sobre quem faz o quê (papéis, responsabilidades)</li>
    </ul>
    <p><b>Passos para resolver conflitos:</b></p>
    <ul>
      <li>1. Identifique o problema real (não os sintomas)</li>
      <li>2. Ouça todos os lados com imparcialidade</li>
      <li>3. Busque interesses comuns (o que todos querem?)</li>
      <li>4. Proponha soluções ganha-ganha</li>
      <li>5. Documente o acordo e acompanhe</li>
    </ul>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> O professor apresenta 3 cenários de conflito empresarial. Os grupos devem classificar o tipo de conflito, propor uma resolução usando os 5 passos, e apresentar. A turma debate: a solução é justa? Funciona?</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Pense em um conflito que você viveu recentemente (escola, casa, amigos). Aplique os 5 passos mentalmente: o que faria diferente? Como resolveria de forma ganha-ganha?</p>
  </div>` },
{ id: 7, title: "Autoliderança — ferramenta fundamental", page: 74,
  content: `<div class="space-y-4">
    <h3>🎯 Teoria Aprofundada</h3>
    <p><b>Antes de liderar outros, você precisa liderar a si mesmo.</b> Autoliderança é a capacidade de se motivar, se organizar e se responsabilizar pelas próprias ações e resultados — sem precisar que alguém cobre isso de você.</p>
    <p><b>Pilares da autoliderança:</b></p>
    <ul>
      <li><b>Autoconhecimento:</b> Conhecer seus pontos fortes, fracos, valores e motivações</li>
      <li><b>Autodisciplina:</b> Fazer o que precisa ser feito, mesmo quando não tem vontade</li>
      <li><b>Autogestão:</b> Organizar seu tempo, prioridades e energia</li>
      <li><b>Autorresponsabilidade:</b> Assumir responsabilidade pelos resultados, sem culpar os outros</li>
    </ul>
    <p><b>Proatividade vs. Reatividade:</b> O autolíder é proativo — toma iniciativa, antecipa problemas e age. O reativo espera acontecer para reagir. Qual você quer ser?</p>
  </div>`,
  exercise: `<div class="space-y-3">
    <h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Autoavaliação de autoliderança: pontue de 0 a 10 cada pilar (autoconhecimento, autodisciplina, autogestão, autorresponsabilidade). Identifique o pilar mais forte e o mais fraco. Crie um plano de ação para melhorar o pilar mais fraco.</p>
  </div>`,
  homework: `<div class="space-y-2">
    <p><b>Além da Sala:</b></p>
    <p>Durante a semana, pratique um pilar de autoliderança: organize sua rotina de estudos (autogestão), cumpra um compromisso difícil (autodisciplina) ou reconheça um erro sem culpar outros (autorresponsabilidade). Anote como foi.</p>
  </div>` },
{ id: 8, title: "Técnicas de comunicação empresarial", page: 76,
  content: `<div class="space-y-4">

            page: 8,
            content: `<div class="space-y-4">
              <h3 class="font-bold text-lg">Teoria Aprofundada</h3>
              <p><b>O que é uma Startup?</b> Não é apenas uma "empresa nova" ou "pequena". Uma startup é uma organização temporária projetada para buscar um modelo de negócio repetível e escalável em condições de extrema incerteza. A palavra-chave é ESCALÁVEL: crescer exponencialmente sem aumentar custos na mesma proporção.</p>
              
              <p><b>Características de uma Startup:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>Inovação:</b> Produto/serviço novo ou nova forma de entregar algo existente</li>
                <li><b>Escalabilidade:</b> Capacidade de crescer rapidamente sem aumentar custos proporcionalmente</li>
                <li><b>Repetibilidade:</b> O modelo pode ser replicado para múltiplos clientes</li>
                <li><b>Incerteza:</b> Alto risco, mas também alto potencial de retorno</li>
                <li><b>Foco em Crescimento Rápido:</b> Objetivo é dominar o mercado, não lucro imediato</li>
              </ul>
              
              <p><b>Startup vs. Empresa Tradicional:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>Restaurante:</b> Para atender 2x mais clientes, precisa de 2x mais cozinheiros, mesas, espaço (não escala facilmente)</li>
                <li><b>iFood:</b> Pode conectar milhões de restaurantes e clientes usando a mesma plataforma digital (escala facilmente)</li>
                <li><b>Escola Física:</b> Precisa de mais salas e professores para mais alunos</li>
                <li><b>Coursera:</b> Mesma aula online serve 10 ou 10 milhões de alunos</li>
              </ul>
              
              <p><b>Estágios de uma Startup:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>Ideação:</b> Validar se o problema existe e se a solução faz sentido</li>
                <li><b>MVP:</b> Criar versão mínima para testar com clientes reais</li>
                <li><b>Tração:</b> Conseguir primeiros clientes pagantes e provar que funciona</li>
                <li><b>Escala:</b> Crescer rapidamente com investimento externo</li>
                <li><b>Consolidação:</b> Tornar-se referência no mercado</li>
              </ul>
              
              <h3 class="font-bold text-lg mt-4">Caso Prático Real</h3>
              <p><b>99 (App de Transporte):</b> Começou em 2012 como startup brasileira competindo com Uber. Características de startup: usava tecnologia mobile (inovação), conectava milhões de motoristas e passageiros na mesma plataforma (escalabilidade), o modelo funcionava em qualquer cidade (repetibilidade). Cresceu de zero para 14 milhões de usuários em 5 anos. Foi vendida para a chinesa Didi por US$ 1 bilhão, tornando-se um "unicórnio" brasileiro.</p>
              
              <p><b>Nubank:</b> Fundado em 2013 por David Vélez, Cristina Junqueira e Edward Wible. Problema identificado: bancos tradicionais com taxas abusivas e atendimento ruim. Solução escalável: cartão de crédito sem anuidade gerenciado por app. Por ser digital, consegue atender 70+ milhões de clientes com equipe menor que bancos tradicionais. Escalabilidade: adicionar 1 cliente ou 1 milhão tem custo similar (servidor digital).</p>
              
              <p><b>Quinto Andar:</b> Startup de aluguel de imóveis sem fiador nem depósito. Inovação: algoritmo avalia o perfil do inquilino digitalmente. Escalabilidade: mesma tecnologia serve para 10 ou 100 mil imóveis. Repetibilidade: modelo funciona em qualquer cidade. Cresceu de startup em 2013 para unicórnio avaliado em US$ 5,1 bilhões em 2021.</p>
              
              <p><b>Exemplo Local:</b> Uma padaria tradicional em Limoeiro não é startup (atender mais clientes requer mais padeiros, fornos, espaço). Mas se ela criasse um APP de receitas exclusivas + delivery automatizado + franquia digital onde outras padarias pagam pela receita, ISSO seria pensamento startup (escalável e repetível).</p>
            </div>`,
            exercise: `<div class="space-y-3">
              <h3 class="font-bold">Proposta de Trabalho em Sala:</h3>

            content: `<div class="space-y-4">
              <h3 class="font-bold text-lg">Teoria Aprofundada</h3>
              <p><b>O que é o Golden Circle?</b> É um conceito criado por Simon Sinek que explica como líderes e empresas inspiradoras comunicam de forma diferente. Ao invés de começar pelo "O QUE" fazem, começam pelo "POR QUÊ" fazem. O Golden Circle tem 3 camadas concêntricas, de dentro para fora: POR QUÊ → COMO → O QUÊ.</p>
              
              <p><b>As 3 Camadas do Golden Circle:</b></p>
              
              <p><b>1. POR QUÊ (WHY) - O Centro:</b> Seu propósito, causa ou crença. POR QUE sua empresa existe? Qual é sua missão além de ganhar dinheiro? Esta é a parte mais importante e a que INSPIRA as pessoas. Exemplos:
              <ul class="list-disc ml-6 space-y-1 mt-2">
                <li>Apple: "Desafiar o status quo e pensar diferente"</li>
                <li>Tesla: "Acelerar a transição para energia sustentável"</li>
                <li>Patagonia: "Estamos no negócio para salvar nosso planeta"</li>
              </ul>
              </p>
              
              <p><b>2. COMO (HOW) - A Camada do Meio:</b> Como você realiza seu propósito? Quais são seus valores, princípios e diferenciais? É a SUA FORMA única de fazer as coisas. Exemplos:
              <ul class="list-disc ml-6 space-y-1 mt-2">
                <li>Apple: Design minimalista, integração hardware/software, experiência do usuário impecável</li>
                <li>Tesla: Inovação tecnológica, venda direta (sem concessionárias), over-the-air updates</li>
                <li>Patagonia: Produtos duráveis, materiais sustentáveis, ativismo ambiental, transparência</li>
              </ul>
              </p>
              
              <p><b>3. O QUÊ (WHAT) - A Camada Externa:</b> O que você faz/vende? Seus produtos ou serviços. É a parte mais óbvia, mas a MENOS inspiradora. Exemplos:
              <ul class="list-disc ml-6 space-y-1 mt-2">
                <li>Apple: Computadores, smartphones, tablets, smartwatches</li>
                <li>Tesla: Carros elétricos, painéis solares, baterias</li>
                <li>Patagonia: Roupas outdoor, mochilas, equipamentos</li>
              </ul>
              </p>
              
              <p><b>Por que começar pelo POR QUÊ?</b> Pessoas não compram O QUE você faz, compram POR QUE você faz. O "Por quê" conecta emocionalmente. Simon Sinek explica que o "Por quê" fala com a parte do cérebro responsável por emoções e decisões (sistema límbico), enquanto o "O quê" fala com a parte racional (neocórtex).</p>
              
              <p><b>Propósito Pessoal vs. Propósito Empresarial:</b> Assim como empresas têm propósito, VOCÊ também pode ter! Seu propósito pessoal é o legado que quer deixar, o impacto que quer ter no mundo. Não é sobre profissão (professor, médico, engenheiro), mas sobre POR QUÊ você faz o que faz. Exemplo: "Ajudar pessoas a descobrirem seu potencial" pode se manifestar como professor, coach, escritor, empreendedor social...</p>
              
              <h3 class="font-bold text-lg mt-4">Caso Prático Real</h3>

                <li><b>COMO:</b> Modelo "One for One" - A cada par de sapatos vendido, um par é doado para uma criança necessitada. Transparência total sobre doações.</li>
                <li><b>O QUÊ:</b> Sapatos casuais, óculos, bolsas, café.</li>
                <li><b>Impacto:</b> Mais de 100 milhões de pares de sapatos doados. As pessoas compram não apenas pelo produto, mas para fazer parte da missão.</li>

              <p><b>Doctor's Without Borders (Médicos Sem Fronteiras):</b></p>

            page: 14,
            content: `<div class="space-y-4">
              <h3 class="font-bold text-lg">Teoria Aprofundada</h3>
              <p><b>O que é MVP (Minimum Viable Product)?</b> É a versão mais simples do seu produto que ainda entrega valor suficiente para o cliente testar e você aprender com o feedback real. O objetivo NÃO é fazer um produto perfeito, mas testar a hipótese central com o mínimo de recursos e tempo possível.</p>
              
              <p><b>Princípios do MVP:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>Mínimo:</b> Apenas funcionalidades essenciais, nada de "extras" ou "nice to have"</li>
                <li><b>Viável:</b> Tem que funcionar bem o suficiente para gerar valor real ao usuário</li>
                <li><b>Produto:</b> Algo que pode ser testado por clientes reais, não apenas conceito</li>
              </ul>
              
              <p><b>Por que fazer um MVP?</b> Reduz risco de gastar meses/anos criando algo que ninguém quer. Permite aprendizado rápido. Valida se o problema é real e se sua solução funciona. Economiza tempo e dinheiro. Exemplo clássico: construir um carro completo vs. entregar primeiro uma bicicleta (funciona para transporte), depois patinete motorizado, depois moto, depois carro.</p>
              
              <p><b>Tipos de MVP:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>Landing Page + Email:</b> Página explicando o produto e pedindo email de interessados (valida demanda antes de construir)</li>
                <li><b>Wizard of Oz:</b> Parece automático, mas é manual nos bastidores. Exemplo: Chatbot que na verdade é uma pessoa respondendo</li>
                <li><b>Concierge:</b> Fazer manualmente o serviço para os primeiros clientes (não escala, mas aprende)</li>
                <li><b>Protótipo Clicável:</b> Simulação visual navegável, sem código funcional atrás</li>
                <li><b>Versão Beta Limitada:</b> Produto básico funcional para grupo pequeno de early adopters</li>
              </ul>
              
              <p><b>O que é PITCH?</b> É uma apresentação curta, clara e persuasiva da sua ideia de negócio. Deve despertar interesse, comunicar valor e inspirar ação (investimento, parceria, compra). Existem vários formatos:</p>
              
              <ul class="list-disc ml-6 space-y-1">
                <li><b>Elevator Pitch:</b> 30-60 segundos (tempo de elevador). Essencial: Problema + Solução + Diferencial</li>
                <li><b>Pitch de 3 minutos:</b> Apresentação rápida com slides mínimos</li>
                <li><b>Pitch Deck (10-15 min):</b> Apresentação completa com 10-12 slides</li>
              </ul>
              
              <p><b>Estrutura Clássica de um Pitch (5 elementos essenciais):</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li><b>1. Problema:</b> Que dor/necessidade não atendida existe? Quantifique (ex: "3 milhões de pessoas no Brasil sofrem com X")</li>
                <li><b>2. Solução:</b> Como seu produto/serviço resolve esse problema de forma única?</li>
                <li><b>3. Modelo de Negócio:</b> Como você ganha dinheiro? Qual o modelo de receita?</li>
                <li><b>4. Tração:</b> Prove que funciona! Números, clientes, crescimento, validações</li>
                <li><b>5. Pedido (Ask):</b> O que você está buscando? Investimento? Parceria? Quanto?</li>
              </ul>
              
              <p><b>Dicas de Comunicação para Pitch Matador:</b></p>
              <ul class="list-disc ml-6 space-y-1">
                <li>CONTE UMA HISTÓRIA: Comece com caso real de alguém sofrendo com o problema</li>
                <li>NÚMEROS e DADOS: Investidores querem fatos, não apenas paixão</li>
                <li>DEMONSTRAÇÃO: Mostre o produto funcionando, se possível</li>
                <li>CONFIANÇA sem ARROGÂNCIA: Acredite na sua ideia, mas ouça feedback</li>
                <li>CLAREZA: Se não conseguir explicar para uma criança de 10 anos, simplifique</li>
                <li>PRATIQUE: Ensaie dezenas de vezes. Grave-se e assista criticamente</li>
              </ul>
              
              <h3 class="font-bold text-lg mt-4">Caso Prático Real</h3>
              <p><b>Dropbox - O MVP que era um Vídeo:</b> Em 2007, criar um serviço de armazenamento na nuvem exigia meses de desenvolvimento. O fundador Drew Houston criou um MVP GENIAL: um vídeo de 3 minutos demonstrando COMO o produto funcionaria (mesmo sem estar pronto). Postou em fórum de tecnologia. Resultado: lista de espera saltou de 5.000 para 75.000 pessoas em UMA NOITE! Validou demanda enorme SEM construir o produto completo. Economizou meses e provou que valia investir.</p>
              
              <p><b>Zappos - Concierge MVP:</b> Antes de investir em estoque, o fundador Nick Swinmurn testou a hipótese: "Pessoas compram sapatos online?" Ele fotografou sapatos de lojas físicas, postou em um site simples. Quando alguém comprava, ele ia na loja, comprava o sapato e enviava. NÃO ESCALÁVEL, mas validou que pessoas compravam sapatos sem experimentar. Hoje a Zappos vale bilhões.</p>
              
              <p><b>Airbnb - Primeiríssimo MVP:</b> Em 2007, os fundadores não tinham dinheiro para pagar aluguel em San Francisco durante uma conferência de design (hotéis lotados e caros). Compraram 3 colchões infláveis, criaram um site simples "Air Bed & Breakfast" e alugaram espaço na sala deles. Validaram: pessoas pagam para dormir na casa de estranhos se for barato e conveniente. De 3 colchões para 7+ milhões de propriedades!</p>
              
              <p><b>Pitch Icônico - Uber no Shark Tank (fictício):</b> "Imagine: são 23h, está chovendo, você precisa de um transporte seguro AGORA. Táxis não atendem. Ônibus parou. PROBLEMA: 40% dos pedidos de táxi não são atendidos em horários de pico. SOLUÇÃO: Uber conecta você a motoristas particulares em 3 minutos via app. MODELO: Comissão de 20% por corrida. TRAÇÃO: 10.000 corridas/mês em San Francisco, crescendo 30% ao mês. PEDIDO: R$ 500 mil por 5% da empresa para expansão nacional."</p>
            </div>`,
            exercise: `<div class="space-y-3">
              <h3 class="font-bold">Proposta de Trabalho em Sala:</h3>
              <p><b>Atividade 1: Desenhando o MVP</b><br/>
              Para a ideia de startup do grupo, desenhem o MVP ideal respondendo: 1) Qual é a ÚNICA funcionalidade essencial que não pode faltar? 2) O que podemos ELIMINAR na primeira versão? 3) Como testaremos com clientes reais? 4) Quanto tempo/recursos precisamos para criar esse MVP? Desenhem ou façam um storyboard mostrando como o usuário interage com o MVP.</p>
              
              <p><b>Atividade 2: MVP Tipo Challenge</b><br/>
              Desafio: Criar um MVP de uma ideia em 20 minutos usando APENAS materiais da sala (papel, caneta, celular, criatividade). Pode ser: Landing page desenhada, vídeo explicativo filmado no celular, protótipo de papel, formulário no Google Forms. O que importa: está minimamente testável? Apresentem ao final.</p>
              
              <p><b>Atividade 3: Elevator Pitch Battle</b><br/>
              Cada grupo tem EXATOS 60 segundos para fazer o Elevator Pitch da startup. Use cronômetro visível. Estrutura obrigatória: 1) Problema (15 seg), 2) Solução (20 seg), 3) Diferencial (15 seg), 4) Pedido/Call to Action (10 seg). A turma avalia: Ficou claro? Despertou interesse? Respeitou o tempo? Votação: qual foi o pitch mais convincente?</p>
              
              <p><b>Atividade 4: Consultoria de Simplificação</b><br/>
              Troque o Canvas da startup com outro grupo. Cada grupo atua como "consultor" e responde: 1) O MVP proposto está realmente MÍNIMO ou tem features desnecessárias? 2) Como simplificariam ainda mais? 3) Que teste podemos fazer ANTES de construir o MVP? Apresentem o feedback crítico construtivo.</p>
            </div>`,
            homework: `<div class="space-y-2">
              <p><b>Missão para Casa:</b></p>
              <p>1. Assista a 3 episódios de Shark Tank Brasil no YouTube. Para cada pitch apresentado, analise: 1) Como o empreendedor estruturou a apresentação? 2) Que dados/números ele trouxe? 3) Os tubarões investiram? Por que sim ou não? 4) O que você faria diferente? Anote suas observações detalhadamente.</p>
              
              <p>2. Crie uma LANDING PAGE simples da sua startup usando Canva, Google Sites ou até papel desenhado. Ela deve ter: 1) Título chamativo com problema/solução, 2) Imagem ilustrativa, 3) 3 benefícios principais, 4) Chamada para ação ("Quero ser avisado quando lançar"). Mostre para 5 pessoas e anote: elas entenderam? se interessaram? que dúvidas tiveram?</p>
              
              <p>3. Escreva seu ELEVATOR PITCH completo (entre 80-100 palavras, cerca de 60 segundos falando). Ensaie em voz alta cronometrando. Treine até conseguir falar naturalmente sem papel, mantendo contato visual (pratique no espelho). Peça para alguém da família assistir e dar feedback: ficou claro? convincente? despertou interesse?</p>
              
              <p>4. Pesquise histórias de MVPs criativos: Amazon (começou vendendo livros apenas), Facebook (só para Harvard), Instagram (inicialmente era Burbn). Para cada caso, identifique: Como era o MVP inicial? O que mudou até a versão atual? Quanto tempo levou do MVP ao sucesso?</p>
            </div>`
          },

{ id: 1, title: "Autoconhecimento financeiro", page: 26,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Autoconhecimento financeiro</b> é a capacidade de identificar seu perfil comportamental em relação ao dinheiro, perceber a importância de conhecer suas finanças e avaliar como pode melhorar seu relacionamento com o dinheiro.</p>
    <p><b>Atividade de aquecimento:</b> Produtos do dia a dia (perfume, carro, relógios, carteira, sapatos de marca, casa, fazenda, computador, celulares) são precificados em "moedas". Cada aluno recebe 20 moedas e deve ir às compras, decidindo o que comprar. Ao final, refletem sobre suas escolhas e o que revelam sobre seu perfil financeiro.</p>
    <p><b>Perfis financeiros:</b> Gastador (compra por impulso), Poupador (guarda tudo e não aproveita), Equilibrado (gasta com consciência e poupa com regularidade). Qual é o seu?</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Com 20 moedas fictícias, faça suas compras entre os produtos listados. Depois responda: o que suas escolhas dizem sobre você? Você é gastador, poupador ou equilibrado? O que faria diferente?</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Faça o mesmo exercício com um familiar. Compare as escolhas: vocês têm perfis financeiros parecidos ou diferentes? Discutam sobre isso.</p></div>` },
{ id: 2, title: "Princípios financeiros", page: 28,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Princípios financeiros são regras fundamentais</b> que guiam decisões inteligentes com dinheiro. Antes de investir, é preciso aprender a gerenciar o próprio dinheiro.</p>
    <p><b>Princípios essenciais:</b></p><ul>
      <li><b>Gaste menos do que ganha:</b> A regra de ouro — parece óbvia, mas a maioria das pessoas não segue</li>
      <li><b>Tenha reserva de emergência:</b> 3 a 6 meses de gastos guardados para imprevistos</li>
      <li><b>Invista cedo:</b> O tempo é o melhor amigo dos juros compostos — quanto antes começar, melhor</li>
      <li><b>Diversifique:</b> Nunca coloque todo dinheiro em um só lugar</li>
      <li><b>Eduque-se financeiramente:</b> Conhecimento financeiro é um investimento que sempre dá retorno</li></ul>
    <p><b>Planejamento financeiro pessoal:</b> É a ferramenta que coloca esses princípios em prática — saber quanto ganha, quanto gasta, quanto poupa e quanto investe.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Crie seu plano financeiro pessoal: liste suas receitas e despesas mensais. Aplique os 5 princípios e identifique onde pode melhorar. Compartilhe (se quiser) com um colega para trocar dicas.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise: quais são as principais causas de endividamento no Brasil? Traga 3 dados que achou mais impactantes.</p></div>` },
{ id: 3, title: "Investimentos", page: 30,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Investir é aplicar recursos com expectativa de retorno futuro.</b> Existem 5 principais tipos de investimento:</p><ul>
      <li><b>Tesouro Direto:</b> Programa do governo federal. Títulos públicos federais (Selic, IPCA+, Prefixado). Baixo risco, boa opção para iniciantes</li>
      <li><b>CDB:</b> Certificado de Depósito Bancário — você empresta ao banco e recebe juros. Risco baixo a médio</li>
      <li><b>LCI/LCA:</b> Letras de Crédito Imobiliário e do Agronegócio. Isentas de IR para pessoa física. Risco médio</li>
      <li><b>Ações:</b> Comprar uma fração de uma empresa na Bolsa de Valores. Alto risco, alto potencial de retorno</li>
      <li><b>Fundos de Investimento:</b> Um gestor profissional aplica o dinheiro de vários investidores em conjunto</li></ul>
    <p><b>Perfis de investidor:</b> Conservador (busca segurança), Moderado (equilibra risco/retorno), Arrojado (busca máximo retorno, aceita riscos altos).</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Analise cenários de investimento no livro do aluno. Para cada cenário, recomende o tipo de investimento mais adequado e justifique com base no perfil do investidor.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise o rendimento atual da poupança, do Tesouro Selic e de um CDB. Compare: qual rende mais? Qual é mais seguro? Traga os números.</p></div>` },
{ id: 4, title: "Criptomoedas", page: 32,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Criptomoedas são moedas digitais descentralizadas</b> — não são controladas por bancos ou governos. Funcionam através de uma tecnologia chamada blockchain (cadeia de blocos), que registra todas as transações de forma transparente e segura.</p>
    <p><b>Principais criptomoedas:</b></p><ul>
      <li><b>Bitcoin (BTC):</b> A primeira e mais conhecida. Criada em 2009 por Satoshi Nakamoto (pseudônimo). Limite de 21 milhões de unidades</li>
      <li><b>Ethereum (ETH):</b> Vai além da moeda — permite criar contratos inteligentes e aplicativos descentralizados</li>
      <li><b>Stablecoins (USDT, USDC):</b> Pareadas ao dólar, menos voláteis</li></ul>
    <p><b>Riscos:</b> Alta volatilidade (o preço pode cair 50% em uma semana), golpes e fraudes, complexidade técnica, falta de regulamentação. Criptomoedas NÃO são investimento para iniciantes ou para quem não aceita riscos altos.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Debate: "Criptomoedas são o futuro do dinheiro ou uma moda passageira?" Divida a turma em 2 grupos (prós e contras). Cada grupo prepara 5 argumentos. Debatam e a turma vota no grupo mais convincente.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise o preço atual do Bitcoin e do Ethereum. Compare com o preço de 1 ano atrás. Subiu ou caiu? O que isso ensina sobre volatilidade?</p></div>` },
{ id: 5, title: "Fintechs", page: 34,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Fintechs (Financial Technology)</b> são startups que usam tecnologia para oferecer serviços financeiros de forma mais simples, acessível e barata que os bancos tradicionais.</p>
    <p><b>Exemplos de fintechs brasileiras:</b></p><ul>
      <li><b>Nubank:</b> Banco digital sem tarifas, cartão sem anuidade</li>
      <li><b>PicPay:</b> Carteira digital com cashback</li>
      <li><b>Creditas:</b> Empréstimos com garantia de imóvel ou veículo</li>
      <li><b>GuiaBolso:</b> Organizador financeiro pessoal</li>
      <li><b>Stone/PagSeguro:</b> Maquininhas de cartão para pequenos negócios</li></ul>
    <p><b>Como as fintechs mudaram o mercado:</b> Democratizaram o acesso a serviços financeiros, reduziram taxas, aumentaram a concorrência e forçaram bancos tradicionais a se modernizarem. O PIX, criado pelo Banco Central em 2020, é um exemplo de inovação que as fintechs ajudaram a inspirar.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Em grupos, criem o conceito de uma fintech fictícia: qual problema financeiro ela resolve? Para qual público? Qual o diferencial? Como ganha dinheiro? Apresentem em 2 minutos.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Liste todas as fintechs/apps financeiros que sua família usa (Nubank, PicPay, iFood Pay, etc.). Para cada um, anote: qual problema resolve? Economiza dinheiro?</p></div>` },
{ id: 6, title: "Gestão financeira empresarial", page: 36,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Gestão financeira empresarial</b> é o conjunto de práticas para administrar o dinheiro de um negócio. Sem gestão financeira, até negócios lucrativos podem falir por falta de caixa.</p>
    <p><b>Elementos essenciais:</b></p><ul>
      <li><b>Fluxo de caixa:</b> Controle de todo dinheiro que entra e sai do negócio, mês a mês</li>
      <li><b>DRE (Demonstração de Resultado):</b> Receitas - Custos - Despesas = Lucro (ou prejuízo)</li>
      <li><b>Capital de giro:</b> Dinheiro necessário para manter o negócio funcionando no dia a dia</li>
      <li><b>Precificação:</b> Definir o preço de venda que cubra custos e gere lucro</li>
      <li><b>Separar finanças pessoais das empresariais:</b> Erro nº 1 dos empreendedores iniciantes!</li></ul></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Monte o fluxo de caixa mensal de um negócio fictício (food truck de tapioca). Liste receitas esperadas, custos fixos e variáveis. Calcule se o negócio é viável e qual seria o lucro mensal.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Entreviste um comerciante do seu bairro: ele controla o fluxo de caixa? Separa dinheiro pessoal do empresarial? Como define os preços? Anote as respostas.</p></div>` },
{ id: 7, title: "Equilíbrio e sustentabilidade financeira", page: 38,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Sustentabilidade financeira</b> é a capacidade de manter as finanças saudáveis ao longo do tempo — tanto para pessoas quanto para empresas. Não basta ter lucro em um mês; é preciso ter consistência.</p>
    <p><b>Ponto de equilíbrio (break-even):</b> É quando as receitas cobrem exatamente todos os custos. A partir daí, a empresa começa a lucrar. Fórmula: Custos Fixos ÷ (Preço de Venda - Custo Variável Unitário) = Quantidade no Equilíbrio.</p>
    <p><b>Indicadores de sustentabilidade financeira:</b></p><ul>
      <li><b>Margem de lucro:</b> Quanto sobra de cada venda após os custos</li>
      <li><b>Liquidez:</b> Capacidade de pagar as contas em dia</li>
      <li><b>Endividamento:</b> Proporção entre dívidas e patrimônio — se for alta, há risco</li>
      <li><b>Rentabilidade:</b> Retorno sobre o investimento feito</li></ul></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Calcule o ponto de equilíbrio do food truck da aula anterior. Quantas tapiocas precisa vender por mês para cobrir todos os custos? A partir de qual unidade começa a lucrar?</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise: por que tantas empresas fecham nos primeiros 2 anos? Qual a principal causa (dica: geralmente é financeira)? Traga dados do SEBRAE.</p></div>` },
{ id: 8, title: "Captação de investimentos", page: 40,
  content: `<div class="space-y-4"><h3>🎯 Teoria Aprofundada</h3>
    <p><b>Captação de investimentos</b> é o processo de buscar dinheiro externo para financiar o crescimento do negócio. Nem toda startup consegue crescer só com receita própria — muitas precisam de investidores.</p>
    <p><b>Formas de captação:</b></p><ul>
      <li><b>Bootstrapping:</b> Crescer com recursos próprios, sem investidores (mais lento, mais controle)</li>
      <li><b>Investidor-Anjo:</b> Pessoa física que investe R$ 50K-500K em troca de participação. Além de dinheiro, traz experiência e contatos</li>
      <li><b>Venture Capital (VC):</b> Fundos que investem milhões em startups com alto potencial de crescimento</li>
      <li><b>Crowdfunding:</b> Financiamento coletivo — muitas pessoas investem pequenos valores (Catarse, Kickante)</li>
      <li><b>Empréstimo bancário:</b> Dinheiro emprestado com juros — precisa ser pago independente do resultado</li></ul>
    <p><b>O que investidores avaliam:</b> Equipe, mercado, produto/tração, modelo de negócio e potencial de retorno.</p></div>`,
  exercise: `<div class="space-y-3"><h3>Proposta de Trabalho em Sala:</h3>
    <p><b>Atividade:</b> Simulação Shark Tank: cada grupo apresenta sua startup fictícia em 3 minutos para "investidores" (outros alunos). Os investidores decidem se investiriam e por quê.</p></div>`,
  homework: `<div class="space-y-2"><p><b>Além da Sala:</b></p><p>Pesquise uma startup brasileira que recebeu investimento recentemente. Quanto captou? De quem? Em que rodada? Para que vai usar o dinheiro?</p></div>` },
